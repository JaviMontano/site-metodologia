name: Admin bundle integrity + tests

on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [main]

jobs:
  bundle-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Rebuild admin bundle
        run: npm run build:admin

      - name: Drift check — committed bundle must match fresh build
        run: |
          if ! git diff --exit-code admin/js/admin-bundle.js; then
            echo "::error::admin-bundle.js drift detected. Run 'npm run build:admin' locally and commit the result."
            exit 1
          fi

      - name: Run unit tests
        run: npx vitest run
