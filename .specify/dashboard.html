allback served\n    (Firestore unreachable or flag gated)\n- Admin interfaces show a **blocking** connectivity banner\n  when Firestore is unreachable вҖ” they do not operate in\n  stale-read mode\n- Every feature spec MUST include at least one Playwright\n  test that asserts the offline pill appears when\n  Firestore is stubbed to fail\n- Cache TTLs are documented per-collection in\n  `js/cms/cache-manager.js` and enforced by tests\n\n**Rationale**: v6 required \"no error state when backend\nis unreachable\" but did not mandate visible feedback.\nUsers who see stale data without knowing it make decisions\non stale data. v7 makes cache state an explicit UX\ncontract: the user is always told the truth.\n\n> **Acceptance criteria**:\n> - Site renders program catalog with network offline AND\n>   shows the offline pill\n> - Cache TTL is documented per-collection and enforced\n> - Every feature has a Playwright test for the offline pill\n> - Admin shows a blocking banner when Firestore is down\n>\n> **Anti-pattern**: Showing a spinner indefinitely when\n> Firestore times out. Silently serving stale data without\n> a visible signal.\n>\n> **Edge case**: Admin interfaces (CMS backoffice in\n> feature 010) are exempt from stale-read resilience вҖ”\n> they MUST show a clear connectivity warning and refuse\n> to write until Firestore is reachable.","rationale":"v6 required \"no error state when backend","level":"MUST"},{"number":"IX","name":"Test-Driven Development","text":"All production code MUST be preceded by tests. Tests define\nbehavior; code satisfies them. TDD operates within Think\nFirst (XIII) and BDD (XV) governance.\n\n- Red-green-refactor is the required workflow\n- ATDD: feature behavior specified as Given/When/Then\n  before implementation\n- E2E tests cover critical journeys: content loading,\n  offline resilience, admin workflows, i18n, cotizadores\n- Security rules tested against emulator before deploy\n- Test assertions MUST NOT be modified to pass вҖ” fix code\n- Feature files are hash-locked вҖ” changes require testify\n- Tests MUST run in automation (CI or pre-commit)\n\n**Rationale**: TDD prevents unnecessary code. Tests define\nthe exact boundary of what the system must do. ATDD makes\nacceptance criteria executable. Hash-locked feature files\nprevent weakening tests to match broken code.\n\n> **Acceptance criteria**:\n> - No production code committed without a test that\n>   preceded it\n> - CI gate blocks merge on test failure\n> - Feature file hashes match context.json\n>\n> **Anti-pattern**: Writing tests after the code \"to get\n> coverage\" вҖ” this is verification, not TDD.\n>\n> **Edge case**: Exploratory spikes may skip TDD, but\n> spike code is thrown away вҖ” never promoted to production.","rationale":"TDD prevents unnecessary code. Tests define","level":"MUST"},{"number":"X","name":"Design System Governance","text":"The site follows a documented design system with canonical\ntokens. Visual decisions are made once and enforced\neverywhere.","rationale":"","level":"SHOULD"},{"number":"28","name":"Aesthetic","text":"Neo-Swiss Light вҖ” flat vector, Swiss grid,\n  generous whitespace, soft geometric forms, consistent\n  iconography. Light is the DEFAULT theme; Dark is a\n  user-toggleable mirror\n- **Palette v7 (Light default, exclusive)**:\n  `--bg #F9FAFB`, `--bg-soft #F0F0EC`,\n  `--bg-card rgba(255,255,255,.88)`,\n  `--navy #122562`, `--gold #FFD700`,\n  `--gold-dark #B8860B`, `--blue #137DC5`,\n  `--text #1F2833`, `--text-sec #4A5568`,\n  `--text-muted #808080`, `--border rgba(18,37,98,.08)`\n- **Palette v7 (Dark mirror)**:\n  `--bg #0B2545`, `--bg-soft #071A33`,\n  `--text #F0F4F8`, gold/blue desaturated\n- **Typography v7**: Poppins (headings), Montserrat (body),\n  Trebuchet MS (notes, labels, micro-copy) вҖ” supersedes\n  v6 Poppins/Trebuchet/Futura trio","rationale":"","level":"SHOULD"},{"number":"29","name":"Radius tokens","text":"`--radius-sm 6px`, `--radius-md 12px`,\n  `--radius-lg 20px`, `--radius-xl 32px`","rationale":"","level":"SHOULD"},{"number":"30","name":"Theme persistence","text":"active theme stored in\n  `localStorage` as `mdg_theme`, with\n  `prefers-color-scheme` fallback","rationale":"","level":"SHOULD"},{"number":"31","name":"Visual rules","text":"high legibility, no text on noisy\n  backgrounds, soft shadows, faceless figures in\n  illustrations\n- All tokens defined in one source (CSS custom properties)\n  and referenced вҖ” never hardcoded as raw values\n- Dark and Light themes both comply with palette and\n  contrast (WCAG 2.1 AA minimum)\n\n**Rationale**: Without a governed design system, pages\ndrift into visual inconsistency. Canonical tokens ensure\nevery page looks like the same brand.\n\n> **Acceptance criteria**:\n> - Grep for raw hex outside variables.css = 0\n> - Both themes pass WCAG AA contrast check\n> - New components use only existing tokens\n>\n> **Anti-pattern**: Adding `color: #137DC5` inline instead\n> of using `var(--brand-blue)`.\n>\n> **Edge case**: Third-party embeds (e.g., YouTube) cannot\n> conform to the palette вҖ” wrap them in branded containers.","rationale":"Without a governed design system, pages","level":"SHOULD"},{"number":"XI","name":"Brand Voice Integrity","text":"All public content follows MetodologIA Brand Voice v3.0 вҖ”\nmethod-driven, evidence-based communication.","rationale":"","level":"SHOULD"},{"number":"33","name":"Structure","text":"Minto pyramid вҖ” conclusion first,\n  supporting reasons (MECE), evidence, call to action","rationale":"","level":"SHOULD"},{"number":"34","name":"Evidence honesty","text":"strong claims need data, indicator,\n  signal, or explicit \"data required\" marker","rationale":"","level":"SHOULD"},{"number":"35","name":"Language","text":"Spanish (LatAm neutral, \"tu\" form)\n- **Prohibited** (zero tolerance): \"hack\", \"truco\",\n  \"secreto\", \"resultados instantaneos\", \"arquitecto\",\n  \"arquitectura\", \"transformacion\"","rationale":"","level":"SHOULD"},{"number":"36","name":"Preferred","text":"\"metodo\", \"disenar/diseno\", \"sistemas\",\n  \"gobernanza\", \"(R)Evolucion\", \"Success as a Service\"","rationale":"","level":"SHOULD"},{"number":"37","name":"Voice pillars","text":"(R)Evolucion (method closes gap),\n  Intention over intensity, Technology as ally","rationale":"","level":"SHOULD"},{"number":"38","name":"Quality gate","text":"Minto, MECE, honest evidence, zero\n  red-list terms, executable CTA, both languages present\n\n**Rationale**: Brand voice is a quality system, not style\npreference. Minto structure drives decisions. Evidence\nhonesty prevents credibility erosion.\n\n> **Acceptance criteria**:\n> - Red-list grep on public HTML = 0 matches\n> - Every CTA is actionable (links to a page or action)\n> - Both ES/EN variants present for published content\n>\n> **Anti-pattern**: Using \"transformacion digital\" in a\n> headline because it sounds impressive.\n>\n> **Edge case**: Internal docs (specs, plans) may use\n> technical terms freely вҖ” the red-list applies to public\n> content only.","rationale":"Brand voice is a quality system, not style","level":"SHOULD"},{"number":"XII","name":"Code Sustainability","text":"All code is written for the person who maintains it next.\nThe codebase must be understandable and modifiable without\nspecialist knowledge of the original implementation.","rationale":"","level":"SHOULD"},{"number":"40","name":"Business-readable","text":"names reflect business concepts,\n  not implementation mechanics","rationale":"","level":"SHOULD"},{"number":"41","name":"Naming conventions","text":"documented, consistent. No\n  ad-hoc abbreviations or inconsistent casing","rationale":"","level":"SHOULD"},{"number":"42","name":"Slugging","text":"URL paths and file names use kebab-case\n  derived from business names","rationale":"","level":"SHOULD"},{"number":"43","name":"Scaffolding","text":"new features follow existing directory\n  patterns вҖ” self-documenting structure","rationale":"","level":"SHOULD"},{"number":"44","name":"README-driven","text":"every module/directory has a README\n  explaining purpose and boundaries","rationale":"","level":"SHOULD"},{"number":"45","name":"Clean code","text":"no dead code, no magic numbers, no\n  functions longer than one screen. Single responsibility","rationale":"","level":"SHOULD"},{"number":"46","name":"Extensible","text":"new content types addable by following\n  patterns, not modifying core infrastructure","rationale":"","level":"SHOULD"},{"number":"47","name":"Interoperable","text":"modules communicate through documented\n  contracts, not shared mutable state","rationale":"","level":"SHOULD"},{"number":"48","name":"Scalable simplicity","text":"prefer simplest solution;\n  complexity added only when proven insufficient\n\n**Rationale**: A small team where anyone may touch any\npart. Code requiring specialist knowledge is a single\npoint of failure. Business-readable naming and consistent\nconventions reduce onboarding time and maintenance risk.\n\n> **Acceptance criteria**:\n> - No function name requires reading its body to\n>   understand its purpose\n> - Every directory has a README.md\n> - No dead code or commented-out blocks in production\n>\n> **Anti-pattern**: Naming a function `processData()`\n> instead of `loadProgramCatalog()`.\n>\n> **Edge case**: Generated/vendor code is exempt from\n> naming conventions вҖ” but must be isolated in clearly\n> marked directories.","rationale":"A small team where anyone may touch any","level":"SHOULD"},{"number":"XV","name":"BDD Full-Spectrum Quality","text":"BDD is the overarching quality pattern. Scenarios address\nevery quality dimension: strategic, tactical, operational,\ntechnical, UX, UI, backend, middleware, data, DevSecOps,\nCI, and CD.","rationale":"","level":"SHOULD"},{"number":"50","name":"Full-spectrum","text":"acceptance scenarios for every quality\n  dimension relevant to the feature","rationale":"","level":"SHOULD"},{"number":"51","name":"Coverage angles","text":"strategic (business alignment),\n  tactical (migration sequence), operational (admin UX),\n  technical (perf/security), UX (intuitive behavior),\n  UI (design system compliance), backend (rules/model),\n  middleware (caching/service), data (schema/i18n/audit),\n  DevSecOps (secrets/rules), CI/CD (gates/automation)","rationale":"","level":"SHOULD"},{"number":"52","name":"BDD as specification","text":"Given/When/Then written BEFORE\n  code (ATDD) and hash-locked to prevent drift","rationale":"","level":"SHOULD"},{"number":"53","name":"Traceability","text":"every scenario traces to FR-XXX,\n  SC-XXX, and a constitutional principle","rationale":"","level":"SHOULD"},{"number":"54","name":"Runner-agnostic","text":"match runner to test nature вҖ” E2E\n  for browser, unit for code invariants, emulator for\n  security rules. A grep-based step definition is valid BDD","rationale":"","level":"SHOULD"},{"number":"55","name":"Socratic debate for ambiguity","text":"ambiguous scenarios\n  resolved through structured debate against principles\n  before implementation. Recorded in clarifications.md\n\n**Rationale**: Traditional BDD focuses on user behavior.\nA CMS migration has quality dimensions spanning security,\ndata integrity, performance, and brand compliance. Full-\nspectrum BDD ensures nothing falls through the cracks.\n\n> **Acceptance criteria**:\n> - Every feature has scenarios for 3+ quality angles\n> - Step definitions use the correct runner per nature\n> - Ambiguity resolutions are recorded with rationale\n>\n> **Anti-pattern**: Writing only happy-path functional\n> scenarios and calling BDD \"done.\"\n>\n> **Edge case**: Trivial bug fixes may not need full-\n> spectrum BDD вҖ” a single regression scenario suffices.","rationale":"Traditional BDD focuses on user behavior.","level":"SHOULD"},{"number":"XVI","name":"Sequential-First, Parallel-Ready Workflow","text":"Development follows sequential-by-default discipline.\nParallelism is a controlled exception. Tasks advance\nlinearly; concurrent execution only for tasks with zero\nshared dependencies.","rationale":"","level":"SHOULD"},{"number":"57","name":"Sequential is default","text":"critical path is the backbone.\n  Tasks execute in dependency order. This reduces debugging\n  surface and prevents compounding errors\n- **WIP limit: 3 concurrent agents max**: each on a task\n  with zero pre-, co-, or shared-state dependencies","rationale":"","level":"SHOULD"},{"number":"58","name":"Forward-only","text":"completed tasks never revisited unless\n  downstream failure requires it (tracked as new task)","rationale":"","level":"SHOULD"},{"number":"59","name":"Parallel eligibility","text":"ALL must be true вҖ”\n  (1) different files, (2) no data dependency,\n  (3) no logical dependency, (4) failure doesn't\n  invalidate other active work","rationale":"","level":"SHOULD"},{"number":"60","name":"Branch-per-task isolation","text":"each task on its own\n  branch","rationale":"","level":"SHOULD"},{"number":"61","name":"Worktree-based parallelism","text":"parallel tasks in\n  separate worktrees when eligible\n- **Atomic, mergeable units**: each branch independently\n  mergeable","rationale":"","level":"SHOULD"},{"number":"62","name":"Contract-first integration","text":"parallel tasks agree on\n  contracts before implementation","rationale":"","level":"SHOULD"},{"number":"63","name":"No long-lived branches","text":"short-lived, merged\n  frequently","rationale":"","level":"SHOULD"},{"number":"64","name":"Merge discipline","text":"automated tests + quality gates\n  before merge. No force-pushing shared branches\n\n**Rationale**: Parallelism multiplies debugging surface\nand creates hidden state interactions. Sequential follows\nthe critical path; each task builds on verified\nfoundations. WIP limit of 3 is the practical ceiling.\n\n> **Acceptance criteria**:\n> - No more than 3 branches in active development\n> - Every parallel task passes the 4-point eligibility\n> - No force pushes to staging or main\n>\n> **Anti-pattern**: Starting 5 tasks in parallel \"to go\n> faster\" then spending 2 days resolving merge conflicts.\n>\n> **Edge case**: Independent documentation tasks (READMEs,\n> specs) may run in parallel freely вҖ” they rarely conflict.","rationale":"Parallelism multiplies debugging surface","level":"SHOULD"},{"number":"XVII","name":"Continuous Learning Loop","text":"Every decision and discovery feeds back as reusable\ninsight. The project compounds knowledge вҖ” it never\nre-debates settled questions.","rationale":"","level":"SHOULD"},{"number":"66","name":"Socratic debate as decision engine","text":"2+ options with\n  divergent consequences вҶ’ structured debate against\n  principles вҶ’ eliminate by contradiction вҶ’ record answer","rationale":"","level":"SHOULD"},{"number":"67","name":"Three outputs per debate","text":"(1) direct answer,\n  (2) question refinements, (3) coverage gaps","rationale":"","level":"SHOULD"},{"number":"68","name":"Insights capture","text":"reusable patterns recorded in\n  `insights/<domain>.md` with origin, pattern, rationale,\n  trigger conditions, and constitutional anchor","rationale":"","level":"SHOULD"},{"number":"69","name":"Constitution evolution","text":"recurring ambiguity вҶ’\n  constitution amendment to prevent recurrence","rationale":"","level":"SHOULD"},{"number":"70","name":"Insights before debate","text":"check `insights/` first.\n  If a prior insight resolves the question, cite it","rationale":"","level":"SHOULD"},{"number":"71","name":"No knowledge loss","text":"insights never deleted вҖ” updated\n  or superseded with reference to replacement\n\n**Rationale**: A project that doesn't learn from its\ndecisions re-debates them. The feedback loop (debates вҶ’\ninsights вҶ’ amendments вҶ’ fewer debates) means the project\ngets faster and more precise over time.\n\n> **Acceptance criteria**:\n> - Every Socratic debate produces an insights/ entry\n> - No duplicate debates on the same class of decision\n> - Constitution version increments on ambiguity fixes\n>\n> **Anti-pattern**: Having the same \"should we strip or\n> escape HTML?\" debate in three different features.\n>\n> **Edge case**: Trivial decisions (naming, formatting)\n> don't need Socratic debate вҖ” use team conventions.","rationale":"A project that doesn't learn from its","level":"SHOULD"},{"number":"XVIII","name":"Indexable & Self-Organizing Repository","text":"Every directory is navigable by reading only index files.\nNo folder exists without explaining its purpose.","rationale":"","level":"SHOULD"},{"number":"73","name":"README per directory","text":"explains purpose, contents,\n  and relationship to the project","rationale":"","level":"SHOULD"},{"number":"74","name":"Index-driven navigation","text":"root README links to\n  top-level dirs; each dir links to children","rationale":"","level":"SHOULD"},{"number":"75","name":"Auto-organization","text":"new directory вҶ’ immediate README.\n  Accumulated files вҶ’ organized into named subdirectories\n- **.gitignore governance**: every exclusion pattern has\n  a comment explaining why","rationale":"","level":"SHOULD"},{"number":"76","name":"Workspace separation","text":"user files in gitignored\n  `workspace/`. Repo = source + specs + governance only","rationale":"","level":"SHOULD"},{"number":"77","name":"Staleness prevention","text":"dirs without updates for 30+\n  days flagged for review\n\n**Rationale**: A large project with specs, insights, admin\ninterfaces, and workspace interactions becomes unnavigable\nwithout active organization. README-per-directory is the\ncheapest documentation вҖ” maintained alongside the code.\n\n> **Acceptance criteria**:\n> - `find . -type d -not -path '*/node_modules/*' |\n>   while read d; do test -f \"$d/README.md\"; done` = 0 fails\n> - .gitignore has no uncommented patterns\n> - No directory older than 30 days without review flag\n>\n> **Anti-pattern**: Creating `src/utils/` with 12 files\n> and no README explaining what \"utils\" means here.\n>\n> **Edge case**: Generated directories (node_modules,\n> dist, .cache) are exempt from the README requirement.","rationale":"A large project with specs, insights, admin","level":"SHOULD"},{"number":"XIX","name":"User-Reported Bug Protocol","text":"User-reported bugs follow a mandatory triage-diagnose-fix-\nverify pipeline. They are high-signal events representing\nfailures that automated tests missed.","rationale":"","level":"SHOULD"},{"number":"79","name":"Immediate triage","text":"P0 by default. Stop feature work.\n  User's perspective is truth for severity","rationale":"","level":"SHOULD"},{"number":"80","name":"Reproduce first","text":"browser automation on the live URL\n  before any fix. If not reproducible, investigate\n  deployment gap","rationale":"","level":"SHOULD"},{"number":"81","name":"Root cause before fix","text":"5 Whys pattern. Document the\n  causal chain. No surface patches","rationale":"","level":"SHOULD"},{"number":"82","name":"Deployment-parity check","text":"if live site differs from\n  repo, first fix is synchronization","rationale":"","level":"SHOULD"},{"number":"83","name":"Regression test mandatory","text":"at least one test that\n  fails before fix and passes after. Permanent guard","rationale":"","level":"SHOULD"},{"number":"84","name":"No workarounds","text":"don't tell users to clear cache.\n  Fix the code","rationale":"","level":"SHOULD"},{"number":"85","name":"Audit trail","text":"user description вҶ’ reproduced symptoms\n  вҶ’ root cause вҶ’ fix вҶ’ regression test вҶ’ deploy verified\n\n**Rationale**: User-reported bugs are the most expensive\nkind вҖ” they erode trust. This protocol ensures thorough\nresponse: reproduce, understand, fix at root, prevent\nrecurrence, verify in production.\n\n> **Acceptance criteria**:\n> - Every bug report produces a regression test\n> - Fix is verified on live URL, not just locally\n> - Root cause chain documented before PR is opened\n>\n> **Anti-pattern**: Fixing the symptom in code and closing\n> the issue without verifying the fix reached production.\n>\n> **Edge case**: Cosmetic bugs (typos, spacing) may skip\n> browser automation вҖ” but still need a deploy verify step.","rationale":"User-reported bugs are the most expensive","level":"SHOULD"},{"number":"XX","name":"Branch-to-Environment Parity","text":"Every environment has exactly one source branch. Code\nflows forward вҖ” never backward, never skipping a stage.\n\n```\nfeature/* в”Җв”ҖвҶ’ staging в”Җв”ҖвҶ’ main в”Җв”ҖвҶ’ production hosting\n   (dev)      (pre-prod)  (prod)    (CDN + origin)\n```\n\n- **Feature branches** (`NNN-slug` or `feature/*`): all\n  dev happens here. One feature per branch from `staging`\n- **`staging`**: integration branch. PRs + E2E before\n  promoting. Owner reviews here\n- **`main`**: only branch that deploys. Merges from\n  `staging` via PR only. Every commit = deployed code","rationale":"","level":"SHOULD"},{"number":"87","name":"Production","text":"pulls from `main` only. Deploy = pull +\n  server cache purge + CDN purge. Checklist in runbook\n\n#### Flow rules\n\n1. **Feature вҶ’ staging**: PR, CI runs tests, merge when\n   green\n2. **staging вҶ’ main**: owner PR, E2E must pass, never\n   auto-merged\n3. **main вҶ’ production**: deploy runbook (pull, purge\n   caches, verify live with automation)\n4. **Hotfix**: `hotfix/slug` from `main`, PR to `main`\n   directly, backport to `staging`\n\n#### Prohibitions\n\n- No direct commits to `main` or `staging`\n- No force push to `main` (ever) or `staging` (except\n  rebase cleanup)\n- No deploying from non-`main` branches\n- No skipping staging вҶ’ main gate\n- No merging `main` back into `staging`\n\n#### Deploy checklist\n\n1. Push `main` to remote\n2. Pull `main` on production server\n3. Purge server-side cache\n4. Purge CDN cache\n5. Verify live site with browser automation\n6. If CDN stale: activate dev mode temporarily\n\nHost-specific commands in deploy runbook (see\n`memory/reference_hostinger_deploy.md`).\n\n**Rationale**: The BUG-001 incident proved deployment-\nparity failures are invisible until a user reports them.\nThree-branch model ensures code is tested in integration\nbefore production. Deploy checklist exists because\n\"git push\" is not a deploy.\n\n> **Acceptance criteria**:\n> - `main` HEAD matches production deployment at all times\n> - No commit reaches `main` without passing staging E2E\n> - Deploy checklist logged for every production push\n>\n> **Anti-pattern**: Pushing directly to main \"because it's\n> a small change\" and skipping staging verification.\n>\n> **Edge case**: Hotfixes bypass staging by design вҖ” but\n> must backport to staging immediately after deploy.","rationale":"The BUG-001 incident proved deployment-","level":"SHOULD"},{"number":"XXI","name":"Zero Hardcoding","text":"No value that could change вҖ” content, configuration,\nthresholds, accounts, feature flags, credentials вҖ” is\nhardcoded in source code. Every value is managed through\nan appropriate configuration mechanism.\n\n- **Content values** (text, prices, program names): managed\n  via CMS (Firestore) and editable by authorized roles\n- **System configuration** (TTLs, thresholds, feature\n  flags): stored in config documents or environment\n  variables, never as literals in code\n- **Security configuration** (bootstrap accounts, allowed\n  domains, role definitions): managed via environment\n  variables (`functions.config()`, `.env` files) or\n  secured config stores. Deploy-time config is acceptable;\n  source code literals are not\n- **API keys, endpoints, project IDs**: environment\n  variables or config files, never inline strings","rationale":"","level":"SHOULD"},{"number":"89","name":"Magic numbers","text":"extracted to named constants in config.\n  If the value could ever need changing without a code\n  deploy, it belongs in a config store","rationale":"","level":"SHOULD"},{"number":"90","name":"The test","text":"if changing a value requires modifying\n  source code and redeploying, the value is hardcoded.\n  The correct design makes it changeable via config,\n  CMS, or environment without touching code\n\n**Rationale**: This is a CMS вҖ” editability and\nmanageability are core identity traits, not conveniences.\nHardcoded values create hidden dependencies that defeat\nthe purpose of a content management system. Even security\ninvariants can be managed securely through environment\nvariables and deploy-time configuration вҖ” hardcoding is\nnot the only path to immutability. Environment variables\nrequire deploy access to change, providing the same trust\nboundary as source code without the rigidity.\n\n> **Acceptance criteria**:\n> - `grep -r` for literal strings that match content in\n>   CMS = 0 results\n> - No function contains a literal email, domain name,\n>   or role assignment\n> - Every configurable value has a documented config\n>   source (env var, Firestore doc, or config file)\n>\n> **Anti-pattern**: `const BOOTSTRAP = ['admin@x.com']`\n> in a Cloud Function instead of reading from\n> `functions.config().bootstrap.accounts` or `.env`.\n>\n> **Edge case**: Development defaults (fallback values\n> when config is missing) are acceptable as constants\n> IF they are clearly marked as defaults and overridable.\n> Test fixtures and mock data are exempt вҖ” they are not\n> production configuration.","rationale":"This is a CMS вҖ” editability and","level":"SHOULD"},{"number":"XXII","name":"PII-Append-Only","text":"Writes to collections containing personally identifiable\ninformation (PII) are **append-only**. Deduplication,\nmerging, and reconciliation happen in a separate admin\nsurface, never from client-side consumer features.\n\n- PII collections (`leads/`, `diagnostics/`, and any\n  future collection holding email, name, phone, or other\n  personal data) MUST be declared in the feature spec\n- Client-side writes create NEW documents under the\n  current anonymous auth uid вҖ” never update-by-email or\n  merge-by-phone or any form of cross-uid reconciliation\n- Security rules enforce: `create` allowed for the\n  owning uid; `update` restricted to the uid that\n  created the doc; `delete` denied from the client\n- Reconciliation (dedup by email, merge across uids) is\n  the responsibility of the admin backoffice and runs\n  via trusted admin session or Cloud Function\n- The feature spec MUST list how stale/duplicate PII\n  docs will be handled downstream (usually: deferred to\n  admin feature)\n\n**Rationale**: Anonymous uids are device-scoped вҖ” they\ndo not persist across devices, cleared storage, or\nincognito sessions. Merging across uids from the client\nrequires reading other uids' docs, which breaks the\n\"own data only\" security model. Append-only is safe,\nauditable, and compatible with \"no registration required\"\nUX promises. Duplicate leads are a manageable downstream\nproblem; PII leakage is not.\n\n> **Acceptance criteria**:\n> - Every PII collection listed in the feature spec with\n>   its reconciliation story\n> - Security rules reject client-side updates across uids\n> - Admin has a documented reconciliation procedure\n> - Analytics/dashboard queries tolerate duplicate emails\n>\n> **Anti-pattern**: Querying `leads/` by email from the\n> client to \"reuse\" an existing doc. Writing a Cloud\n> Function that the client can invoke to merge docs.\n>\n> **Edge case**: If a user explicitly requests data\n> deletion (GDPR/LGPD right-to-be-forgotten), the admin\n> deletes all docs matching the email hash via trusted\n> session. This is the only merge operation permitted.","rationale":"Anonymous uids are device-scoped вҖ” they","level":"MUST"},{"number":"XXIII","name":"Feature-Bounded Architecture","text":"Each feature declares an explicit boundary on which\nFirestore collections it READS and WRITES. Features that\nneed backoffice UI belong in their own dedicated feature,\nnot bolted onto consumer-facing features.\n\n- Every `spec.md` MUST include a \"Collections touched\"\n  table listing each collection with `read` / `write` /\n  `admin` rights\n- A feature that introduces a new collection MUST also\n  introduce its security rules in the same PR\n- Consumer features (home, landing, catalog, diagnГіstico)\n  READ published data; they MAY write only to their own\n  PII collections (see XXII); they do NOT write to\n  shared content collections\n- Backoffice features (admin CRUD, schema editor, bulk\n  operations) live in dedicated features and are the\n  only features that hold write rights to content\n  collections (`products`, `services`, `pricing`,\n  `pages`, `blocks`, `translations`, `flags`,\n  `experiments`, etc.)\n- Feature splits that move writes to a dedicated\n  backoffice MUST document a **seed path** for the\n  consumer feature to launch standalone (typically a\n  `scripts/seed.js` or declarative fallback)\n- A feature's Firestore read scope MUST match its\n  security rules вҖ” no \"this feature reads collection X\"\n  without public-read rules on X\n\n**Rationale**: Feature 009 proved that mixing consumer\nUX with CMS backoffice inflates scope beyond sprint size,\nblurs security boundaries, and blocks independent\nshipping. Dedicated backoffice features keep consumer\nfeatures small, testable, and shippable. The split also\nclarifies ownership: consumer teams and content teams\nwork on different features with different review cycles.\n\n> **Acceptance criteria**:\n> - Every spec has a \"Collections touched\" table\n> - PR diff shows rules changes for any new collection\n> - Consumer feature CI passes with empty content\n>   collections (fallback path proven)\n> - Backoffice features are separately scoped in `specs/`\n>\n> **Anti-pattern**: Adding \"admin can also edit this\n> here\" to a consumer feature spec. Shipping consumer\n> features that depend on backoffice features being\n> implemented first.\n>\n> **Edge case**: A consumer feature may include a\n> one-off admin seed script (`scripts/seed-X.js`) to\n> populate a new collection before the backoffice lands.\n> Seed scripts are not a backoffice.","rationale":"Feature 009 proved that mixing consumer","level":"MUST"},{"number":"93","name":"Site scale","text":"63+ pages, 1-10 CMS users across 4 role\n  levels, <10K daily visitors","rationale":"","level":"SHOULD"},{"number":"94","name":"Role management","text":"via CMS UI for super admins, not\n  CLI scripts. Bootstrap accounts via environment config","rationale":"","level":"SHOULD"},{"number":"95","name":"Team","text":"1 human + AI agents вҖ” no peer review\n  available, gates compensate","rationale":"","level":"SHOULD"},{"number":"96","name":"Hosting","text":"shared hosting with CDN вҖ” no custom\n  server-side logic. Serverless functions for privileged\n  operations (role assignment, claims management)","rationale":"","level":"SHOULD"},{"number":"97","name":"Budget","text":"zero external services beyond BaaS and\n  hosting","rationale":"","level":"SHOULD"},{"number":"98","name":"Language","text":"Spanish-first (LatAm), English second.\n  No other locales planned","rationale":"","level":"SHOULD"},{"number":"99","name":"Browser support","text":"modern evergreen browsers. No IE11,\n  no legacy mobile browsers\n\nThese assumptions scope the principles. If the site grows\nto 500+ pages, 20+ CMS users, or 100K+ visitors,\nprinciples I, VII, VIII, and XVI may need re-evaluation.","rationale":"","level":"SHOULD"},{"number":"100","name":"Structure","text":"`workspace/tasks/TL-XXX-<slug>/` for\n  task working files; `workspace/YYYY-MM-DD-<slug>/` for\n  dated sessions with `inputs/`, `outputs/`, `annexes/`","rationale":"","level":"SHOULD"},{"number":"101","name":"Rules","text":"every subfolder has a README; sessions older\n  than 30 days are reviewed; `estandares/` holds internal\n  style guides","rationale":"","level":"SHOULD"},{"number":"102","name":"Interaction","text":"user drops inputs вҶ’ agent runs workflow\n  вҶ’ outputs to `outputs/` or repo specs вҶ’ user reviews\n- Full structure documented in `workspace/README.md`","rationale":"","level":"SHOULD"},{"number":"103","name":"Amendments","text":"explicit owner approval + version\n  increment + documented rationale","rationale":"","level":"SHOULD"},{"number":"104","name":"Conflicts","text":"resolved by project owner per the\n  Principle Precedence table above\n- **Work philosophy** (XIII, XIV) governs application\n  of all other principles\n- **Quality gates** (G0-G3) are mandatory; no bypass\n- **Socratic debate** required for ambiguities with\n  divergent consequences. Insights before debate (XVII)\n- **Operational logs** maintained across sessions;\n  session protocol ensures review at every start\n- **Indexability** (XVIII) enforced on every commit that\n  creates a directory\n\n**Version**: 6.2.0 | **Ratified**: 2026-03-22 | **Last Amended**: 2026-03-23","rationale":"","level":"SHOULD"}],"version":{"version":"6.2.0","ratified":"2026-03-22","lastAmended":"2026-03-23"},"exists":true},"premise":{"content":"# Site MetodologIA Premise\n\n## What\n\nClient-rendered marketing and content platform for MetodologIA (metodologia.info) вҖ” a 100+ page bilingual (ES/EN) site built on Tailwind CSS, vanilla JS web components, and **Firebase as the single backend** (Firestore, Auth, Storage, Analytics, App Check). Content lives in Firestore with declarative static fallback via `js/cms/migration-bridge.js`; a dedicated backoffice feature (`010-backoffice-cms`) provides schema-driven editing for prices, services, bilingual content, programs, and pages вҖ” no code deployments required for content changes. Consumer-facing features (home, landing, diagnГіstico, catalogs) read published content; they never write to shared content collections.\n\n## Who\n\n- **Professionals (Personas)**: Individuals seeking AI skills, productivity tools, and methodology training вҖ” from beginners to advanced practitioners.\n- **Companies (Empresas)**: Organizations looking for AI consulting, team training, and digital transformation programs.\n- **Community**: MetodologIA ecosystem participants accessing free and premium resources.\n- **Leads**: Anonymous visitors who complete the diagnГіstico flow; their PII is captured append-only (see Constitution XXII).\n- **Administrators**: Site owner and editors who manage content through the `010-backoffice-cms` admin interface вҖ” schema-driven forms, versioning, rollback, audit log, workflow, feature flags, A/B experiments.\n\n## Why\n\nMetodologIA needs a digital presence that communicates its value proposition, catalogs its training programs, provides a resource library (14 free + 13 premium categories), enables self-service quoting via interactive cotizadores, and captures qualified leads through a frictionless diagnГіstico flow. Firebase as the formalized single backend eliminates vendor debates, reduces ops to zero, and gives security rules a single enforcement surface. A **feature-bounded architecture** (Constitution XXIII) keeps consumer features (home, landing pages, diagnГіstico) small, testable, and independently shippable, while backoffice features (`006-cms-backoffice-rbac`, `010-backoffice-cms`) own write rights to shared content. Content changes become instant for administrators; developer intervention is reserved for structural changes.\n\n## Domain\n\nEdTech and AI Consulting. Key terms:\n- **Cotizador**: Interactive pricing calculator for programs\n- **Recursos**: Downloadable resources organized by category (prompts, templates, guides)\n- **Premium**: Paid tier of resources with higher-value content\n- **Ruta**: Learning path / roadmap for users\n- **DiagnГіstico**: 6-step frictionless assessment flow that infers user level and produces a personalized recommendation + CTA (see feature `009-home-landing-sales` В§4.4)\n- **Gemini Gems**: AI assistants built on Google Gemini for specific use cases\n- **Content Authority**: Firestore is the canonical source; static files are the declarative frozen fallback consumed by `migration-bridge.js` (see Constitution VI)\n- **Neo-Swiss Light**: Default visual theme (light palette with navy + gold accents); Dark is a user-toggleable mirror persisted in `localStorage` (see Constitution X)\n- **BaaS-First**: Firebase is the only backend. Custom servers are prohibited (see Constitution I)\n- **PII-Append-Only**: Writes to `leads/` and `diagnostics/` create new docs per anonymous uid; deduplication is deferred to admin reconciliation (see Constitution XXII)\n\n## Scope\n\n**In scope**:\n- Public marketing pages (home, about, programs, resources, contact, legal) rendered client-side\n- Home landing v2 (feature `009-home-landing-sales`): hero + 3 CTAs + prueba social + programas + cierre, Neo-Swiss Light default, responsive xsвҶ’2xl, i18n ES/EN\n- DiagnГіstico flow (6 steps, declarative scoring in spec `009` В§4.4) with append-only persistence to `leads/` and `diagnostics/`\n- Program catalogs for personas and empresas with info modals\n- Interactive cotizadores (real-time pricing with progress bars, informational only)\n- Free and premium resource library (14+ categories each)\n- Bilingual content pipeline (ES/EN) using `js/i18n/dictionaries/*.json` as static fallback; Firestore `translations/` when feature flag `cms-i18n` is enabled\n- SEO optimization (OG tags, Twitter cards, sitemap, canonical URLs)\n- Accessibility (WCAG 2.1 AA, skip-to-content, ARIA modals, keyboard navigation, touch targets вүҘ44Г—44)\n- Responsive design (xs 360 / sm 390 / md 768 / lg 1024 / xl 1280 / 2xl 1536) with Neo-Swiss Light default + Dark mirror\n- **Firebase as the single backend**: Firestore + Auth (Google + anonymous) + Storage + Analytics + App Check. No custom server. No second provider.\n- Declarative static fallback via `js/cms/migration-bridge.js` вҖ” permanent resilience mechanism, not a migration step\n- SWR caching via `js/cms/cache-manager.js` with explicit offline/syncing/fallback UX pills (see Constitution VIII)\n- Feature-bounded architecture: consumer features (001-003, 005, 009) read published content; backoffice features (006, 010) own write rights\n- Backoffice CMS (feature `010-backoffice-cms`, next-up): schema-driven editing, versioning, rollback, audit log, workflow, feature flags, A/B experiments, WCAG-compliant admin UI\n- PII append-only writes with admin-side reconciliation deferred to 010 or later\n- LGPD/GDPR-light consent with explicit checkbox for PII capture\n\n**Out of scope**:\n- Non-Firebase backend services (would require a constitutional amendment)\n- Custom server infrastructure (BaaS only, no self-managed servers, no Node runtime in production)\n- Payment processing (cotizadores are informational, not transactional)\n- User accounts for visitors (auth is admin-only; visitors use anonymous auth for PII writes)\n- Full CMS framework adoption (this is a tailor-made solution, not WordPress/Strapi)\n- Automatic dedup/merge of leads across anonymous uids (deferred to admin reconciliation in feature 010)\n- Email marketing integration (Mailchimp, Brevo) вҖ” future phase\n","exists":true},"featureData":{"009-home-landing-sales":{"board":{"todo":[],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":44,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"in_progress","progress":"86%","optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[],"requirements":[{"id":"FR-001","text":"El home MUST presentar en el viewport inicial sin scroll (xs a 2xl) una promesa de valor вүӨ12 palabras y los 3 CTAs con jerarquГӯa visual explГӯcita (primario dominante, secundario subordinado, terciario en secciГіn dedicada bajo el hero)."},{"id":"FR-002","text":"El CTA primario \"Iniciar diagnГіstico gratuito\" MUST ser el Гәnico con peso visual dominante (filled gold, tamaГұo XL, touch target вүҘ44Г—44 px en mobile y вүҘ48Г—48 en tablet/desktop)."},{"id":"FR-003","text":"El home MUST incluir una secciГіn de prueba social (testimonios o logos o mГ©tricas) entre el hero y la secciГіn de programas."},{"id":"FR-004","text":"El home MUST repetir los 3 CTAs en una secciГіn de cierre antes del footer."},{"id":"FR-005","text":"El home MUST usar la estructura: `hero вҶ’ prueba social вҶ’ 3 rutas expandidas вҶ’ programas activos вҶ’ cierre con CTAs вҶ’ footer`."},{"id":"FR-010","text":"El sistema MUST permitir a un visitante iniciar el diagnГіstico sin registro previo, sin email, sin cookies."},{"id":"FR-011","text":"El diagnГіstico MUST constar de вүӨ6 pasos con barra de progreso visible y tiempo estimado \"вүҲ3 min\"."},{"id":"FR-012","text":"El diagnГіstico MUST terminar con un resultado personalizado (nivel + recomendaciГіn + CTA siguiente) y solicitar en el Гәltimo paso: email, nombre, consentimiento LGPD/GDPR-light (checkbox obligatorio con link a polГӯtica)."},{"id":"FR-013","text":"El sistema MUST persistir el diagnГіstico completado en Firestore `diagnostics/{uid}` y el lead en `leads/{uid}` con: segmento inferido, fuente, idioma, timestamp, respuestas hash-paso-a-paso, resultado calculado."},{"id":"FR-014","text":"El sistema MUST persistir el diagnГіstico en curso en `localStorage` con TTL 24h para retomar en la misma sesiГіn o dentro del dГӯa."},{"id":"FR-015","text":"El sistema MUST degradar el CTA a un formulario de contacto cuando Firestore no estГ© disponible, mostrando mensaje claro (\"Servicio temporal fuera вҖ” usa este formulario\")."},{"id":"FR-016","text":"El sistema MUST generar una cookie `mdg_returning` (SHA-256 del email, Secure, SameSite=Lax, 180 dГӯas) al completar el diagnГіstico, y cambiar el CTA primario a \"Continuar tu ruta\" cuando estГ© presente."},{"id":"FR-017","text":"El sistema MUST aplicar **append-only** a `leads/{uid}` y `diagnostics/{uid}`: cada completion crea documentos nuevos bajo el anonymous uid de la sesiГіn actual, aunque el email coincida con un lead previo. La deduplicaciГіn por email es responsabilidad de una reconciliaciГіn admin diferida a feature `010-backoffice-cms`. RazГіn: los anonymous uids son device-scoped y las security rules validan `auth.uid`, no el hash de email."},{"id":"FR-020","text":"El home MUST exponer un CTA \"Explorar recursos gratis\" como link secundario junto al CTA primario, con peso visual subordinado."},{"id":"FR-021","text":"El CTA MUST llevar a `recursos/index.html` (catГЎlogo existente) con resaltado visual Neo-Swiss."},{"id":"FR-022","text":"Recursos premium MUST pedir email + nombre en un modal antes de desbloquear (lead con fuente `home-resource-premium`), sin double opt-in."},{"id":"FR-030","text":"El home MUST exponer una secciГіn \"Programas activos\" bajo el hero con 3вҖ“4 programas representativos (cards con nombre, audiencia, duraciГіn, resultado, CTA)."},{"id":"FR-031","text":"Cada card MUST enlazar a la pГЎgina existente (`empresas/*.html` o `personas/*.html`) sin crear pГЎginas nuevas."},{"id":"FR-032","text":"El CTA global de la secciГіn MUST ser \"Ver todos los programas\" enlazando a `empresas/index.html` y `personas/index.html` segГәn segmento."},{"id":"FR-040","text":"El home MUST consumir exclusivamente los tokens CSS gobernados por `CONSTITUTION.md В§X` вҖ” custom properties idГ©nticas a las cartillas de referencia."},{"id":"FR-041","text":"El home MUST usar la paleta Neo-Swiss Light como default: `--bg #F9FAFB`, `--bg-soft #F0F0EC`, `--bg-card rgba(255,255,255,.88)`, `--navy #122562`, `--gold #FFD700`, `--gold-dark #B8860B`, `--blue #137DC5`, `--text #1F2833`, `--text-sec #4A5568`, `--text-muted #808080`, `--border rgba(18,37,98,.08)`."},{"id":"FR-042","text":"El home MUST soportar dark mirror (toggle manual + `prefers-color-scheme`): `--bg #0B2545`, `--bg-soft #071A33`, `--text #F0F4F8`, con los mismos gold/blue desaturados."},{"id":"FR-043","text":"El home MUST usar el sistema tipogrГЎfico de 3 niveles: `--font-head 'Poppins'` (headings), `--font-body 'Montserrat'` (body), `--font-note 'Trebuchet MS'` (notes, labels, micro-copy)."},{"id":"FR-044","text":"El home MUST usar radios `--radius-sm 6px`, `--radius-md 12px`, `--radius-lg 20px`, `--radius-xl 32px` y shadows `--shadow-card`, `--shadow-glow` idГ©nticos a las cartillas."},{"id":"FR-045","text":"El home MUST persistir el modo activo (light/dark) en `localStorage` como `mdg_theme`, respetando `prefers-color-scheme` como fallback."},{"id":"FR-050","text":"El home MUST ser mobile-first, con breakpoints `xs 360`, `sm 390`, `md 768`, `lg 1024`, `xl 1280`, `2xl 1536`."},{"id":"FR-051","text":"El home MUST mostrar el CTA primario visible sin scroll en todos los breakpoints, incluyendo landscape mobile (844Г—390)."},{"id":"FR-052","text":"El home MUST usar `clamp()` para typography scale fluida entre breakpoints."},{"id":"FR-053","text":"El home MUST respetar `env(safe-area-inset-*)` en iOS para notch/Dynamic Island/home indicator."},{"id":"FR-054","text":"El home MUST tener touch targets вүҘ44Г—44 px en xs/sm y вүҘ48Г—48 px en md/lg/xl/2xl, con spacing вүҘ8px entre ellos."},{"id":"FR-055","text":"El home MUST evitar scroll horizontal en cualquier viewport (test automatizado en Playwright)."},{"id":"FR-056","text":"El home MUST cargar imГЎgenes con `srcset` WebP/AVIF + fallback PNG/JPG y `loading=\"lazy\"` fuera del fold."},{"id":"FR-057","text":"El home MUST reservar espacio (`aspect-ratio` o `width/height`) para todos los media para mantener CLS <0.1."},{"id":"FR-060","text":"El home MUST estar 100% traducido ES/EN usando el mГіdulo `js/i18n/` existente y `data-i18n` attributes."},{"id":"FR-061","text":"El home MUST cumplir WCAG 2.1 AA mГӯnimo: contrast вүҘ4.5:1 texto normal, вүҘ3:1 texto grande, вүҘ3:1 UI components, focus rings visibles, orden de foco lГіgico."},{"id":"FR-062","text":"El orden de foco por teclado MUST ser: skip-link вҶ’ nav вҶ’ CTA primario вҶ’ CTA secundario вҶ’ programas вҶ’ footer."},{"id":"FR-063","text":"El home MUST renderizar un estado degradado funcional sin JavaScript (HTML estГЎtico navegable a `/diagnostico/`, `/recursos/`, `/empresas/`, `/personas/`)."},{"id":"FR-064","text":"El home MUST respetar `prefers-reduced-motion` desactivando entrance animations y limitando transiciones a вүӨ100ms."},{"id":"FR-065","text":"Los iconos lucide MUST tener `aria-hidden=\"true\"` cuando sean decorativos y `aria-label` cuando sean funcionales."},{"id":"FR-070","text":"El home MUST registrar eventos en Firebase Analytics: `home_view`, `cta_click_primary`, `cta_click_secondary`, `cta_click_tertiary`, `diagnostic_start`, `diagnostic_step_{1..6}`, `diagnostic_completed`, `diagnostic_abandoned`, `resource_open`, `resource_premium_unlock`, `program_request`."},{"id":"FR-071","text":"Cada evento MUST incluir: `locale` (es/en), `device_class` (xs/sm/md/lg/xl/2xl), `source` (organic/utm/direct), `utm_content` si aplica, `variant` si A/B."},{"id":"FR-072","text":"El home MUST declarar consent banner LGPD-light con opciones **aceptar/rechazar** Analytics antes de disparar eventos (cookie `mdg_consent`). **Two-tier consent**: el banner cubre exclusivamente Analytics (FR-070, FR-071); la captura de PII en el diagnГіstico (`leads/`, `diagnostics/`) estГЎ gateada por el checkbox explГӯcito de FR-012 que es independiente y necesario para la entrega del servicio. Si el usuario **rechaza** el banner: (a) el home renderiza normalmente, (b) el diagnГіstico funciona end-to-end, (c) cero eventos Analytics se disparan (ni siquiera `home_view`), (d) `leads/` y `diagnostics/` se siguen escribiendo si el checkbox de FR-012 estГЎ marcado, porque son necesarios para mostrar el resultado personalizado. Alineado con Constitution XXII (PII-Append-Only): el banner no sustituye al checkbox explГӯcito de PII."},{"id":"FR-080","text":"El home MUST leer `utm_content` y cuando sea `diagnostico`, `recurso` u `oferta`, destacar visualmente la ruta correspondiente con un halo/glow gold sutil, sin cambiar la jerarquГӯa base."},{"id":"FR-081","text":"El home MUST detectar la cookie `mdg_returning` y mutar el CTA primario a \"Continuar tu ruta\" + link directo al diagnГіstico con estado restaurado."},{"id":"FR-100","text":"El sistema MUST exponer un backoffice en `/admin/` (autenticado con Firebase Auth + custom claim `admin:true`) que permita gestionar sin tocar cГіdigo: productos, servicios, precios, URLs, traducciones, recursos, testimonios, pГЎginas, bloques de contenido, imГЎgenes, SEO metadata, feature flags, y variantes de experimentos."},{"id":"FR-101","text":"El backoffice MUST proveer CRUD completo sobre las colecciones Firestore: `products`, `services`, `programs`, `pricing`, `resources`, `testimonials`, `pages`, `blocks`, `assets`, `seo`, `flags`, `experiments`, `translations`, `leads`, `diagnostics`, `settings`."},{"id":"FR-102","text":"Cada entidad editable MUST tener un **schema descriptor** (JSON Schema almacenado en `settings/schemas/{entity}`) que define campos, tipos, validaciones, etiquetas ES/EN y help text вҖ” permitiendo que el backoffice renderice formularios dinГЎmicos sin hardcodear UI por entidad (patrГіn \"schema-driven admin\")."},{"id":"FR-103","text":"El backoffice MUST soportar **bloques de contenido reutilizables** (`blocks/{slug}`) tipo WordPress Gutenberg: hero, feature, testimonial, CTA-group, pricing-table, FAQ, image, video, rich-text, HTML raw (sandboxed). Los bloques se componen en pГЎginas vГӯa referencias ordenadas."},{"id":"FR-104","text":"Las pГЎginas del sitio (`pages/{slug}`) MUST modelarse como documento con: tГӯtulo, slug, locale, SEO metadata, array ordenado de bloques con overrides, estado (draft/scheduled/published), fecha publicaciГіn, autor, versionado."},{"id":"FR-105","text":"Las URLs MUST ser editables вҖ” cada `pages/{slug}` define su `path` canГіnico + array de `redirects` (array de paths antiguos). Un router client-side en el home y pГЎginas dinГЎmicas resuelve slugвҶ’path usando un Гӯndice cacheado."},{"id":"FR-106","text":"Los precios MUST vivir en `pricing/{id}` con: moneda, valor base, descuentos, fecha vigencia desde/hasta, multi-moneda (COP/USD/MXN/EUR), estado activo/archivado, producto/servicio asociado."},{"id":"FR-108","text":"El backoffice MUST soportar **versionado y rollback**: cada escritura a una entidad CMS crea un documento en `{entity}_versions/{id}/{versionId}` con snapshot completo, autor, timestamp y diff resumen. El admin puede ver historial y restaurar."},{"id":"FR-109","text":"El backoffice MUST soportar **audit log** inmutable en `audit/{eventId}` con: actor (uid), acciГіn (create/update/delete/publish), entidad, antes/despuГ©s hash, IP, user-agent, timestamp server."},{"id":"FR-110","text":"El backoffice MUST proveer **workflow de publicaciГіn**: estados `draft вҶ’ in-review вҶ’ scheduled вҶ’ published вҶ’ archived` con roles (`editor`, `reviewer`, `publisher`, `admin`) controlados por custom claims."},{"id":"FR-111","text":"El backoffice MUST soportar **upload de assets** (imГЎgenes, PDFs) a Firebase Storage en `assets/{uuid}/{filename}`, con transformaciГіn client-side (resize, WebP conversion via Canvas API) antes de subir, y URL pГәblica vГӯa Storage rules."},{"id":"FR-112","text":"El backoffice MUST soportar **preview** вҖ” cada entidad editable tiene un modo \"ver como publicado\" que renderiza el home/pГЎgina con el draft sin publicar, usando query param `?preview={token}` firmado."},{"id":"FR-113","text":"El backoffice MUST exponer un **dashboard** con mГ©tricas live desde Firestore: leads Гәltimos 7/30 dГӯas, diagnГіsticos completados, top recursos, conversion funnel."},{"id":"FR-114","text":"El backoffice MUST permitir **export** (JSON, CSV) de `leads/`, `diagnostics/`, `audit/` para uso offline y backup."},{"id":"FR-115","text":"El backoffice MUST soportar **feature flags** (`flags/{key}`) con targeting por locale, deviceClass, utm, cohort вҖ” consumidos por el home para activar variantes sin redeploy."},{"id":"FR-116","text":"El backoffice MUST soportar **experimentos A/B** (`experiments/{id}`) con: nombre, hipГіtesis, variantes, assignment rule, fecha inicio/fin, mГ©trica de Г©xito вҖ” consumidos por el home para asignar variantes determinГӯsticas por sessionId."},{"id":"FR-117","text":"El backoffice MUST soportar **internacionalizaciГіn del propio admin UI** (ES/EN) usando los mismos tokens i18n que el sitio pГәblico."},{"id":"FR-118","text":"El backoffice MUST respetar el design system Neo-Swiss Light/Dark, reutilizando los mismos tokens y componentes que el sitio pГәblico."},{"id":"FR-119","text":"El sistema MUST mantener **schema migrations** declarativas en `settings/migrations/{version}` ejecutadas por script admin-only al boot, para evolucionar entidades sin romper data existente."},{"id":"FR-120","text":"El sistema MUST aplicar **security rules** Firestore que:"},{"id":"FR-090","text":"El home MUST cargar el LCP en вүӨ2.5s en 4G (slow 3G Fast simulaciГіn) y вүӨ1.5s en desktop cable."},{"id":"FR-091","text":"El home MUST tener TBT <200ms, CLS <0.1, INP <200ms."},{"id":"FR-092","text":"El home MUST inline critical CSS del fold (hand-authored en `estilos/critical.css`, embebido en `<style>` del `<head>`: tokens + hero layout + CTA primario + typography above-the-fold) y diferir `dist/output.css` vГӯa `media=\"print\"` + `onload` swap. Sin herramientas de extracciГіn automГЎtica (ver FR-095)."},{"id":"FR-096","text":"El archivo `estilos/critical.css` MUST mantenerse como source-of-truth hand-authored; los cambios a tokens o al hero MUST reflejarse manualmente. Un test Playwright valida que el primer paint renderiza hero+CTA sin FOUC."},{"id":"FR-093","text":"El home MUST cargar fuentes con `font-display: swap` y preconnect a `fonts.googleapis.com`."},{"id":"FR-094","text":"El home MUST diferir toda JS no crГӯtica con `defer` o `type=\"module\"`."},{"id":"FR-095","text":"El home MUST consumir los assets existentes del proyecto (`dist/output.css`, `components/SiteHeader.js`, `components/SiteFooter.js`, `js/icons.js`) sin introducir dependencias nuevas."},{"id":"FR-097","text":"The home MUST surface cache state with visible pills near the header/footer:"},{"id":"FR-098","text":"A Playwright test in `tests/e2e/offline-pill.spec.js` MUST stub Firestore to fail and assert the `offline` pill appears on the home within 3 seconds."},{"id":"FR-099","text":"The pills are `aria-live=\"polite\"` so screen readers announce cache state changes."}],"successCriteria":[{"id":"SC-001","text":"**CTR total** вҖ” вүҘ40% de visitas al home hacen clic en uno de los 3 CTAs `[BASELINE-TBD, target +2Г—]`."},{"id":"SC-002","text":"**CTR diagnГіstico** вҖ” вүҘ15% de visitas al home inician el diagnГіstico `[BASELINE-TBD]`."},{"id":"SC-003","text":"**Completion rate diagnГіstico** вҖ” вүҘ60% de los diagnГіsticos iniciados terminan con lead registrado."},{"id":"SC-004","text":"**Tiempo mediano de diagnГіstico** вҖ” вүӨ3 minutos (medido desde `diagnostic_start` hasta `diagnostic_completed`)."},{"id":"SC-005","text":"**LCP** вҖ” вүӨ2.5s en 4G (Lighthouse throttled), вүӨ1.5s desktop cable, en xs/sm/md/lg/xl/2xl."},{"id":"SC-006","text":"**Consistencia visual cartillas вҶ” home** вҖ” вүҘ95% en auditorГӯa lado-a-lado (mismos custom properties, mismos patrones componentes, mismo sistema tipogrГЎfico)."},{"id":"SC-007","text":"**Lighthouse** вҖ” вүҘ90 en Performance, Accessibility, Best Practices, SEO en mobile y desktop."},{"id":"SC-008","text":"**Usabilidad** вҖ” вүҘ90% de usuarios en prueba moderada identifican los 3 caminos y eligen uno en вүӨ10 segundos."},{"id":"SC-013","text":"**Toggle transition time** вҖ” cualquier cambio de locale, theme o audience MUST completar transiciГіn DOM en <100ms medido de click-event a next-paint (E2E Playwright `performance.now()`)."},{"id":"SC-014","text":"**Adaptive blueprint matrix** вҖ” el test parametrizado `tests/e2e/adaptive-blueprint.spec.js` MUST pasar **52/52** combinaciones (13 pages Г— 2 locale Г— 2 audience). Sin skips, sin flakes en 10 runs consecutivos."},{"id":"SC-015","text":"**Zero raw i18n keys** вҖ” cero ocurrencias de keys crudas (`{pageSlug}.{slot}.{...}`) en el DOM renderizado de producciГіn, en cualquier combinaciГіn. Enforced por aserciГіn regex en cada E2E."},{"id":"SC-016","text":"**13 pГЎginas exactas** вҖ” el recuento fГӯsico de pГЎginas canГіnicas (archivos `index.html` y `404.html` bajo root, excluyendo `dist/`, `node_modules/`, subdirectorios detail) MUST ser exactamente 13. Enforced por `scripts/count-pages.js` en pre-commit."},{"id":"SC-017","text":"**Lead source traceability** вҖ” 100% de los leads escritos a `leads/{uid}` MUST tener un campo `fuente` no vacГӯo mapeable a uno de los 3 CTAs (valores enumerados: `home-diagnostic`, `home-resource-premium`, `contact-form`, `insights-subscribe`, `diagnostic-mailto-fallback`). Verificado en `tests/integration/security-rules.spec.js`."},{"id":"SC-018","text":"**Coverage floor** вҖ” el pipeline CI MUST enforzar los thresholds de NFR-008. Merge bloqueado si coverage global <85% o si un mГіdulo pure <100%."},{"id":"SC-019","text":"**Backcasting closed loop** вҖ” cada FR del spec MUST tener trazabilidad explГӯcita a вүҘ1 US, cada US a вүҘ1 SC, cada SC a вүҘ1 Constitution principle. Matriz verificable en robustness-v1.md В§F.1-F.3, sin orphans."},{"id":"SC-009","text":"**ConversiГіn total leads** вҖ” uplift вүҘ2Г— vs baseline en los primeros 30 dГӯas post-lanzamiento `[BASELINE-TBD]`."},{"id":"SC-010","text":"**Cobertura i18n** вҖ” 0 cadenas sin traducir en auditorГӯa automГЎtica ES y EN."},{"id":"SC-011","text":"**Matriz responsive** вҖ” 6/6 viewports (xs/sm/md/lg/xl/2xl) pasan el checklist de 12 puntos de US-5."},{"id":"SC-012","text":"**Zero scroll horizontal** вҖ” test Playwright en los 6 viewports confirma ausencia de scroll horizontal."},{"id":"SC-013","text":"**Touch targets** вҖ” 100% de elementos interactivos cumplen вүҘ44Г—44 px en xs/sm."},{"id":"SC-014","text":"**CLS** вҖ” <0.1 en xs/sm/md/lg (Core Web Vitals)."},{"id":"SC-015","text":"**Contrast** вҖ” 100% de pares foreground/background pasan WCAG AA (вүҘ4.5:1 normal, вүҘ3:1 large)."}],"clarifications":[],"edges":[]},"planView":{"techContext":[{"label":"Language/Version","value":"HTML5 + CSS3 (custom properties + Tailwind 3.x prebuilt) + Vanilla JavaScript ES2022 modules"},{"label":"Primary Dependencies","value":"Firebase JS SDK v10 (Firestore, Auth, Storage, Analytics, App Check); existente `js/cms/` SDK; existente `js/i18n/`; `idb` wrapper (ya en ГЎrbol); Lucide icons (existente `js/icons.js`). **Cero dependencias nuevas**."},{"label":"Storage","value":"Firestore (read public-published: `programs`, `resources`, `testimonials`; write append-only: `leads/{uid}`, `diagnostics/{uid}`); `localStorage` (theme, diagnГіstico TTL 24h); IndexedDB via `cache-manager.js` (SWR 7d); cookies (`mdg_consent`, `mdg_returning`)."},{"label":"Testing","value":"Vitest (unit вҖ” pure modules), Firebase Emulator Suite (security rules), Playwright (E2E вҖ” 3 suites consolidadas)."},{"label":"Target Platform","value":"Navegadores evergreen (spec NFR-003). Hosting estГЎtico Hostinger VPS + Cloudflare CDN."},{"label":"Project Type","value":"Static web вҖ” single project, mobile-first, zero build runtime."},{"label":"Performance Goals","value":"LCP вүӨ2.5s 4G / вүӨ1.5s cable; TBT <200ms; CLS <0.1; INP <200ms. Bundle inicial <250 KB inline. (Spec FR-090..FR-094.)"},{"label":"Constraints","value":"13 pГЎginas hard constraint (Sitemap В§2). Zero server-side runtime (NFR-001). Append-only PII (Const. XXII). Feature-bounded CMS (Const. XXIII, вҶ’010). Cero hardcoding (Const. XXI)."},{"label":"Scale/Scope","value":"13 pГЎginas (1 funcional profunda + 12 shells mГӯnimos) + flujo diagnГіstico 6 pasos + nav/footer unificados + legacy redirects. Audiencia LatAm ES/EN. <5k sessions/dГӯa baseline."}],"researchDecisions":[],"fileStructure":{"rootName":"specs/009-home-landing-sales","entries":[{"name":"spec.md","type":"file","comment":"Feature specification v5 (locked)","depth":0,"exists":true},{"name":"sitemap.md","type":"file","comment":"IA + Socratic debate + 13-page inventory (NEW)","depth":0,"exists":true},{"name":"plan.md","type":"file","comment":"This file (v2, revised)","depth":0,"exists":true},{"name":"research.md","type":"file","comment":"Phase 0 вҖ” Socratic decisions archived","depth":0,"exists":true},{"name":"data-model.md","type":"file","comment":"Phase 1 вҖ” entities touched by 009","depth":0,"exists":true},{"name":"quickstart.md","type":"file","comment":"Phase 1 вҖ” manual + automated validation","depth":0,"exists":true},{"name":"contracts","type":"directory","comment":null,"depth":0,"exists":true},{"name":"firestore-rules.md","type":"file","comment":null,"depth":1,"exists":false},{"name":"analytics-events.md","type":"file","comment":null,"depth":1,"exists":false},{"name":"diagnostic-logic.json","type":"file","comment":null,"depth":1,"exists":false},{"name":"checklists","type":"directory","comment":null,"depth":0,"exists":false},{"name":"tasks.md","type":"file","comment":"Phase 05","depth":0,"exists":false}]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.9.8","eval":null,"reviewScore":85},{"name":"tessl-labs/quickstart-debug-api-endpoints","version":"1.0.5","eval":null,"reviewScore":63},{"name":"JaviMontano/jm-agentic-development-kit","version":"a174232ae3eec7600c1a29a2b4c04c7798eec17c","eval":null,"reviewScore":null},{"name":"tessl/npm-firebase","version":"12.2.0","eval":null,"reviewScore":null},{"name":"tessl/npm-firebase-functions","version":"6.4.0","eval":null,"reviewScore":null},{"name":"tessl/npm-firebase-tools","version":"14.15.0","eval":null,"reviewScore":null},{"name":"tessl-labs/web-accessibility-essentials","version":"0.2.2","eval":null,"reviewScore":93},{"name":"tessl/npm-playwright--test","version":"1.55.0","eval":null,"reviewScore":null},{"name":"tessl-labs/playwright-testing","version":"0.2.0","eval":null,"reviewScore":98}],"exists":true},"checklist":{"files":[{"name":"Requirements","filename":"requirements.md","total":21,"checked":18,"items":[{"text":"Spec describes **what** and **why**, not how (no frameworks, libraries, DB choices hard-coded in requirements)","checked":true,"chkId":null,"category":"Content Quality","tags":[]},{"text":"Written for business stakeholders (language accessible, no low-level jargon)","checked":true,"chkId":null,"category":"Content Quality","tags":[]},{"text":"No code, schemas, or API contracts inside spec","checked":true,"chkId":null,"category":"Content Quality","tags":[]},{"text":"Brand governance is referenced via CONSTITUTION.md В§X rather than duplicating tokens","checked":true,"chkId":null,"category":"Content Quality","tags":[]},{"text":"No prices or cost figures (FTE-months only, and none stated here)","checked":true,"chkId":null,"category":"Content Quality","tags":[]},{"text":"Every functional requirement is testable (MUST phrasing, measurable outcome)","checked":true,"chkId":null,"category":"Requirement Completeness","tags":[]},{"text":"Every user story has priority (P1/P2/P3), independent test path, and вүҘ2 acceptance scenarios","checked":true,"chkId":null,"category":"Requirement Completeness","tags":[]},{"text":"Edge cases enumerated (no-JS, backend down, returning visitor, UTM deep-link, i18n, a11y)","checked":true,"chkId":null,"category":"Requirement Completeness","tags":[]},{"text":"Key entities identified (Lead, DiagnГіstico, Recurso, Programa Educativo, Evento)","checked":true,"chkId":null,"category":"Requirement Completeness","tags":[]},{"text":"Success criteria are measurable, technology-agnostic, user-or-business focused","checked":true,"chkId":null,"category":"Requirement Completeness","tags":[]},{"text":"No `[NEEDS CLARIFICATION]` markers remain","checked":true,"chkId":null,"category":"Requirement Completeness","tags":[]},{"text":"MVP slice identified: User Story 1 (diagnГіstico) + User Story 4 (branding Neo-Swiss) are independently shippable","checked":true,"chkId":null,"category":"Feature Readiness","tags":[]},{"text":"P2/P3 stories (Recursos, Oferta Educativa) can be delivered incrementally without blocking P1","checked":true,"chkId":null,"category":"Feature Readiness","tags":[]},{"text":"References to concrete brand anchors exist (cartillas en `workspace/2026-04-10-site-reconstruction/inputs/`)","checked":true,"chkId":null,"category":"Feature Readiness","tags":[]},{"text":"Constitution В§X (Design System Governance) cited as the single source of truth for visual tokens","checked":true,"chkId":null,"category":"Feature Readiness","tags":[]},{"text":"Accessibility (WCAG 2.1 AA) and i18n (ES/EN) explicit","checked":true,"chkId":null,"category":"Feature Readiness","tags":[]},{"text":"Analytics/conversion events defined to allow measurement against SC-001..SC-010","checked":true,"chkId":null,"category":"Feature Readiness","tags":[]},{"text":"Phase discipline: no technology choices, no implementation schemas, no file-level architecture in spec","checked":true,"chkId":null,"category":"Feature Readiness","tags":[]},{"text":"`plan.md` will need to decide: diagnГіstico backend (new vs reuse of existing `cotizador*` flows), where the new home replaces `index.html`, design-token delta vs current `estilos/variables.css`","checked":false,"chkId":null,"category":"Downstream Impact Preview","tags":[]},{"text":"`tasks.md` will enumerate: hero + 3 CTAs, diagnostic flow, resource catalog binding, offer page binding, i18n keys, analytics wiring, a11y audit, Lighthouse gate","checked":false,"chkId":null,"category":"Downstream Impact Preview","tags":[]},{"text":"`test-specs.md` will cover: happy paths per user story, no-JS degradation, returning-visitor state, UTM deep-link, i18n coverage, a11y","checked":false,"chkId":null,"category":"Downstream Impact Preview","tags":[]}],"percentage":86,"color":"green"}],"gate":{"status":"blocked","level":"yellow","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"El home MUST presentar en el viewport inicial sin scroll (xs a 2xl) una promesa de valor вүӨ12 palabras y los 3 CTAs con jerarquГӯa visual explГӯcita (primario dominante, secundario subordinado, terciario en secciГіn dedicada bajo el hero)."},{"id":"FR-002","text":"El CTA primario \"Iniciar diagnГіstico gratuito\" MUST ser el Гәnico con peso visual dominante (filled gold, tamaГұo XL, touch target вүҘ44Г—44 px en mobile y вүҘ48Г—48 en tablet/desktop)."},{"id":"FR-003","text":"El home MUST incluir una secciГіn de prueba social (testimonios o logos o mГ©tricas) entre el hero y la secciГіn de programas."},{"id":"FR-004","text":"El home MUST repetir los 3 CTAs en una secciГіn de cierre antes del footer."},{"id":"FR-005","text":"El home MUST usar la estructura: `hero вҶ’ prueba social вҶ’ 3 rutas expandidas вҶ’ programas activos вҶ’ cierre con CTAs вҶ’ footer`."},{"id":"FR-010","text":"El sistema MUST permitir a un visitante iniciar el diagnГіstico sin registro previo, sin email, sin cookies."},{"id":"FR-011","text":"El diagnГіstico MUST constar de вүӨ6 pasos con barra de progreso visible y tiempo estimado \"вүҲ3 min\"."},{"id":"FR-012","text":"El diagnГіstico MUST terminar con un resultado personalizado (nivel + recomendaciГіn + CTA siguiente) y solicitar en el Гәltimo paso: email, nombre, consentimiento LGPD/GDPR-light (checkbox obligatorio con link a polГӯtica)."},{"id":"FR-013","text":"El sistema MUST persistir el diagnГіstico completado en Firestore `diagnostics/{uid}` y el lead en `leads/{uid}` con: segmento inferido, fuente, idioma, timestamp, respuestas hash-paso-a-paso, resultado calculado."},{"id":"FR-014","text":"El sistema MUST persistir el diagnГіstico en curso en `localStorage` con TTL 24h para retomar en la misma sesiГіn o dentro del dГӯa."},{"id":"FR-015","text":"El sistema MUST degradar el CTA a un formulario de contacto cuando Firestore no estГ© disponible, mostrando mensaje claro (\"Servicio temporal fuera вҖ” usa este formulario\")."},{"id":"FR-016","text":"El sistema MUST generar una cookie `mdg_returning` (SHA-256 del email, Secure, SameSite=Lax, 180 dГӯas) al completar el diagnГіstico, y cambiar el CTA primario a \"Continuar tu ruta\" cuando estГ© presente."},{"id":"FR-017","text":"El sistema MUST aplicar **append-only** a `leads/{uid}` y `diagnostics/{uid}`: cada completion crea documentos nuevos bajo el anonymous uid de la sesiГіn actual, aunque el email coincida con un lead previo. La deduplicaciГіn por email es responsabilidad de una reconciliaciГіn admin diferida a feature `010-backoffice-cms`. RazГіn: los anonymous uids son device-scoped y las security rules validan `auth.uid`, no el hash de email."},{"id":"FR-020","text":"El home MUST exponer un CTA \"Explorar recursos gratis\" como link secundario junto al CTA primario, con peso visual subordinado."},{"id":"FR-021","text":"El CTA MUST llevar a `recursos/index.html` (catГЎlogo existente) con resaltado visual Neo-Swiss."},{"id":"FR-022","text":"Recursos premium MUST pedir email + nombre en un modal antes de desbloquear (lead con fuente `home-resource-premium`), sin double opt-in."},{"id":"FR-030","text":"El home MUST exponer una secciГіn \"Programas activos\" bajo el hero con 3вҖ“4 programas representativos (cards con nombre, audiencia, duraciГіn, resultado, CTA)."},{"id":"FR-031","text":"Cada card MUST enlazar a la pГЎgina existente (`empresas/*.html` o `personas/*.html`) sin crear pГЎginas nuevas."},{"id":"FR-032","text":"El CTA global de la secciГіn MUST ser \"Ver todos los programas\" enlazando a `empresas/index.html` y `personas/index.html` segГәn segmento."},{"id":"FR-040","text":"El home MUST consumir exclusivamente los tokens CSS gobernados por `CONSTITUTION.md В§X` вҖ” custom properties idГ©nticas a las cartillas de referencia."},{"id":"FR-041","text":"El home MUST usar la paleta Neo-Swiss Light como default: `--bg #F9FAFB`, `--bg-soft #F0F0EC`, `--bg-card rgba(255,255,255,.88)`, `--navy #122562`, `--gold #FFD700`, `--gold-dark #B8860B`, `--blue #137DC5`, `--text #1F2833`, `--text-sec #4A5568`, `--text-muted #808080`, `--border rgba(18,37,98,.08)`."},{"id":"FR-042","text":"El home MUST soportar dark mirror (toggle manual + `prefers-color-scheme`): `--bg #0B2545`, `--bg-soft #071A33`, `--text #F0F4F8`, con los mismos gold/blue desaturados."},{"id":"FR-043","text":"El home MUST usar el sistema tipogrГЎfico de 3 niveles: `--font-head 'Poppins'` (headings), `--font-body 'Montserrat'` (body), `--font-note 'Trebuchet MS'` (notes, labels, micro-copy)."},{"id":"FR-044","text":"El home MUST usar radios `--radius-sm 6px`, `--radius-md 12px`, `--radius-lg 20px`, `--radius-xl 32px` y shadows `--shadow-card`, `--shadow-glow` idГ©nticos a las cartillas."},{"id":"FR-045","text":"El home MUST persistir el modo activo (light/dark) en `localStorage` como `mdg_theme`, respetando `prefers-color-scheme` como fallback."},{"id":"FR-050","text":"El home MUST ser mobile-first, con breakpoints `xs 360`, `sm 390`, `md 768`, `lg 1024`, `xl 1280`, `2xl 1536`."},{"id":"FR-051","text":"El home MUST mostrar el CTA primario visible sin scroll en todos los breakpoints, incluyendo landscape mobile (844Г—390)."},{"id":"FR-052","text":"El home MUST usar `clamp()` para typography scale fluida entre breakpoints."},{"id":"FR-053","text":"El home MUST respetar `env(safe-area-inset-*)` en iOS para notch/Dynamic Island/home indicator."},{"id":"FR-054","text":"El home MUST tener touch targets вүҘ44Г—44 px en xs/sm y вүҘ48Г—48 px en md/lg/xl/2xl, con spacing вүҘ8px entre ellos."},{"id":"FR-055","text":"El home MUST evitar scroll horizontal en cualquier viewport (test automatizado en Playwright)."},{"id":"FR-056","text":"El home MUST cargar imГЎgenes con `srcset` WebP/AVIF + fallback PNG/JPG y `loading=\"lazy\"` fuera del fold."},{"id":"FR-057","text":"El home MUST reservar espacio (`aspect-ratio` o `width/height`) para todos los media para mantener CLS <0.1."},{"id":"FR-060","text":"El home MUST estar 100% traducido ES/EN usando el mГіdulo `js/i18n/` existente y `data-i18n` attributes."},{"id":"FR-061","text":"El home MUST cumplir WCAG 2.1 AA mГӯnimo: contrast вүҘ4.5:1 texto normal, вүҘ3:1 texto grande, вүҘ3:1 UI components, focus rings visibles, orden de foco lГіgico."},{"id":"FR-062","text":"El orden de foco por teclado MUST ser: skip-link вҶ’ nav вҶ’ CTA primario вҶ’ CTA secundario вҶ’ programas вҶ’ footer."},{"id":"FR-063","text":"El home MUST renderizar un estado degradado funcional sin JavaScript (HTML estГЎtico navegable a `/diagnostico/`, `/recursos/`, `/empresas/`, `/personas/`)."},{"id":"FR-064","text":"El home MUST respetar `prefers-reduced-motion` desactivando entrance animations y limitando transiciones a вүӨ100ms."},{"id":"FR-065","text":"Los iconos lucide MUST tener `aria-hidden=\"true\"` cuando sean decorativos y `aria-label` cuando sean funcionales."},{"id":"FR-070","text":"El home MUST registrar eventos en Firebase Analytics: `home_view`, `cta_click_primary`, `cta_click_secondary`, `cta_click_tertiary`, `diagnostic_start`, `diagnostic_step_{1..6}`, `diagnostic_completed`, `diagnostic_abandoned`, `resource_open`, `resource_premium_unlock`, `program_request`."},{"id":"FR-071","text":"Cada evento MUST incluir: `locale` (es/en), `device_class` (xs/sm/md/lg/xl/2xl), `source` (organic/utm/direct), `utm_content` si aplica, `variant` si A/B."},{"id":"FR-072","text":"El home MUST declarar consent banner LGPD-light con opciones **aceptar/rechazar** Analytics antes de disparar eventos (cookie `mdg_consent`). **Two-tier consent**: el banner cubre exclusivamente Analytics (FR-070, FR-071); la captura de PII en el diagnГіstico (`leads/`, `diagnostics/`) estГЎ gateada por el checkbox explГӯcito de FR-012 que es independiente y necesario para la entrega del servicio. Si el usuario **rechaza** el banner: (a) el home renderiza normalmente, (b) el diagnГіstico funciona end-to-end, (c) cero eventos Analytics se disparan (ni siquiera `home_view`), (d) `leads/` y `diagnostics/` se siguen escribiendo si el checkbox de FR-012 estГЎ marcado, porque son necesarios para mostrar el resultado personalizado. Alineado con Constitution XXII (PII-Append-Only): el banner no sustituye al checkbox explГӯcito de PII."},{"id":"FR-080","text":"El home MUST leer `utm_content` y cuando sea `diagnostico`, `recurso` u `oferta`, destacar visualmente la ruta correspondiente con un halo/glow gold sutil, sin cambiar la jerarquГӯa base."},{"id":"FR-081","text":"El home MUST detectar la cookie `mdg_returning` y mutar el CTA primario a \"Continuar tu ruta\" + link directo al diagnГіstico con estado restaurado."},{"id":"FR-100","text":"El sistema MUST exponer un backoffice en `/admin/` (autenticado con Firebase Auth + custom claim `admin:true`) que permita gestionar sin tocar cГіdigo: productos, servicios, precios, URLs, traducciones, recursos, testimonios, pГЎginas, bloques de contenido, imГЎgenes, SEO metadata, feature flags, y variantes de experimentos."},{"id":"FR-101","text":"El backoffice MUST proveer CRUD completo sobre las colecciones Firestore: `products`, `services`, `programs`, `pricing`, `resources`, `testimonials`, `pages`, `blocks`, `assets`, `seo`, `flags`, `experiments`, `translations`, `leads`, `diagnostics`, `settings`."},{"id":"FR-102","text":"Cada entidad editable MUST tener un **schema descriptor** (JSON Schema almacenado en `settings/schemas/{entity}`) que define campos, tipos, validaciones, etiquetas ES/EN y help text вҖ” permitiendo que el backoffice renderice formularios dinГЎmicos sin hardcodear UI por entidad (patrГіn \"schema-driven admin\")."},{"id":"FR-103","text":"El backoffice MUST soportar **bloques de contenido reutilizables** (`blocks/{slug}`) tipo WordPress Gutenberg: hero, feature, testimonial, CTA-group, pricing-table, FAQ, image, video, rich-text, HTML raw (sandboxed). Los bloques se componen en pГЎginas vГӯa referencias ordenadas."},{"id":"FR-104","text":"Las pГЎginas del sitio (`pages/{slug}`) MUST modelarse como documento con: tГӯtulo, slug, locale, SEO metadata, array ordenado de bloques con overrides, estado (draft/scheduled/published), fecha publicaciГіn, autor, versionado."},{"id":"FR-105","text":"Las URLs MUST ser editables вҖ” cada `pages/{slug}` define su `path` canГіnico + array de `redirects` (array de paths antiguos). Un router client-side en el home y pГЎginas dinГЎmicas resuelve slugвҶ’path usando un Гӯndice cacheado."},{"id":"FR-106","text":"Los precios MUST vivir en `pricing/{id}` con: moneda, valor base, descuentos, fecha vigencia desde/hasta, multi-moneda (COP/USD/MXN/EUR), estado activo/archivado, producto/servicio asociado."},{"id":"FR-108","text":"El backoffice MUST soportar **versionado y rollback**: cada escritura a una entidad CMS crea un documento en `{entity}_versions/{id}/{versionId}` con snapshot completo, autor, timestamp y diff resumen. El admin puede ver historial y restaurar."},{"id":"FR-109","text":"El backoffice MUST soportar **audit log** inmutable en `audit/{eventId}` con: actor (uid), acciГіn (create/update/delete/publish), entidad, antes/despuГ©s hash, IP, user-agent, timestamp server."},{"id":"FR-110","text":"El backoffice MUST proveer **workflow de publicaciГіn**: estados `draft вҶ’ in-review вҶ’ scheduled вҶ’ published вҶ’ archived` con roles (`editor`, `reviewer`, `publisher`, `admin`) controlados por custom claims."},{"id":"FR-111","text":"El backoffice MUST soportar **upload de assets** (imГЎgenes, PDFs) a Firebase Storage en `assets/{uuid}/{filename}`, con transformaciГіn client-side (resize, WebP conversion via Canvas API) antes de subir, y URL pГәblica vГӯa Storage rules."},{"id":"FR-112","text":"El backoffice MUST soportar **preview** вҖ” cada entidad editable tiene un modo \"ver como publicado\" que renderiza el home/pГЎgina con el draft sin publicar, usando query param `?preview={token}` firmado."},{"id":"FR-113","text":"El backoffice MUST exponer un **dashboard** con mГ©tricas live desde Firestore: leads Гәltimos 7/30 dГӯas, diagnГіsticos completados, top recursos, conversion funnel."},{"id":"FR-114","text":"El backoffice MUST permitir **export** (JSON, CSV) de `leads/`, `diagnostics/`, `audit/` para uso offline y backup."},{"id":"FR-115","text":"El backoffice MUST soportar **feature flags** (`flags/{key}`) con targeting por locale, deviceClass, utm, cohort вҖ” consumidos por el home para activar variantes sin redeploy."},{"id":"FR-116","text":"El backoffice MUST soportar **experimentos A/B** (`experiments/{id}`) con: nombre, hipГіtesis, variantes, assignment rule, fecha inicio/fin, mГ©trica de Г©xito вҖ” consumidos por el home para asignar variantes determinГӯsticas por sessionId."},{"id":"FR-117","text":"El backoffice MUST soportar **internacionalizaciГіn del propio admin UI** (ES/EN) usando los mismos tokens i18n que el sitio pГәblico."},{"id":"FR-118","text":"El backoffice MUST respetar el design system Neo-Swiss Light/Dark, reutilizando los mismos tokens y componentes que el sitio pГәblico."},{"id":"FR-119","text":"El sistema MUST mantener **schema migrations** declarativas en `settings/migrations/{version}` ejecutadas por script admin-only al boot, para evolucionar entidades sin romper data existente."},{"id":"FR-120","text":"El sistema MUST aplicar **security rules** F
