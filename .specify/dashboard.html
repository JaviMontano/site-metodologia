irestore que:"},{"id":"FR-090","text":"El home MUST cargar el LCP en вүӨ2.5s en 4G (slow 3G Fast simulaciГіn) y вүӨ1.5s en desktop cable."},{"id":"FR-091","text":"El home MUST tener TBT <200ms, CLS <0.1, INP <200ms."},{"id":"FR-092","text":"El home MUST inline critical CSS del fold (hand-authored en `estilos/critical.css`, embebido en `<style>` del `<head>`: tokens + hero layout + CTA primario + typography above-the-fold) y diferir `dist/output.css` vГӯa `media=\"print\"` + `onload` swap. Sin herramientas de extracciГіn automГЎtica (ver FR-095)."},{"id":"FR-096","text":"El archivo `estilos/critical.css` MUST mantenerse como source-of-truth hand-authored; los cambios a tokens o al hero MUST reflejarse manualmente. Un test Playwright valida que el primer paint renderiza hero+CTA sin FOUC."},{"id":"FR-093","text":"El home MUST cargar fuentes con `font-display: swap` y preconnect a `fonts.googleapis.com`."},{"id":"FR-094","text":"El home MUST diferir toda JS no crГӯtica con `defer` o `type=\"module\"`."},{"id":"FR-095","text":"El home MUST consumir los assets existentes del proyecto (`dist/output.css`, `components/SiteHeader.js`, `components/SiteFooter.js`, `js/icons.js`) sin introducir dependencias nuevas."},{"id":"FR-097","text":"The home MUST surface cache state with visible pills near the header/footer:"},{"id":"FR-098","text":"A Playwright test in `tests/e2e/offline-pill.spec.js` MUST stub Firestore to fail and assert the `offline` pill appears on the home within 3 seconds."},{"id":"FR-099","text":"The pills are `aria-live=\"polite\"` so screen readers announce cache state changes."},{"id":"SC-001","text":"**CTR total** вҖ” вүҘ40% de visitas al home hacen clic en uno de los 3 CTAs `[BASELINE-TBD, target +2Г—]`."},{"id":"SC-002","text":"**CTR diagnГіstico** вҖ” вүҘ15% de visitas al home inician el diagnГіstico `[BASELINE-TBD]`."},{"id":"SC-003","text":"**Completion rate diagnГіstico** вҖ” вүҘ60% de los diagnГіsticos iniciados terminan con lead registrado."},{"id":"SC-004","text":"**Tiempo mediano de diagnГіstico** вҖ” вүӨ3 minutos (medido desde `diagnostic_start` hasta `diagnostic_completed`)."},{"id":"SC-005","text":"**LCP** вҖ” вүӨ2.5s en 4G (Lighthouse throttled), вүӨ1.5s desktop cable, en xs/sm/md/lg/xl/2xl."},{"id":"SC-006","text":"**Consistencia visual cartillas вҶ” home** вҖ” вүҘ95% en auditorГӯa lado-a-lado (mismos custom properties, mismos patrones componentes, mismo sistema tipogrГЎfico)."},{"id":"SC-007","text":"**Lighthouse** вҖ” вүҘ90 en Performance, Accessibility, Best Practices, SEO en mobile y desktop."},{"id":"SC-008","text":"**Usabilidad** вҖ” вүҘ90% de usuarios en prueba moderada identifican los 3 caminos y eligen uno en вүӨ10 segundos."},{"id":"SC-013","text":"**Toggle transition time** вҖ” cualquier cambio de locale, theme o audience MUST completar transiciГіn DOM en <100ms medido de click-event a next-paint (E2E Playwright `performance.now()`)."},{"id":"SC-014","text":"**Adaptive blueprint matrix** вҖ” el test parametrizado `tests/e2e/adaptive-blueprint.spec.js` MUST pasar **52/52** combinaciones (13 pages Г— 2 locale Г— 2 audience). Sin skips, sin flakes en 10 runs consecutivos."},{"id":"SC-015","text":"**Zero raw i18n keys** вҖ” cero ocurrencias de keys crudas (`{pageSlug}.{slot}.{...}`) en el DOM renderizado de producciГіn, en cualquier combinaciГіn. Enforced por aserciГіn regex en cada E2E."},{"id":"SC-016","text":"**13 pГЎginas exactas** вҖ” el recuento fГӯsico de pГЎginas canГіnicas (archivos `index.html` y `404.html` bajo root, excluyendo `dist/`, `node_modules/`, subdirectorios detail) MUST ser exactamente 13. Enforced por `scripts/count-pages.js` en pre-commit."},{"id":"SC-017","text":"**Lead source traceability** вҖ” 100% de los leads escritos a `leads/{uid}` MUST tener un campo `fuente` no vacГӯo mapeable a uno de los 3 CTAs (valores enumerados: `home-diagnostic`, `home-resource-premium`, `contact-form`, `insights-subscribe`, `diagnostic-mailto-fallback`). Verificado en `tests/integration/security-rules.spec.js`."},{"id":"SC-018","text":"**Coverage floor** вҖ” el pipeline CI MUST enforzar los thresholds de NFR-008. Merge bloqueado si coverage global <85% o si un mГіdulo pure <100%."},{"id":"SC-019","text":"**Backcasting closed loop** вҖ” cada FR del spec MUST tener trazabilidad explГӯcita a вүҘ1 US, cada US a вүҘ1 SC, cada SC a вүҘ1 Constitution principle. Matriz verificable en robustness-v1.md В§F.1-F.3, sin orphans."},{"id":"SC-009","text":"**ConversiГіn total leads** вҖ” uplift вүҘ2Г— vs baseline en los primeros 30 dГӯas post-lanzamiento `[BASELINE-TBD]`."},{"id":"SC-010","text":"**Cobertura i18n** вҖ” 0 cadenas sin traducir en auditorГӯa automГЎtica ES y EN."},{"id":"SC-011","text":"**Matriz responsive** вҖ” 6/6 viewports (xs/sm/md/lg/xl/2xl) pasan el checklist de 12 puntos de US-5."},{"id":"SC-012","text":"**Zero scroll horizontal** вҖ” test Playwright en los 6 viewports confirma ausencia de scroll horizontal."},{"id":"SC-013","text":"**Touch targets** вҖ” 100% de elementos interactivos cumplen вүҘ44Г—44 px en xs/sm."},{"id":"SC-014","text":"**CLS** вҖ” <0.1 en xs/sm/md/lg (Core Web Vitals)."},{"id":"SC-015","text":"**Contrast** вҖ” 100% de pares foreground/background pasan WCAG AA (вүҘ4.5:1 normal, вүҘ3:1 large)."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-010","FR-011","FR-012","FR-013","FR-014","FR-015","FR-016","FR-017","FR-020","FR-021","FR-022","FR-030","FR-031","FR-032","FR-040","FR-041","FR-042","FR-043","FR-044","FR-045","FR-050","FR-051","FR-052","FR-053","FR-054","FR-055","FR-056","FR-057","FR-060","FR-061","FR-062","FR-063","FR-064","FR-065","FR-070","FR-071","FR-072","FR-080","FR-081","FR-100","FR-101","FR-102","FR-103","FR-104","FR-105","FR-106","FR-108","FR-109","FR-110","FR-111","FR-112","FR-113","FR-114","FR-115","FR-116","FR-117","FR-118","FR-119","FR-120","FR-090","FR-091","FR-092","FR-096","FR-093","FR-094","FR-095","FR-097","FR-098","FR-099","SC-001","SC ia Cloud Functions?","answer":"No. Upgrade to Blaze (pay-as-you-go). Cost is $0 at this scale. Cloud Functions are the canonical mechanism for privileged Admin SDK operations (claims, role assignment).","refs":["FR-005","FR-010","FR-012","SC-002","SC-008"]},{"session":"2026-03-23","question":"How is the 8h session timeout enforced?","answer":"Client-side idle tracking. JS timer resets on user interaction (click, keypress, navigation). After 8h idle, force signOut(). No server-side token revocation. [FR-004, US1]","refs":[]},{"session":"2026-03-23","question":"How are content versions stored for restore?","answer":"Audit log IS the version history вҖ” no separate versions collection. Restore reconstructs from audit entries and creates a new write (never overwrites history). Aligns with VI (Content Authority) and XIV (Simple First). [FR-026, FR-027, US8, SC-007]","refs":[]},{"session":"2026-03-23","question":"When is a translation considered \"stale\"?","answer":"Any save to an _es field marks the corresponding _en field as \"needs review\" (dirty flag). Flag resets when _en is saved. Empty _en fields show \"translation needed\". No timestamp comparison needed. [FR-018, US5, SC-004]","refs":[]},{"session":"2026-03-23","question":"Should FR-001 prescribe \"CDN-based\" imports?","answer":"No вҖ” \"CDN-based\" is an implementation detail that belongs in plan.md (phase-separation). FR-001 updated to \"Admin page MUST load without console errors\" without prescribing delivery mechanism. [FR-001, US1, SC-001]","refs":[]},{"session":"2026-03-23","question":"Does FR-021 cover both in-app navigation and browser close?","answer":"Yes вҖ” in-app navigation uses confirm dialog before tab switch; browser close uses `beforeunload` event. Both paths must warn if dirty state exists. [FR-021, US5, SC-004]","refs":[]},{"session":"2026-03-23","question":"Does XXI (Zero Hardcoding) apply to all FR constants (timeout, default role, TTL)?","answer":"XXI scope: security invariants and business values (bootstrap accounts, domain allowlist, pricing) MUST be configurable. Domain constants (8h timeout, \"viewer\" default role, 90-day TTL) are acceptable as code constants at 1-10 CMS users вҖ” internal parameters, not admin-managed values. [FR-004, FR-010, FR-013, Constitution XXI]","refs":[]},{"session":"2026-03-23","question":"How does \"removed domain blocks users on next token refresh\" work?","answer":"Client-side вҖ” `admin-app.js` re-checks `config/access.allowed_domains` on each `onAuthStateChanged`. Signs out if domain removed. No server-side revocation at 1-10 users (XIV Simple First). [FR-009, FR-011, US3, SC-003]","refs":[]},{"session":"2026-03-23","question":"When an invited user also matches an allowlisted domain, which provisioning path wins?","answer":"Invite takes precedence. `onUserFirstLogin` checks: (1) bootstrap, (2) invite, (3) domain. First match wins. Explicit invite role overrides generic domain default. [FR-010, FR-012, US3]","refs":[]},{"session":"2026-03-23","question":"How are concurrent edits handled вҖ” pre-save or post-save notification?","answer":"Pre-save warning via Firestore `onSnapshot`. Editors get a real-time listener; if document changes while editing, warning shown before save with options to reload or overwrite. [FR-018, US5]","refs":[]},{"session":"2026-03-23","question":"How are orphaned CMS users detected when Firebase Auth user is deleted externally?","answer":"Passive вҖ” no active Auth cross-reference at 1-10 users. Super admin manually identifies orphans and clicks \"Remove\". [FR-014, FR-016, US2]","refs":[]}]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":7,"clarificationEntries":[{"session":"2026-03-23","question":"How should existing users with old `admin: true` claim migrate to new `role: x` claim?","answer":"Both layers вҖ” (1) one-time migration script `scripts/migrate-claims.js` converts known users, (2) client-side detection in `admin-app.js`: if `token.admin === true && !token.role`, call `migrateMyRole` Cloud Function as self-healing fallback. [Phase 1, R3, data-model.md custom claims, contracts/cloud-functions.md]","refs":[]},{"session":"2026-03-23","question":"How are `last_login` and `total_sessions` updated on subsequent logins?","answer":"Client-side in `admin-app.js` onAuthStateChanged handler. Writes `last_login: serverTimestamp()`, `total_sessions: increment(1)` to own `users/{uid}` doc + audit_log entry (action: login). Logout via signOut handler + `navigator.sendBeacon()` on beforeunload (best-effort). Security rules allow self-update of `last_login`, `total_sessions` only. Socratic debate confirmed: informational fields don't warrant server-side tracking (INS-OPS-001). [Phase 2, FR-017, FR-028, data-model.md users, contracts/firestore-rules.md]","refs":[]},{"session":"2026-03-23","question":"What is the source of truth for bootstrap accounts, and how is divergence prevented?","answer":"Deploy-time environment config is sole authority. Bootstrap accounts defined in `functions.config().bootstrap.accounts` (Firebase environment config) or `.env` file вҖ” never hardcoded in source code (Constitution XXI). `onUserFirstLogin` reads env config, lazy-syncs `config/access.bootstrap_accounts` for UI display. `setUserRole` reads env config to block demotion. Firestore field is read-only mirror, not writable from client. Socratic debate ratified + amended by XXI: security invariants live in deploy-time config, not source code or runtime stores (INS-RBAC-004 v2). [Phase 1, FR-013, data-model.md config/access, contracts/cloud-functions.md onUserFirstLogin + setUserRole]","refs":[]},{"session":"2026-03-23","question":"What hash function for `config/invites/{email_hash}` doc IDs?","answer":"No hash вҖ” use sanitized email directly. Lowercase email with `.` and `@` replaced by `_` (e.g., `partner_aliado_com`). Zero crypto, directly reversible, Firestore-safe. [Phase 2, FR-012, data-model.md invites, contracts/cloud-functions.md inviteUser]","refs":[]},{"session":"2026-03-23","question":"Should there be an esbuild watch mode for development?","answer":"Yes. Add `\"watch:admin\"` npm script (`esbuild ... --watch`). Same binary, zero config, eliminates manual rebuild friction. [Phase 0, R1, quickstart.md]","refs":[]},{"session":"2026-03-23","question":"How is the 90-day audit log TTL enforced?","answer":"Firebase Scheduled Function (`onSchedule`) runs daily, queries `audit_log` where `ttl < now()`, batch deletes expired entries. Added as `cleanupExpiredAudit` in functions/index.js. [Phase 4, FR-025, data-model.md audit_log, contracts/cloud-functions.md]","refs":[]},{"session":"2026-03-23","question":"How does the page registry detect and list site pages?","answer":"Hybrid вҖ” build-time scan + Firestore overrides. (1) `scripts/build-page-registry.js` scans `**/*.html`, extracts title/meta/data-i18n counts/level, outputs `admin/data/page-registry.json`. Run as part of `build:admin`. (2) `page_overrides/{path_hash}` Firestore collection stores admin-edited metadata (title, description per lang). (3) `page-registry.js` merges JSON base + Firestore overrides. Socratic debate: filesystem facts discovered at build-time, CMS customizations in Firestore (INS-DATA-001). [Phase 4, FR-022, FR-023, FR-024, data-model.md page_overrides]","refs":[]}]},{"id":"checklist","name":"Checklist","status":"complete","progress":"100%","optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"complete","progress":null,"optional":false,"clarifications":4,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"complete","progress":"100%","optional":false,"clarifications":10,"clarifica n T034 вҖ” add explicit dependency?","answer":"Yes, add (depends on T034) to both. Prevents file-not-found if picked up before T034 completes. [T034, T035, T036]","refs":[]},{"session":"2026-03-23","question":"T054 scans `**/*.html` вҖ” should it include admin/ pages in the registry?","answer":"No, exclude admin/. The registry tracks public site pages for i18n coverage and SEO metadata. Admin pages are internal tooling. [T054]","refs":[]},{"session":"2026-03-23","question":"T055 merges Firestore page_overrides but only depends on T054 вҖ” should it also depend on T020 (security rules)?","answer":"Yes, add (depends on T054, T020). Prevents rule-denied errors during emulator development. [T055, T020]","refs":[]}]}]},"storyMap":{"stories":[],"requirements":[{"id":"FR-001","text":"Admin page MUST load without console errors [US1]"},{"id":"FR-002","text":"Admin page MUST display a branded login page with"},{"id":"FR-003","text":"System MUST authenticate via Google OAuth popup"},{"id":"FR-004","text":"System MUST enforce session timeout after 8 hours"},{"id":"FR-005","text":"System MUST support 4 roles: super_admin, admin,"},{"id":"FR-006","text":"CMS UI MUST render based on user role вҖ” hiding"},{"id":"FR-007","text":"Firestore security rules MUST validate role-based"},{"id":"FR-008","text":"System MUST prevent demotion of last super_admin"},{"id":"FR-009","text":"System MUST maintain a domain allowlist in Firestore"},{"id":"FR-010","text":"System MUST auto-assign \"viewer\" role to first-time"},{"id":"FR-011","text":"System MUST block sign-in from non-allowlisted"},{"id":"FR-012","text":"Super admin MUST be able to invite external users"},{"id":"FR-013","text":"System MUST configure initial super_admin accounts"},{"id":"FR-014","text":"CMS user records MUST be stored in a `users`"},{"id":"FR-015","text":"Users MUST be able to view and edit their profile"},{"id":"FR-016","text":"Super admins MUST be able to list, search, and"},{"id":"FR-017","text":"System MUST track la ale.","checked":true,"chkId":null,"category":"Clarity","tags":[]},{"text":"Is the \"branded login page\" in FR-002 specified with required brand elements? [Clarity, Spec FR-002] вҖ” MetodologIA brand; specific elements follow Design System (Constitution X). Sufficient as spec-level requirement.","checked":true,"chkId":null,"category":"Clarity","tags":[]},{"text":"Are the \"Request access\" instructions in US3/SC3 specified or left to implementation? [Clarity, Spec US3] вҖ” Spec defines the behavior (\"access denied with instructions to request access\"); exact copy is an implementation detail. Acceptable.","checked":true,"chkId":null,"category":"Clarity","tags":[]},{"text":"Is the \"conflict notification\" for concurrent edits defined with notification mechanism and content? [Clarity, Spec Edge Cases] вҖ” Spec says \"last-write wins with conflict notification\" as edge case behavior. Mechanism is an implementation detail for plan.md. Acceptable at spec level.","checked":true,"chkId":null,"category":"Clarity","tags":[]},{"text":"Is \"i18n coverage percentage\" in FR-022/SC-005 defined with a formula? [Clarity, Spec FR-022, SC-005] вҖ” Coverage = data-i18n keys with EN translation / total data-i18n keys. Derivable from the bilingual editing requirements (FR-018). Acceptable.","checked":true,"chkId":null,"category":"Clarity","tags":[]},{"text":"Are the \"working save\" criteria for price editor (FR-019) specified with input types and validation rules? [Clarity, Spec FR-019] вҖ” FR-019 specifies \"B2C base, B2B multipliers, and premium pricing with working save.\" Input types are implementation (plan.md defines schema). Acceptable.","checked":true,"chkId":null,"category":"Clarity","tags":[]},{"text":"Is the role hierarchy table (US2) consistent with role-gating described in FR-006, FR-025? [Consistency, Spec US2, FR-006, FR-025] вҖ” Table shows audit access for admin+; FR-025 says \"audit log viewer\" without explicit role gate, but the role hierarchy is authoritative. Plan.md architecture diagram confirms `[admin+]` for audit-viewer. Consistent.","checked":true,"chkId":null,"category":"Consistency","tags":[]},{"text":"Are FR-013 \"hardcoded\" accounts consistent with Constitution XXI (Zero Hardcoding)? [Consistency, Spec FR-013, Constitution XXI] вҖ” [Conflict] Spec FR-013 says \"hardcode initial super_admin accounts\" and the pre-configured accounts table says \"Source: Hardcoded\". Constitution XXI (v6.2.0, added after spec was drafted) mandates Zero Hardcoding. Plan clarifications resolve this: bootstrap accounts use deploy-time env config, not source code literals. **Spec needs update to align FR-013 with XXI.** вҶ’ Resolved: see Gap Resolution below.","checked":true,"chkId":null,"category":"Consistency","tags":[]},{"text":"Is the audit_log \"Create: admin+\" security rule (data-model) consistent with editors writing content audit entries? [Consistency, Spec FR-025, data-model audit_log] вҖ” Editors create content but audit entries are created by admin-api.js on behalf of authenticated users. The `admin+` rule means authenticated users with role >= editor can create audit entries. Consistent with role hierarchy.","checked":true,"chkId":null,"category":"Consistency","tags":[]},{"text":"Is US3 scenario 4 (\"block on next token refresh\") consistent with FR-009/FR-011 which don't mention token refresh timing? [Consistency, Spec US3, FR-009, FR-011] вҖ” Edge case section specifies \"block on next token refresh, not mid-session.\" FRs define the rules; edge case defines timing. Complementary, not conflicting.","checked":true,"chkId":null,"category":"Consistency","tags":[]},{"text":"FR-021 unsaved changes indicator covers both in-app navigation and browser close [Coverage, Spec FR-021, US5] вҖ” In-app: confirm dialog before tab switch or navigation. Browser close: `beforeunload` event. Both paths must warn if dirty state exists.","checked":true,"chkId":null,"category":"Data Loss Prevention","tags":[]},{"text":"XXI (Zero Hardcoding) scope: security invariants and business values (bootstrap accounts, domain allowlist, pricing) MUST be configurable. Domain constants (8h timeout, \"viewer\" default role, 90-day TTL) are acceptable as code constants at 1-10 CMS users вҖ” these are internal parameters, not admin-managed values.","checked":true,"chkId":null,"category":"Constitution XXI Compliance","tags":["Consistency, Constitution XXI, FR-004, FR-010, FR-013"]},{"text":"Are all GWT scenarios falsifiable (can clearly determine pass/fail)?","checked":true,"chkId":null,"category":"Acceptance Criteria Quality","tags":["Criteria Quality, Spec US1вҖ“US8"]},{"text":"Do acceptance scenarios cover both happy path and error cases per user story? [Coverage, Spec US1вҖ“US8] вҖ” US1 covers success + unauthorized; US2 covers CRUD + role blocking; US3 covers allowlist + deny + invite + removal. Covered.","checked":true,"chkId":null,"category":"Acceptance Criteria Quality","tags":[]},{"text":"Are acceptance scenarios specific enough for automated BDD testing?","checked":true,"chkId":null,"category":"Acceptance Criteria Quality","tags":["Criteria Quality, Spec US1вҖ“US8"]},{"text":"Does each user story define an independent test for quick validation?","checked":true,"chkId":null,"category":"Acceptance Criteria Quality","tags":["Criteria Quality, Spec US1вҖ“US8"]},{"text":"SC-001 (admin load <2s, zero errors) references testable metrics","checked":true,"chkId":null,"category":"SC-XXX Test Coverage","tags":["Coverage, Spec SC-001, FR-001"]},{"text":"SC-002 (4-role RBAC in UI + rules) covers both client and server enforcement","checked":true,"chkId":null,"category":"SC-XXX Test Coverage","tags":["Coverage, Spec SC-002, FR-005вҖ“FR-007"]},{"text":"SC-003 (domain allowlist blocks on first attempt) has matching GWT in US3","checked":true,"chkId":null,"category":"SC-XXX Test Coverage","tags":["Coverage, Spec SC-003, US3"]},{"text":"SC-004 (3 editors functional with bilingual) covers all editors in FR-018вҖ“FR-020","checked":true,"chkId":null,"category":"SC-XXX Test Coverage","tags":["Coverage, Spec SC-004, FR-018вҖ“FR-020"]},{"text":"SC-005 (81+ pages) has page registry requirements in FR-022вҖ“FR-024","checked":true,"chkId":null,"category":"SC-XXX Test Coverage","tags":["Coverage, Spec SC-005, FR-022вҖ“FR-024"]},{"text":"SC-006 (last 100 changes with filters) has audit viewer requirements in FR-025","checked":true,"chkId":null,"category":"SC-XXX Test Coverage","tags":["Coverage, Spec SC-006, FR-025"]},{"text":"SC-007 (version restore for any document) has restore requirements in FR-027","checked":true,"chkId":null,"category":"SC-XXX Test Coverage","tags":["Coverage, Spec SC-007, FR-027"]},{"text":"SC-008 (pre-configured accounts on first deploy) has bootstrap requirements in FR-013","checked":true,"chkId":null,"category":"SC-XXX Test Coverage","tags":["Coverage, Spec SC-008, FR-013"]},{"text":"Is the \"last super_admin demotion\" edge case covered by a functional requirement? [Coverage, Spec Edge Cases, FR-008] вҖ” FR-008 explicitly covers this.","checked":true,"chkId":null,"category":"Edge Case Coverage","tags":[]},{"text":"Is the \"concurrent edits\" edge case specified with enough detail for implementation? [Coverage, Spec Edge Cases] вҖ” \"Last-write wins with conflict notification\" вҖ” sufficient at spec level, implementation details in plan.md.","checked":true,"chkId":null,"category":"Edge Case Coverage","tags":[]},{"text":"Is the \"orphaned CMS user\" edge case (Firebase Auth deleted externally) covered by a functional requirement? [Coverage, Spec Edge Cases] вҖ” Edge case mentions \"cleaned up on admin review\" but no FR covers orphan detection/cleanup. [Gap] вҶ’ Deferred: P3 concern; current scope is 1-10 users where manual cleanup is viable.","checked":true,"chkId":null,"category":"Edge Case Coverage","tags":[]},{"text":"Is the \"domain removal while users are logged in\" edge case timing consistent with FR-011? [Coverage, Spec Edge Cases, FR-011] вҖ” See Consistency section above. Consistent.","checked":true,"chkId":null,"category":"Edge Case Coverage","tags":[]},{"text":"Are performance requirements defined beyond SC-001 (e.g., Firestore query response times)? [Completeness, Spec SC-001] вҖ” At 1-10 CMS users, explicit query performance requirements are unnecessary. Admin tool has no SLA. Acceptable.","checked":true,"chkId":null,"category":"Non-Functional Requirements","tags":[]},{"text":"Are accessibility requirements specified for the new admin UI elements? [Completeness, Spec global] вҖ” Constitution II (Accessibility-First) applies globally. FR-006 says \"CMS UI MUST render based on user role\" but doesn't specify ARIA attributes for role-gated elements. Acceptable: Constitution II is the governing requirement; specific ARIA patterns are implementation (plan.md).","checked":true,"chkId":null,"category":"Non-Functional Requirements","tags":[]},{"text":"Are data retention requirements specified for audit log entries? [Completeness, Spec FR-025] вҖ” Plan.md clarifies 90-day TTL with scheduled cleanup. Not in spec directly, but audit log entity description doesn't constrain retention. [Gap] вҶ’ Deferred: retention policy is an operational concern captured in plan.md and data-model.md.","checked":true,"chkId":null,"category":"Non-Functional Requirements","tags":[]},{"text":"Are error handling requirements defined for authentication failures? [Completeness, Spec US1, FR-003] вҖ” US1 scenario 3 covers unauthorized access. FR-003 specifies Google OAuth exclusively. Network errors / Firebase outages are not specified. Acceptable: admin is internal, Constitution VIII exempts admin from offline resilience.","checked":true,"chkId":null,"category":"Non-Functional Requirements","tags":[]},{"text":"Is the BUG-003 prerequisite formally linked to the feature's FR-001? [Traceability, Spec FR-001, Edge Cases] вҖ” Edge cases section and FR-001 both reference BUG-003. Clear dependency.","checked":true,"chkId":null,"category":"Dependencies & Assumptions","tags":[]},{"text":"Is the Firebase Blaze plan assumption tagged and justified? [Clarity, Spec Assumptions] вҖ” Tagged [CONFIG], justified with cost/scale rationale.","checked":true,"chkId":null,"category":"Dependencies & Assumptions","tags":[]},{"text":"Is the \"1-10 CMS users\" scale assumption referenced in requirements that depend on it? [Traceability, Spec Assumptions] вҖ” Implicit in several simplification decisions but not referenced per-FR. Acceptable: assumption section is authoritative.","checked":true,"chkId":null,"category":"Dependencies & Assumptions","tags":[]},{"text":"Are all 5 assumptions classified with evidence tags? [Traceability, Spec Assumptions] вҖ” Yes: [CODE], [DOC], [INFERENCE] x2, [CONFIG].","checked":true,"chkId":null,"category":"Dependencies & Assumptions","tags":[]}],"percentage":100,"color":"green"},{"name":"Security","filename":"security.md","total":21,"checked":21,"items":[{"text":"Are all 4 roles defined with explicit permission boundaries? [Completeness, Spec US2 role hierarchy table] вҖ” super_admin, admin, editor, viewer with Manage Users / Edit Content / View Content / View Audit columns.","checked":true,"chkId":null,"category":"Role Model Completeness","tags":[]},{"text":"Is the role hierarchy strictly ordered (no overlapping privilege sets)? [Consistency, Spec US2] вҖ” Each role is a superset of the one below: viewer вҠӮ editor вҠӮ admin вҠӮ super_admin.","checked":true,"chkId":null,"category":"Role Model Completeness","tags":[]},{"text":"Are role assignments specified as server-side only (not client-modifiable)? [Completeness, Spec FR-005, data-model users] вҖ” FR-005 says custom claims; data-model says \"Write role fields: NEVER via client вҖ” only Cloud Function.\"","checked":true,"chkId":null,"category":"Role Model Completeness","tags":[]},{"text":"Is the privilege escalation path defined (who can promote whom)? [Completeness, Spec US2, data-model state transitions] вҖ” Only super_admin can change roles. State transitions defined in data-model.md.","checked":true,"chkId":null,"category":"Role Model Completeness","tags":[]},{"text":"Are authentication requirements specified for all protected resources? [Coverage, Spec FR-003, FR-007] вҖ” FR-003: Google OAuth only. FR-007: Firestore rules validate on every write.","checked":true,"chkId":null,"category":"Access Control Boundaries","tags":[]},{"text":"Is server-side enforcement specified independently of client-side UI hiding? [Completeness, Spec FR-006, FR-007] вҖ” FR-006 handles UI gating, FR-007 handles Firestore rules. Both layers required.","checked":true,"chkId":null,"category":"Access Control Boundaries","tags":[]},{"text":"Is the domain allowlist specified with CRUD operations (add, remove, default role)? [Completeness, Spec FR-009, US3] вҖ” FR-009: maintain domain allowlist. US3 scenarios cover add/remove. Default role = viewer (FR-010).","checked":true,"chkId":null,"category":"Access Control Boundaries","tags":[]},{"text":"Are invite lifecycle states defined (pending, accepted, expired)? [Completeness, Spec data-model invites] вҖ” Yes, with transitions: pending вҶ’ accepted, pending вҶ’ expired (30-day TTL).","checked":true,"chkId":null,"category":"Access Control Boundaries","tags":[]},{"text":"Are bootstrap accounts specified as irrevocable (cannot be demoted or removed)? [Completeness, Spec FR-013, FR-008, Edge Cases] вҖ” FR-008: prevent last super_admin demotion. FR-013: initial accounts cannot be removed via UI. Edge case: system MUST prevent last-super-admin demotion.","checked":true,"chkId":null,"category":"Bootstrap and Irrevocability","tags":[]},{"text":"Is the bootstrap enforcement mechanism specified at both UI and server levels? [Completeness, Spec FR-008, FR-013] вҖ” FR-008/FR-013 define the WHAT; mechanism is plan.md concern. Both layers implied by FR-006 (UI) + FR-007 (rules).","checked":true,"chkId":null,"category":"Bootstrap and Irrevocability","tags":[]},{"text":"Are bootstrap accounts enumerated with specific emails and roles? [Completeness, Spec US3 pre-configured accounts] вҖ” Yes: 3 accounts listed with roles and source.","checked":true,"chkId":null,"category":"Bootstrap and Irrevocability","tags":[]},{"text":"Is session timeout specified with a concrete duration? [Clarity, Spec FR-004] вҖ” 8 hours of inactivity.","checked":true,"chkId":null,"category":"Session Security","tags":[]},{"text":"Is the timeout enforcement mechanism defined (client, server, or both)? [Clarity, Spec FR-004, Clarifications] вҖ” Client-side idle tracking. Clarified: timer resets on click/keypress/navigation.","checked":true,"chkId":null,"category":"Session Security","tags":[]},{"text":"Are session events (login/logout) specified for audit trail? [Coverage, Spec FR-028] вҖ” FR-028: log login/logout events in addition to content changes.","checked":true,"chkId":null,"category":"Session Security","tags":[]},{"text":"Are audit entries specified as immutable (no update/delete)? [Completeness, data-model audit_log] вҖ” Security rules: \"Update: NEVER, Delete: NEVER.\"","checked":true,"chkId":null,"category":"Audit Trail Integrity","tags":[]},{"text":"Is the audit log specified for role changes in addition to content changes? [Coverage, Spec FR-028, data-model audit_log] вҖ” Action enum includes `role_change`. role_history array also in user doc.","checked":true,"chkId":null,"category":"Audit Trail Integrity","tags":[]},{"text":"Are audit entries specified with previous and new values for diff capability? [Completeness, Spec FR-026] вҖ” FR-026: \"include previous value alongside new value for diff display.\"","checked":true,"chkId":null,"category":"Audit Trail Integrity","tags":[]},{"text":"Is the relationship between audit viewer access and roles defined? [Completeness, Spec US2 role hierarchy, US7] вҖ” Role hierarchy shows View Audit for super_admin and admin only.","checked":true,"chkId":null,"category":"Audit Trail Integrity","tags":[]},{"text":"Are Firestore security rules specified for every new collection? [Coverage, data-model] вҖ” users, config/access, config/invites, audit_log, page_overrides all have security rules defined.","checked":true,"chkId":null,"category":"Data Protection","tags":[]},{"text":"Is personal data handling defined (what's stored, who can read)? [Completeness, data-model users] вҖ” User doc fields listed with read/write rules per role level.","checked":true,"chkId":null,"category":"Data Protection","tags":[]},{"text":"Are client-side caching boundaries defined for sensitive data (roles, user lists)? [Completeness, Spec global] вҖ” Constitution VIII exempts admin from offline resilience. Cache behavior for admin data is not specified. Acceptable: internal tool, no sensitive data cached client-side beyond auth state.","checked":true,"chkId":null,"category":"Data Protection","tags":[]}],"percentage":100,"color":"green"}],"gate":{"status":"open","level":"green","label":"GATE: OPEN"}},"testify":{"requirements":[{"id":"FR-001","text":"Admin page MUST load without console errors [US1]"},{"id":"FR-002","text":"Admin page MUST display a branded login page with"},{"id":"FR-003","text":"System MUST authenticate via Google OAuth popup"},{"id":"FR-004","text":"System MUST enforce session timeout after 8 hours"},{"id":"FR-005","text":"System MUST support 4 roles: super_admin, admin,"},{"id":"FR-006","text":"CMS UI MUST render based on user role вҖ” hiding"},{"id":"FR-007","text":"Firestore security rules MUST validate role-based"},{"id":"FR-008","text":"System MUST prevent demotion of last super_admin"},{"id":"FR-009","text":"System MUST maintain a domain allowlist in Firestore"},{"id":"FR-010","text":"System MUST auto-assign \"viewer\" role to first-time"},{"id":"FR-011","text":"System MUST block sign-in from non-allowlisted"},{"id":"FR-012","text":"Super admin MUST be able to invite external users"},{"id":"FR-013","text":"System MUST configure initial super_admin accounts"},{"id":"FR-014","text":"CMS user records MUST be stored in a `u
