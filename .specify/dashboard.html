"SC-012"]},{"session":"2026-03-22","question":"Should migration sequence be defined in the spec?","answer":"No вҖ” migration order is a plan-level decision. Spec mechanism (FR-017, FR-018, dual-source) is sufficient.","refs":["FR-017","FR-018"]},{"session":"2026-03-22","question":"Should TTL configuration location be defined in the spec?","answer":"No вҖ” the \"where\" is implementation detail for plan. Spec defines \"what\" (configurable, default 1h).","refs":["FR-007"]},{"session":"2026-03-22","question":"Are migration waves parallelizable or sequential?","answer":"Sequential. XIV (Simple First) governs вҖ” shared content service requires validation before next wave. [FR-017, FR-018, Plan Migration Strategy]","refs":[]},{"session":"2026-03-22","question":"Should BDD scenarios expand to full-spectrum (XV) before tasks?","answer":"Yes вҖ” expand via testify re-run covering design system, CI/CD, operational, strategic angles. [XV, All US, All SC]","refs":[]},{"session":"2026-03-22","question":"Should evidence tags be applied retroactively?","answer":"Yes вҖ” full tagging on spec and plan for XIII compliance. Applied in this session. [XIII, All FR, All SC]","refs":[]}]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":3,"clarificationEntries":[{"session":"2026-03-22","question":"Are the 3 migration waves parallelizable or sequential?","answer":"Sequential. Shared content service module requires each wave to validate before next starts. XIV (Simple First) governs вҖ” sequential is faster for a 1-person + AI team. [Migration Strategy, XVI, XIV]","refs":[]},{"session":"2026-03-22","question":"Should BDD scenarios expand to full-spectrum coverage (XV) before tasks?","answer":"Yes вҖ” expand now via testify re-run. Full-spectrum BDD coverage required before generating tasks. [XV, Testify, Tasks]","refs":[]},{"session":"2026-03-22","question":"Should evidence tags be applied retroactively to spec and plan?","answer":"Yes вҖ” full retroactive tagging on both spec and plan for XIII compliance. [XIII, Spec, Plan]","refs":[]}]},{"id":"checklist","name":"Checklist","status":"complete","progress":"100%","optional":false,"clarifications":3,"clarificationEntries":[{"session":"2026-03-22","question":"How are admin accounts created?","answer":"CLI script with Admin SDK, documented in runbook. No UI. [CHK021, FR-008, US-4]","refs":[]},{"session":"2026-03-22","question":"Is content rollback needed?","answer":"No UI in v1. Audit log stores previous values for manual recovery. [CHK023, FR-011]","refs":[]},{"session":"2026-03-22","question":"What is audit log retention?","answer":"90 days, via Firestore TTL. [CHK022, FR-011]","refs":[]}]},{"id":"testify","name":"Testify","status":"complete","progress":null,"optional":false,"clarifications":9,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"complete","progress":"100%","optional":false,"clarifications":13,"clarificationEntries":[{"session":"2026-03-22","question":"Can Phase 6 truly run parallel with Phase 4 given T060 depends on T030/T031?","answer":"Split Phase 6 into 6a (admin UI, parallel) and 6b (integration tests, post-Phase 4). T061 split into T061a + T061b. [T060, T061, Phase 6, Dependency Table]","refs":[]},{"session":"2026-03-22","question":"Do T033/T044/T068 extend the seed script or run it?","answer":"Extend + verify. T017 creates scaffold; T033/T044/T068 add collection-specific extractors and verify seeded data. [T017, T033, T044, T068]","refs":[]},{"session":"2026-03-22","question":"Is T002 (README) duplicated by T087?","answer":"No вҖ” T002 creates placeholder (planned API), T087 updates with complete documentation post-implementation. [T002, T087]","refs":[]},{"session":"2026-03-22","question":"Where is config/settings.migrated_collections stored?","answer":"Firestore document `config/settings`, updated via seed script or Firebase Console. [T085, T012, T019]","refs":[]},{"session":"2026-03-22","question":"Can T061 complete if Phase 6 runs parallel with Phase 4?","answer":"Split T061 into T061a (admin-only tests, completes with Phase 6a) and T061b (integration tests, completes after Phase 4). [T061, T060, Phase 6]","refs":[]},{"session":"2026-03-22","question":"Are migration waves (Phase 4вҶ’5вҶ’7) sequential by technical dependency or by choice?","answer":"Intentional risk control (Constitution XIV + XVI). Sequential execution reduces debugging surface вҖ” one content type fully validated before starting next. Not a technical dependency; the methods are independent. Sequential-first is the default (XVI v5.2.0). [Phase 4, Phase 5, Phase 7, Dependency Table, Critical Path]","refs":[]},{"session":"2026-03-22","question":"Is T055 (admin shell) too large for a single task?","answer":"Yes. Split into T055a (shell + auth gate) and T055b (tab nav + ARIA + keyboard). One concern per task, one TDD cycle per task. Task atomicity rule added to Constitution XIV. [T055, T055a, T055b, Phase 6]","refs":[]},{"session":"2026-03-22","question":"Are hardcoded line numbers in T033/T044 fragile?","answer":"Yes. Replace with semantic selectors (DOM structure, data attributes, regex on named patterns like `B2B_MULTIPLIERS`). Line numbers break when upstream tasks modify the same files. [T033, T044]","refs":[]},{"session":"2026-03-22","question":"Should admin editors (T057-T059) and AdminAPI (T054) have unit tests, or are E2E tests sufficient?","answer":"C-full вҖ” unit tests for all 4 modules (T053a-T053d). Socratic debate confirmed: AdminAPI (sanitization, audit) and program-editor (bilingual validation) are high-risk logic that E2E doesn't isolate. price-editor and i18n-editor are marginal but kept for IX/XV consistency вҖ” low effort, complete TDD coverage. XIV tension resolved: E2E tests cover journeys, not edge cases of isolated logic. [T053a, T053b, T053c, T053d, T054, T057, T058, T059, Phase 6]","refs":[]},{"session":"2026-03-22","question":"MigrationBridge (T019) has no unit test вҖ” TDD violation?","answer":"Add T009b for MigrationBridge unit tests (dual-source resolve, migrated_collections check, static fallback, null-when-both-fail). T019 must pass T009b. TS-030 E2E coverage in Phase 8 is insufficient for TDD compliance. [T009b, T019, T077, Phase 2]","refs":[]},{"session":"2026-03-22","question":"AuthService (T013) has no unit test вҖ” TDD violation?","answer":"Add T009c for AuthService unit tests (isAdmin claim check, onAuthStateChanged subscription, sign-out cleanup). T013 must pass T009c. Consistent with IX/XV reasoning from T053a-d session. [T009c, T013, Phase 2]","refs":[]},{"session":"2026-03-22","question":"T019 and T032 both mention \"static fallback in MigrationBridge\" вҖ” scope overlap?","answer":"Clarify boundary: T019 is content-agnostic data resolver (Firestore вҶ’ cache вҶ’ null). T032 is program-specific null handler (preserve inline HTML when null). MigrationBridge never touches DOM вҖ” consumers decide what null means. Socratic debate confirmed: separation of concerns (data vs render), XIV atomicity, and Phase 2/4 dependency direction all favor B. [T019, T032, Phase 2, Phase 4]","refs":[]},{"session":"2026-03-22","question":"T079 \"catch Firestore errors silently\" вҖ” does \"silently\" mean no logging?","answer":"No. \"Silently\" = no user-visible errors (no toasts, banners, error screens). Errors MUST log to console.warn for developer observability. Cache fallback is the user-facing behavior; console.warn is the developer-facing signal. [T079, Phase 8]","refs":[]}]}]},"storyMap":{"stories":[{"id":"US1","title":"Program Catalog from Cloud","priority":"P1","scenarioCount":5,"body":"An administrator updates a program's description, benefits, or transformation text via an admin interface, and the change appears on the live site within seconds вҖ” no code deployment required. Visitors on empresas/ and personas/ pages see content fetched from Firestore instead of hardcoded JS objects.\n\n**Why this priority**: Program catalogs are the highest-churn content (6 programs Г— 2 audiences Г— 2 languages). [INFERENCE] Currently hardcoded in `empresas/index.html:360-445` and `personas/index.html:412-458` as inline JS objects, requiring a developer for every text change. [CODE]\n\n**Independent Test**: Update a program description in the admin interface, refresh the public page without deploying, confirm the new text appears.\n\n**Acceptance Scenarios**:\n\n1. **Given** a program catalog document exists in Firestore for \"DiagnГіstico\", **When** a visitor loads empresas/index.html, **Then** the program card displays title, tagline, description, benefits, and transformation from Firestore вҖ” not from inline JS.\n2. **Given** an admin updates the \"Estrategia\" program description in the admin interface, **When** a visitor reloads the page, **Then** the updated description appears without any code deployment.\n3. **Given** the Firestore backend is unreachable, **When** a visitor loads any program page, **Then** the page displays cached content from the last successful fetch вҖ” never a blank card or error state.\n4. **Given** a program has both ES and EN content in Firestore, **When** the visitor switches language via the toggle, **Then** the program card text updates to the selected language using content from the same Firestore document.\n5. **Given** the site is loaded for the first time on a slow connection (3G), **When** Firestore content loads, **Then** program cards render within 2 seconds or fall back to embedded HTML text.","clarificationCount":8},{"id":"US2","title":"Pricing from Cloud","priority":"P1","scenarioCount":5,"body":"All pricing data (B2C base prices, B2B multipliers, premium SKU prices, cotizador program details) is stored in Firestore and fetched at runtime. Price changes made by an admin take effect immediately across cotizadores and the premium catalog.\n\n**Why this priority**: Prices change frequently (last update: 50% increase on premium, March 2026). [CODE] Currently scattered across `data-price` attributes, JS constants in `cotizador.js`, and HTML table rows вҖ” 3+ files for one price change. [CODE]\n\n**Independent Test**: Change a price in the admin interface, reload the cotizador, confirm the new price appears in calculations.\n\n**Acceptance Scenarios**:\n\n1. **Given** B2C base prices are stored in Firestore, **When** a visitor loads the cotizador, **Then** checkbox prices and total calculations use Firestore values вҖ” not hardcoded `data-price` attributes.\n2. **Given** B2B multipliers are stored in Firestore, **When** the empresas cotizador calculates a total, **Then** it uses Firestore multipliers instead of inline JS constants.\n3. **Given** premium resource prices are stored in Firestore, **When** a visitor loads recursos/premium/index.html, **Then** the pricing table displays Firestore values.\n4. **Given** an admin changes the \"Bootcamp\" base price from 920,000 to 1,100,000 COP, **When** a visitor loads the cotizador, **Then** the new price is reflected in all calculations.\n5. **Given** Firestore is unreachable, **When** a visitor uses the cotizador, **Then** cached prices are used and calculations work correctly вҖ” no NaN or broken totals.","clarificationCount":8},{"id":"US3","title":"Translations from Cloud","priority":"P2","scenarioCount":5,"body":"The i18n translation dictionaries (currently `es.json` and `en.json` at ~15K tokens each) are stored in Firestore and fetched at runtime. Translation updates made by an admin take effect without deployment. The existing `data-i18n` attribute contract remains unchanged.\n\n**Why this priority**: Translations are stable but growing (every new page adds keys). [INFERENCE] Moving to Firestore enables admin editing and eliminates the need to deploy for copy corrections. [INFERENCE]\n\n**Independent Test**: Update a translation key in the admin interface, reload the page, confirm the new text appears.\n\n**Acceptance Scenarios**:\n\n1. **Given** translations are stored in Firestore, **When** the i18n module initializes, **Then** it fetches translations from Firestore instead of static JSON files.\n2. **Given** the `data-i18n` attribute contract exists on page elements, **When** translations are fetched from Firestore, **Then** elements translate identically to the current static JSON behavior.\n3. **Given** an admin corrects a typo in the EN translation for \"nav.contact\", **When** a visitor reloads the page in EN mode, **Then** the corrected text appears.\n4. **Given** Firestore is unreachable on first visit, **When** the i18n module initializes, **Then** it falls back to the bundled static JSON files (es.json/en.json) вҖ” translations still work.\n5. **Given** a visitor has cached translations from a previous visit, **When** Firestore has newer translations, **Then** the cache is updated within a defined staleness window (configurable, default 1 hour).","clarificationCount":8},{"id":"US4","title":"Admin Interface","priority":"P1","scenarioCount":6,"body":"An authenticated administrator accesses a content editor at a protected route (e.g., `/admin/`) to view, edit, and publish content (programs, prices, translations). The admin interface enforces validation, requires both ES and EN variants before publishing, and logs all changes.\n\n**Why this priority**: Without an admin interface, the CMS has no user-facing value вҖ” content would still require a developer to edit Firestore directly. [INFERENCE]\n\n**Independent Test**: Log in as admin, edit a program description, save, verify the change appears on the public page.\n\n**Acceptance Scenarios**:\n\n1. **Given** a user navigates to /admin/, **When** they are not authenticated, **Then** they see a login screen вҖ” not the content editor.\n2. **Given** an authenticated admin opens the content editor, **When** they select \"Programs\", **Then** they see all 6 programs with their current ES and EN content side-by-side.\n3. **Given** an admin edits the \"Ventas\" program description, **When** they submit with only the ES field filled, **Then** the save is blocked with a validation error: \"EN translation required.\"\n4. **Given** an admin saves a valid edit (both languages present), **When** the save completes, **Then** a change log entry is created with timestamp, admin ID, field changed, and previous value.\n5. **Given** a non-admin authenticated user attempts to access /admin/, **When** the page loads, **Then** access is denied вҖ” the admin interface requires the \"admin\" role, not just authentication.\n6. **Given** the admin interface is open, **When** inspecting client-side code, **Then** no API keys, service account credentials, or admin secrets are exposed in the browser.","clarificationCount":8},{"id":"US5","title":"Offline Resilience & Caching","priority":"P2","scenarioCount":5,"body":"The site caches all Firestore content (programs, prices, translations) client-side after the first successful fetch. When Firestore is unreachable, the site serves cached content transparently. Cache staleness is bounded by a configurable TTL.\n\n**Why this priority**: Constitution VIII mandates offline resilience. [DOC] The site serves users across Latin America with variable connectivity вҖ” a backend dependency must not reduce reliability. [INFERENCE]\n\n**Independent Test**: Load the site once (populates cache), disconnect from internet, reload вҖ” site still works with cached content.\n\n**Acceptance Scenarios**:\n\n1. **Given** a visitor has loaded the site at least once, **When** they return with no internet connection, **Then** all pages display cached content (programs, prices, translations) вҖ” no blank sections or error states.\n2. **Given** cached content exists but is older than the TTL, **When** the visitor loads a page with connectivity, **Then** fresh content is fetched from Firestore and the cache is updated.\n3. **Given** cached content exists and is within the TTL, **When** the visitor loads a page, **Then** the cached content is used immediately (no Firestore fetch) for instant rendering.\n4. **Given** the cache contains prices from a previous session, **When** the admin has updated prices and the cache TTL has expired, **Then** the next page load fetches the new prices and updates the cache.\n5. **Given** Firestore becomes unreachable during a visit (mid-session), **When** the visitor navigates to a new page, **Then** the page renders from cache вҖ” no interruption to the browsing experience.","clarificationCount":8},{"id":"US6","title":"Security Rules & Access Control","priority":"P1","scenarioCount":6,"body":"Firestore security rules enforce that public visitors can only read published content, and only authenticated users with the \"admin\" role can write. Rules are version-controlled, tested before deployment, and follow least-privilege principles.\n\n**Why this priority**: Constitution VII mandates data-layer security. [DOC] A CMS is write-capable вҖ” without enforceable rules, any client-side restriction can be bypassed. [INFERENCE]\n\n**Independent Test**: Attempt to write to Firestore from an unauthenticated browser session вҖ” confirm the write is denied.\n\n**Acceptance Scenarios**:\n\n1. **Given** a public visitor (unauthenticated), **When** they attempt to read program content from Firestore, **Then** the read succeeds вҖ” public content is readable by anyone.\n2. **Given** a public visitor (unauthenticated), **When** they attempt to write to any Firestore collection, **Then** the write is denied by security rules.\n3. **Given** an authenticated user without the \"admin\" custom claim, **When** they attempt to write to Firestore, **Then** the write is denied вҖ” authentication alone is insufficient.\n4. **Given** an authenticated user with the \"admin\" custom claim, **When** they write to the programs collection, **Then** the write succeeds and is validated by the security rules (schema validation: required fields present, both languages present).\n5. **Given** the security rules file, **When** reviewed in version control, **Then** every collection has explicit read/write rules вҖ” no wildcards or open permissions.\n6. **Given** a Firestore security rules test suite, **When** run against the Firebase Emulator, **Then** all positive and negative access scenarios pass.","clarificationCount":8}],"requirements":[{"id":"FR-001","text":"Program catalog content (title, tagline, description, benefits, transformation, icon) MUST be stored in Firestore and fetched at runtime on empresas/ and personas/ pages."},{"id":"FR-002","text":"All pricing data (B2C base prices, B2B multipliers, cotizador program details, premium SKU prices) MUST be stored in Firestore and fetched at runtime."},{"id":"FR-003","text":"Translation dictionaries (ES and EN) MUST be stored in Firestore and fetchable at runtime by the i18n module."},{"id":"FR-004","text":"The i18n module MUST maintain the existing `data-i18n` attribute contract regardless of whether translations come from static JSON or Firestore."},{"id":"FR-005","text":"All Firestore content MUST be cached client-side (IndexedDB or localStorage) after the first successful fetch."},{"id":"FR-006","text":"When Firestore is unreachable, the site MUST display cached content вҖ” never a blank page, error state, or broken UI."},{"id":"FR-007","text":"Cache staleness MUST be bounded by a configurable TTL (default: 1 hour). Stale cache MUST trigger a background refresh on next page load when connectivity is available."},{"id":"FR-008","text":"An admin interface MUST be accessible at a protected route, requiring Firebase Authentication with the \"admin\" custom claim."},{"id":"FR-009","text":"The admin interface MUST allow editing programs, prices, and translations with side-by-side ES/EN editing."},{"id":"FR-010","text":"The admin interface MUST block publishing if any required field is empty or if a language variant is missing."},{"id":"FR-011","text":"All admin edits MUST be logged with timestamp, admin identity, field changed, and previous value. Audit logs MUST have a bounded retention period (default: 90 days)."},{"id":"FR-012","text":"Firestore security rules MUST enforce: public read for published content, write restricted to authenticated users with \"admin\" custom claim."},{"id":"FR-013","text":"Security rules MUST validate document schema on write вҖ” required fields, data types, both language variants present."},{"id":"FR-014","text":"Security rules MUST be version-controlled in the repository and tested against the Firebase Emulator before deployment."},{"id":"FR-015","text":"No API keys, service account credentials, or admin secrets MUST appear in client-side code. Firebase client config (public) is the only exception."},{"id":"FR-016","text":"A centralized content service module MUST mediate all Firestore access вҖ” no scattered inline queries across pages."},{"id":"FR-017","text":"During the migration period, the content service MUST support dual-source resolution: Firestore first, static HTML/JS fallback if the content has not yet been migrated."},{"id":"FR-018","text":"Each piece of editable content MUST have exactly one authoritative source вҖ” never both Firestore and HTML simultaneously for the same content."},{"id":"FR-019","text":"Bilingual content MUST be stored together in a single document (both ES and EN variants) вҖ” not in separate collections per language."},{"id":"FR-020","text":"Content changes via the admin interface MUST take effect immediately вҖ” no deployment step required."},{"id":"FR-021","text":"Dynamic content fetched from Firestore MUST be present in the DOM within 2 seconds on a 3G connection, or the page MUST fall back to cached/static content."},{"id":"FR-022","text":"The admin interface MUST meet accessibility standards (Constitution II) вҖ” keyboard-navigable, proper ARIA attributes, color contrast compliance."},{"id":"FR-023","text":"Admin input MUST be sanitized вҖ” no raw HTML stored in Firestore. Content is plain text or structured data only."}],"successCriteria":[{"id":"SC-001","text":"100% of program catalog content on empresas/ and personas/ is sourced from Firestore (zero inline JS program objects remain)."},{"id":"SC-002","text":"100% of pricing data across cotizadores and premium catalog is sourced from Firestore (zero hardcoded `data-price` attributes or JS constants remain)."},{"id":"SC-003","text":"Translation dictionaries are fetchable from Firestore; existing Playwright bilingual test suites continue to pass at 100%."},{"id":"SC-004","text":"Site functions fully offline after first visit вҖ” all Firestore-sourced content available from cache with zero blank sections."},{"id":"SC-005","text":"Firestore security rules pass 100% of positive/negative test cases in the Emulator."},{"id":"SC-006","text":"Admin interface requires authentication + \"admin\" custom claim вҖ” unauthenticated and non-admin users are denied access."},{"id":"SC-007","text":"Admin interface blocks save when required fields or language variants are missing вҖ” zero partial content published."},{"id":"SC-008","text":"Zero API keys or secrets exposed in client-side code (verified by grep scan of deployed assets)."},{"id":"SC-009","text":"Content updates via admin interface appear on the public site within 5 seconds without deployment."},{"id":"SC-010","text":"Lighthouse Performance score remains >= 90 on homepage, empresas/, personas/ after migration."},{"id":"SC-011","text":"Firestore content renders within 2 seconds on 3G or falls back to cache/static within the same window."},{"id":"SC-012","text":"All admin edits produce an audit log entry with timestamp, admin ID, field, and previous value."},{"id":"SC-013","text":"During migration, pages with non-migrated content continue to function from static HTML/JS вҖ” zero regressions."}],"clarifications":[{"session":"2026-03-22","question":"How are admin accounts created and managed?","answer":"CLI script using Firebase Admin SDK `setCustomUserClaims`. No admin management UI in v1. Documented in runbook. Firebase Console cannot set custom claims directly. [FR-008, US-4, SC-006, Edge Cases]","refs":[]},{"session":"2026-03-22","question":"Is content rollback needed when an admin publishes incorrect content?","answer":"No rollback UI in v1. Audit log (FR-011) stores previous values for manual recovery. Re-editing is faster than rollback infrastructure for 1-3 admins editing text. [FR-011, US-4, Edge Cases]","refs":[]},{"session":"2026-03-22","question":"What is the audit log retention policy?","answer":"90-day retention, implementable via Firestore TTL fields. Prevents unbounded growth.","refs":["FR-011","SC-012"]},{"session":"2026-03-22","question":"Should migration sequence be defined in the spec?","answer":"No вҖ” migration order is a plan-level decision. Spec mechanism (FR-017, FR-018, dual-source) is sufficient.","refs":["FR-017","FR-018"]},{"session":"2026-03-22","question":"Should TTL configuration location be defined in the spec?","answer":"No вҖ” the \"where\" is implementation detail for plan. Spec defines \"what\" (configurable, default 1h).","refs":["FR-007"]},{"session":"2026-03-22","question":"Are migration waves parallelizable or sequential?","answer":"Sequential. XIV (Simple First) governs вҖ” shared content service requires validation before next wave. [FR-017, FR-018, Plan Migration Strategy]","refs":[]},{"session":"2026-03-22","question":"Should BDD scenarios expand to full-spectrum (XV) before tasks?","answer":"Yes вҖ” expand via testify re-run covering design system, CI/CD, operational, strategic angles. [XV, All US, All SC]","refs":[]},{"session":"2026-03-22","question":"Should evidence tags be applied retroactively?","answer":"Yes вҖ” full tagging on spec and plan for XIII compliance. Applied in this session. [XIII, All FR, All SC]","refs":[]}],"edges":[{"from":"US6","to":"FR-011"},{"from":"US6","to":"FR-001"},{"from":"US6","to":"FR-002"},{"from":"US6","to":"FR-003"},{"from":"US6","to":"FR-004"},{"from":"US6","to":"FR-005"},{"from":"US6","to":"FR-006"},{"from":"US6","to":"FR-007"},{"from":"US6","to":"FR-008"},{"from":"US6","to":"FR-009"},{"from":"US6","to":"FR-010"},{"from":"US6","to":"FR-012"},{"from":"US6","to":"FR-013"},{"from":"US6","to":"FR-014"},{"from":"US6","to":"FR-015"},{"from":"US6","to":"FR-016"},{"from":"US6","to":"FR-017"},{"from":"US6","to":"FR-018"},{"from":"US6","to":"FR-019"},{"from":"US6","to":"FR-020"},{"from":"US6","to":"FR-021"},{"from":"US6","to":"FR-022"},{"from":"US6","to":"FR-023"}]},"planView":{"techContext":[{"label":"Language/Version","value":"JavaScript ES2020+ (vanilla, no transpiler вҖ” matches existing codebase) [CODE]"},{"label":"Primary Dependencies","value":"Firebase JS SDK v10 (modular/tree-shakeable: `firebase/app`, `firebase/firestore`, `firebase/auth`), `idb` (IndexedDB wrapper, ~1KB gzipped) [DOC]"},{"label":"Storage","value":"Cloud Firestore (document store) + IndexedDB (client-side cache) [DOC]"},{"label":"Testing","value":"Playwright (existing, for E2E), Firebase Emulator Suite (security rules + integration), Vitest (unit tests for content service) [INFERENCE]"},{"label":"Target Platform","value":"Modern browsers (Chrome 90+, Firefox 90+, Safari 15+, Edge 90+) [INFERENCE]"},{"label":"Project Type","value":"Web application (existing static site + new admin SPA) [CODE]"},{"label":"Performance Goals","value":"Firestore content renders within 2s on 3G (SC-011), Lighthouse >= 90 (SC-010) [DOC]"},{"label":"Constraints","value":"Offline-capable (Constitution VIII), no custom servers (Constitution I), data-layer security (Constitution VII), zero secrets in client code (FR-015) [DOC]"},{"label":"Scale/Scope","value":"63+ pages, 6 programs Г— 2 audiences Г— 2 languages, ~15K translation tokens, 1-3 admins [CODE]"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/004-firebase-cms-backend","entries":[]},"diagram":{"nodes":[],"edges":[],"raw":"+------------------+     +-------------------+     +------------------+\n|                  |     |                   |     |                  |\n|  Browser (SPA)   |---->| Content Service   |---->| Cloud Firestore  |\n|  Public Pages    |     | (js/cms/)         |     | (programs,       |\n|  + Admin Page    |     |  - fetch          |     |  prices,         |\n|                  |     |  - cache (IDB)    |     |  translations,   |\n+------------------+     |  - fallback       |     |  audit_log)      |\n        |                +-------------------+     +------------------+\n        |                        |                         |\n        v                        v                         |\n+------------------+     +-------------------+             |\n| Firebase Auth    |     | IndexedDB Cache   |             |\n| (Google sign-in  |     | (offline content) |             |\n|  + admin claim)  |     +-------------------+             |\n+------------------+                                       |\n        |                                                  |\n        v                                                  v\n+------------------+                              +------------------+\n| Admin UI         |                              | Security Rules   |\n| (/admin/)        |                              | (firestore.rules)|\n| - program editor |                              | - public read    |\n| - price editor   |                              | - admin write    |\n| - i18n editor    |                              | - schema valid.  |\n+------------------+                              +------------------+\n"},"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.9.8","eval":null,"reviewScore":85},{"name":"tessl-labs/quickstart-debug-api-endpoints","version":"1.0.5","eval":null,"reviewScore":63},{"name":"JaviMontano/jm-agentic-development-kit","version":"a174232ae3eec7600c1a29a2b4c04c7798eec17c","eval":null,"reviewScore":null},{"name":"tessl/npm-firebase","version":"12.2.0","eval":null,"reviewScore":null},{"name":"tessl/npm-firebase-functions","version":"6.4.0","eval":null,"reviewScore":null},{"name":"tessl/npm-firebase-tools","version":"14.15.0","eval":null,"reviewScore":null},{"name":"tessl-labs/web-accessibility-essentials","version":"0.2.2","eval":null,"reviewScore":93},{"name":"tessl/npm-playwright--test","version":"1.55.0","eval":null,"reviewScore":null},{"name":"tessl-labs/playwright-testing","version":"0.2.0","eval":null,"reviewScore":98}],"exists":true},"checklist":{"files":[{"name":"Requirements","filename":"requirements.md","total":61,"checked":61,"items":[{"text":"CHK001 No implementation details in spec (technology-agnostic beyond Firebase mandate from Constitution)","checked":true,"chkId":null,"category":"Content Quality","tags":[]},{"text":"CHK002 All requirements use MUST/SHOULD/MAY language","checked":true,"chkId":null,"category":"Content Quality","tags":[]},{"text":"CHK003 No framework/library names in requirements beyond Firebase (constitutionally mandated BaaS)","checked":true,"chkId":null,"category":"Content Quality","tags":[]},{"text":"CHK004 Success criteria are measurable with numbers","checked":true,"chkId":null,"category":"Content Quality","tags":[]},{"text":"CHK005 User stories describe WHAT and WHY, not HOW","checked":true,"chkId":null,"category":"Content Quality","tags":[]},{"text":"CHK006 All Constitution v4.0.0 principles addressed (I-XII + XIII-XVI) [Completeness, Constitution] вҖ” Plan constitution check table verifies PASS on all 16 principles. Spec input references I, VI, VII, VIII, IX, XII, XIII, XIV, XV, XVI.","checked":true,"chkId":null,"category":"Requirement Completeness","tags":[]},{"text":"CHK007 All content types identified for migration (programs, prices, translations, premium SKUs)","checked":true,"chkId":null,"category":"Requirement Completeness","tags":[]},{"text":"CHK008 Migration coexistence addressed (dual-source resolution in FR-017)","checked":true,"chkId":null,"category":"Requirement Completeness","tags":[]},{"text":"CHK009 Edge cases documented (migration period, broken input, concurrent edits, quota exceeded, new programs)","checked":true,"chkId":null,"category":"Requirement Completeness","tags":[]},{"text":"CHK010 Priority levels assigned (P1: 4 stories, P2: 2 stories)","checked":true,"chkId":null,"category":"Requirement Completeness","tags":[]},{"text":"CHK011 Each user story independently testable","checked":true,"chkId":null,"category":"Requirement Completeness","tags":[]},{"text":"CHK012 Admin interface requirements include validation, audit logging, and accessibility","checked":true,"chkId":null,"category":"Requirement Completeness","tags":[]},{"text":"CHK013 Branch created: `004-firebase-cms-backend`","checked":true,"chkId":null,"category":"Feature Readiness","tags":[]},{"text":"CHK014 Spec file written: `specs/004-firebase-cms-backend/spec.md`","checked":true,"chkId":null,"category":"Feature Readiness","tags":[]},{"text":"CHK015 No [NEEDS CLARIFICATION] markers remain","checked":true,"chkId":null,"category":"Feature Readiness","tags":[]},{"text":"CHK016 Success criteria cover all functional requirements","checked":true,"chkId":null,"category":"Feature Readiness","tags":[]},{"text":"CHK017 Acceptance scenarios use Given/When/Then format","checked":true,"chkId":null,"category":"Feature Readiness","tags":[]},{"text":"CHK018 Content authority principle (VI) enforced вҖ” single source of truth per content piece","checked":true,"chkId":null,"category":"Brand & Standards Alignment","tags":[]},{"text":"CHK019 Security principle (VII) enforced вҖ” data-layer security, managed identity, no client secrets","checked":true,"chkId":null,"category":"Brand & Standards Alignment","tags":[]},{"text":"CHK020 Offline resilience principle (VIII) enforced вҖ” caching, fallback, degraded mode","checked":true,"chkId":null,"category":"Brand & Standards Alignment","tags":[]},{"text":"CHK021 Admin provisioning mechanism defined (CLI script + runbook, no admin management UI in v1)","checked":true,"chkId":null,"category":"Admin & Operations","tags":[]},{"text":"CHK022 Audit log retention policy specified (90-day bounded retention via Firestore TTL)","checked":true,"chkId":null,"category":"Admin & Operations","tags":[]},{"text":"CHK023 Content recovery mechanism addressed (manual via audit log, no rollback UI in v1)","checked":true,"chkId":null,"category":"Admin & Operations","tags":[]},{"text":"CHK024 Is the \"configurable TTL\" (FR-007) clear about WHO configures it and WHERE? [Clarity, FR-007] вҖ” Yes: spec says configurable with default 1h; plan locates it in `config/settings.cache_ttl_ms`; admin-writable. Clarification session confirms \"where\" is plan-level.","checked":true,"chkId":null,"category":"Clarity & Ambiguity (post-plan review)","tags":[]},{"text":"CHK025 Is the \"sanitized input\" requirement (FR-023) specific about what sanitization means? [Clarity, FR-023] вҖ” Yes: \"no raw HTML stored, plain text or structured data only.\" Edge case section reinforces: \"no unclosed HTML tags.\"","checked":true,"chkId":null,"category":"Clarity & Ambiguity (post-plan review)","tags":[]},{"text":"CHK026 Is the \"within 2 seconds on 3G\" performance target (FR-021) defined with a measurement method? [Clarity, SC-011] вҖ” Measurable: 2s on 3G is a Lighthouse throttled network profile. SC-010 adds Lighthouse >= 90 as a cross-check.","checked":true,"chkId":null,"category":"Clarity & Ambiguity (post-plan review)","tags":[]},{"text":"CHK027 Is the concurrent edit behavior (Edge Cases) clear about conflict resolution strategy? [Clarity, Edge Cases] вҖ” Yes: \"last-write-wins with a warning\" and \"content was modified by another user alert if document version has changed.\" Sufficient for 1-3 admins.","checked":true,"chkId":null,"category":"Clarity & Ambiguity (post-plan review)","tags":[]},{"text":"CHK028 Does the plan's Firestore collection structure match the content types in spec FR-001 through FR-003? [Consistency, FR-001/002/003 вҶ’ data-model.md] вҖ” Yes: `programs`, `pricing`, `translations` collections map 1:1 to FR-001 (programs), FR-002 (pricing), FR-003 (translations).","checked":true,"chkId":null,"category":"Consistency (spec вҶ” plan вҶ” constitution)","tags":[]},{"text":"CHK029 Does the plan's bilingual document schema (`title_es`/`title_en`) satisfy FR-019 (bilingual content in single document)? [Consistency, FR-019 вҶ’ data-model.md] вҖ” Yes: all bilingual fields stored as `{field}_es`/`{field}_en` in the same document.","checked":true,"chkId":null,"category":"Consistency (spec вҶ” plan вҶ” constitution)","tags":[]},{"text":"CHK030 Does the plan's `migration-bridge.js` satisfy FR-017 (dual-source) and FR-018 (single authority)? [Consistency, FR-017/018 вҶ’ plan.md] вҖ” Yes: migration bridge checks `migrated_collections` config; collections not listed fall back to static; authority is clear per collection.","checked":true,"chkId":null,"category":"Consistency (spec вҶ” plan вҶ” constitution)","tags":[]},{"text":"CHK031 Does the plan's auth approach (Google sign-in + custom claims) satisfy FR-008 (admin custom claim)? [Consistency, FR-008 вҶ’ research.md R3] вҖ” Yes: Firebase Auth with Google provider, custom claims checked by security rules and `AuthService.isAdmin()`.","checked":true,"chkId":null,"category":"Consistency (spec вҶ” plan вҶ” constitution)","tags":[]},{"text":"CHK032 Is the plan's security rules design consistent with FR-012 (public read, admin write) and FR-013 (schema validation)? [Consistency, FR-012/013 вҶ’ data-model.md] вҖ” Yes: data-model defines validation rules per collection; plan structure includes `firestore.rules` file.","checked":true,"chkId":null,"category":"Consistency (spec вҶ” plan вҶ” constitution)","tags":[]},{"text":"CHK033 Does the plan's caching strategy (IndexedDB + TTL) align with FR-005 (client-side cache), FR-006 (display cached), and FR-007 (bounded TTL)? [Consistency, FR-005/006/007 вҶ’ research.md R2] вҖ” Yes: IndexedDB cache with `cachedAt` timestamp, configurable TTL, stale-while-revalidate pattern.","checked":true,"chkId":null,"category":"Consistency (spec вҶ” plan вҶ” constitution)","tags":[]},{"text":"CHK034 Does every user story have at least one offline/failure scenario? [Scenario Coverage, US-1/2/3/4/5/6] вҖ” Yes: US-1 scenario 3 (unreachable), US-2 scenario 5 (NaN prevention), US-3 scenario 4 (first-visit fallback), US-4 scenario 6 (no secrets), US-5 scenarios 1+5 (offline), US-6 scenarios 2+3 (denial).","checked":true,"chkId":null,"category":"Acceptance Criteria Quality","tags":[]},{"text":"CHK035 Do acceptance scenarios for US-1 cover both audiences (empresas + personas)? [Scenario Coverage, US-1] вҖ” Scenario 1 explicitly names empresas; spec input references both. FR-001 says \"empresas/ and personas/ pages.\" Covered.","checked":true,"chkId":null,"category":"Acceptance Criteria Quality","tags":[]},{"text":"CHK036 Do acceptance scenarios for US-2 cover all pricing categories (B2C, B2B, premium)? [Scenario Coverage, US-2] вҖ” Yes: scenario 1 (B2C), scenario 2 (B2B multipliers), scenario 3 (premium), scenario 4 (price change propagation).","checked":true,"chkId":null,"category":"Acceptance Criteria Quality","tags":[]},{"text":"CHK037 Do acceptance scenarios cover the \"first visit with no cache\" edge case? [Scenario Coverage, US-1/3/5] вҖ” US-1 scenario 5 (3G first load), US-3 scenario 4 (unreachable on first visit, falls back to static JSON), US-5 implicitly (requires \"loaded at least once\").","checked":true,"chkId":null,"category":"Acceptance Criteria Quality","tags":[]},{"text":"CHK038 Is there an acceptance scenario for admin role escalation prevention (non-admin user)? [Scenario Coverage, US-4/6] вҖ” Yes: US-4 scenario 5 (non-admin denied) and US-6 scenario 3 (authenticated without admin claim denied).","checked":true,"chkId":null,"category":"Acceptance Criteria Quality","tags":[]},{"text":"CHK039 Does SC-001 (100% programs from Firestore) have a clear verification method? [Measurability, SC-001] вҖ” Yes: \"zero inline JS program objects remain\" вҖ” verifiable by grep scan for `programsData` in HTML files.","checked":true,"chkId":null,"category":"SC-XXX Test Coverage","tags":[]},{"text":"CHK040 Does SC-002 (100% pricing from Firestore) have a clear verification method? [Measurability, SC-002] вҖ” Yes: \"zero hardcoded data-price attributes or JS constants\" вҖ” verifiable by grep scan.","checked":true,"chkId":null,"category":"SC-XXX Test Coverage","tags":[]},{"text":"CHK041 Does SC-005 (security rules pass 100%) reference a test suite? [Measurability, SC-005] вҖ” Yes: FR-014 requires rules tested against Firebase Emulator; plan includes `tests/integration/firestore-rules.test.js`.","checked":true,"chkId":null,"category":"SC-XXX Test Coverage","tags":[]},{"text":"CHK042 Does SC-008 (zero secrets in client code) have an automated verification? [Measurability, SC-008] вҖ” Yes: \"verified by grep scan of deployed assets.\" Plan can implement this as CI step.","checked":true,"chkId":null,"category":"SC-XXX Test Coverage","tags":[]},{"text":"CHK043 Does SC-010 (Lighthouse >= 90) cover all affected pages? [Measurability, SC-010] вҖ” Yes: \"homepage, empresas/, personas/\" вҖ” the three highest-traffic pages.","checked":true,"chkId":null,"category":"SC-XXX Test Coverage","tags":[]},{"text":"CHK044 Is SC-009 (content update within 5 seconds) consistent with FR-020 (immediate effect)? [Consistency, SC-009 vs FR-020] вҖ” Yes: FR-020 says \"immediately, no deployment step\"; SC-009 makes it measurable at \"within 5 seconds.\" These are consistent вҖ” \"immediately\" in user terms means \"seconds, not minutes/deploys.\"","checked":true,"chkId":null,"category":"SC-XXX Test Coverage","tags":[]},{"text":"CHK045 Is the Firestore free tier quota exhaustion scenario complete? [Edge Cases] вҖ” Yes: \"site continues on cached content, alert sent to admin, reads prioritized over logging writes.\" Three mitigations defined.","checked":true,"chkId":null,"category":"Edge Case Coverage","tags":[]},{"text":"CHK046 Is the \"new program added\" edge case sufficient? [Edge Cases] вҖ” Yes: \"admin creates in Firestore with all required fields; public page dynamically renders new card from collection вҖ” no HTML changes needed.\" Schema validation enforces required fields.","checked":true,"chkId":null,"category":"Edge Case Coverage","tags":[]},{"text":"CHK047 Does the spec address what happens if IndexedDB is unavailable (private browsing, disabled)? [Gap, FR-005] вҖ” FR-005 says \"IndexedDB or localStorage.\" The \"or\" provides a fallback path. Plan uses IndexedDB primarily, but the content service can degrade to in-memory cache for the session. Not a blocker вҖ” graceful degradation is implied by FR-006 (never a blank page).","checked":true,"chkId":null,"category":"Edge Case Coverage","tags":[]},{"text":"CHK048 Are performance requirements defined with specific thresholds? [Completeness, SC-010/011] вҖ” Yes: Lighthouse >= 90 (SC-010), 2s on 3G (SC-011), 5s for admin updates (SC-009).","checked":true,"chkId":null,"category":"Non-Functional Requirements","tags":[]},{"text":"CHK049 Are security requirements defined beyond authentication? [Completeness, FR-012/013/014/015/023] вҖ” Yes: authorization (custom claims), schema validation on write, version-controlled rules, no secrets in client code, input sanitization.","checked":true,"chkId":null,"category":"Non-Functional Requirements","tags":[]},{"text":"CHK050 Is the accessibility requirement for the admin interface measurable? [Clarity, FR-022] вҖ” FR-022 references Constitution II which mandates: keyboard-navigable, ARIA attributes, color contrast. Constitution doesn't specify a WCAG level. Acceptable for v1 вҖ” Constitution II is the standard.","checked":true,"chkId":null,"category":"Non-Functional Requirements","tags":[]},{"text":"CHK051 Are data integrity requirements defined for the bilingual content constraint? [Completeness, FR-010/013/019] вҖ” Yes: FR-010 (admin blocks incomplete), FR-013 (security rules validate), FR-019 (single document). Three layers of enforcement.","checked":true,"chkId":null,"category":"Non-Functional Requirements","tags":[]},{"text":"CHK052 Are external service dependencies explicitly identified? [Completeness] вҖ” Yes: Firebase Auth, Cloud Firestore, Firebase Hosting (optional). All managed services per Constitution I.","checked":true,"chkId":null,"category":"Dependencies & Assumptions","tags":[]},{"text":"CHK053 Is the existing Playwright test suite dependency acknowledged? [Completeness, SC-003] вҖ” Yes: SC-003 says \"existing Playwright bilingual test suites continue to pass at 100%.\" Plan includes Playwright in testing stack.","checked":true,"chkId":null,"category":"Dependencies & Assumptions","tags":[]},{"text":"CHK054 Is the assumption of 1-3 admins explicit and its implications documented? [Assumption, Edge Cases] вҖ” Yes: explicitly stated in edge cases (admin creation), clarifications (rollback not needed), and throughout. If admin count grows significantly, admin management UI and rollback become needed.","checked":true,"chkId":null,"category":"Dependencies & Assumptions","tags":[]},{"text":"CHK055 Are evidence tags ([CODE], [DOC], [INFERENCE], [ASSUMPTION]) present on all claims in the spec? [Completeness, XIII] вҖ” Yes: all user story rationale, edge cases, and clarifications are tagged. Retroactive tagging confirmed in clarification session 2026-03-22.","checked":true,"chkId":null,"category":"Constitution v4.0.0 Alignment (added post-checklist review)","tags":[]},{"text":"CHK056 Does the spec avoid implementation details that belong in plan.md? [Phase Separation, XIII] вҖ” Yes: spec defines WHAT (FR-001 through FR-023, acceptance scenarios) without specifying HOW (no framework choices, no file paths, no schema details). Technology mention limited to Firebase (constitutionally mandated BaaS).","checked":true,"chkId":null,"category":"Constitution v4.0.0 Alignment (added post-checklist review)","tags":[]},{"text":"CHK057 Are requirements scoped to the simplest viable solution without speculative features? [Clarity, XIV] вҖ” Yes: no rollback UI (v1 scope, manual recovery via audit log), no admin management UI (CLI script sufficient for 1-3 admins), no real-time collaborative editing. Each deferral is justified by team size.","checked":true,"chkId":null,"category":"Constitution v4.0.0 Alignment (added post-checklist review)","tags":[]},{"text":"CHK058 Are BDD full-spectrum quality angles addressed in acceptance scenarios beyond functional happy paths? [Coverage, XV] вҖ” Covered: security (US-6), offline/resilience (US-5, US-1/2/3 failure scenarios), performance (US-1 scenario 5, SC-010/011), accessibility (FR-022), data integrity (FR-010/013/019). Clarification confirms expansion via testify re-run for remaining angles (design system, CI/CD, operational, strategic).","checked":true,"chkId":null,"category":"Constitution v4.0.0 Alignment (added post-checklist review)","tags":[]},{"text":"CHK059 Are parallel workflow requirements (branch isolation, atomic units, contract-first) addressed? [Completeness, XVI] вҖ” Yes: plan defines sequential migration waves (XIV governs), each wave independently deployable. Spec FR-017/018 define the integration contract (dual-source resolution) that enables independent wave work.","checked":true,"chkId":null,"category":"Constitution v4.0.0 Alignment (added post-checklist review)","tags":[]},{"text":"CHK060 Are all [ASSUMPTION] tagged claims bounded to < 30% of total claims per XIII? [Clarity, XIII] вҖ” Yes: only 1 ASSUMPTION tag in spec (Firestore free tier quota edge case). Remaining claims are [CODE], [DOC], or [INFERENCE]. Well under 30%.","checked":true,"chkId":null,"category":"Constitution v4.0.0 Alignment (added post-checklist review)","tags":[]},{"text":"CHK061 Does the spec define quality gate criteria sufficient for G1 passage? [Completeness, Quality Gates] вҖ” Yes: spec has FR-XXX requirements, SC-XXX success criteria, Given/When/Then scenarios, evidence tags present, clarifications resolved, no unresolved markers. G1 criteria met.","checked":true,"chkId":null,"category":"Constitution v4.0.0 Alignment (added post-checklist review)","tags":[]}],"percentage":100,"color":"green"},{"name":"Security","filename":"security.md","total":18,"checked":18,"items":[{"text":"SEC001 Is the authentication method specified? [Completeness, FR-008] вҖ” Yes: Firebase Authentication with \"admin\" custom claim. Research R3 selects Google sign-in.","checked":true,"chkId":null,"category":"Authentication Requirements","tags":[]},{"text":"SEC002 Is the distinction between authentication and authorization explicit? [Clarity, US-6 scenario 3] вҖ” Yes: US-6 scenario 3 explicitly tests \"authenticated without admin claim вҶ’ denied.\" FR-012 distinguishes read (public) from write (admin claim).","checked":true,"chkId":null,"category":"Authentication Requirements","tags":[]},{"text":"SEC003 Are authentication failure scenarios covered? [Scenario Coverage, US-4 scenario 1] вҖ” Yes: US-4 scenario 1 (unauthenticated вҶ’ login screen), US-4 scenario 5 (non-admin denied).","checked":true,"chkId":null,"category":"Authentication Requirements","tags":[]},{"text":"SEC004 Are role definitions clear and minimal? [Clarity, FR-008/012] вҖ” Yes: two roles вҖ” public (unauthenticated, read-only) and admin (authenticated + custom claim, read/write). Least-privilege by design.","checked":true,"chkId":null,"category":"Authorization Requirements","tags":[]},{"text":"SEC005 Is role provisioning documented? [Completeness, Edge Cases] вҖ” Yes: CLI script using `setCustomUserClaims`, documented in runbook. No self-registration for admin role.","checked":true,"chkId":null,"category":"Authorization Requirements","tags":[]},{"text":"SEC006 Is role escalation prevention addressed? [Scenario Coverage, US-6 scenario 3] вҖ” Yes: security rules check `request.auth.token.admin == true`, not just `request.auth != null`.","checked":true,"chkId":null,"category":"Authorization Requirements","tags":[]},{"text":"SEC007 Are security rules enforced at the data layer, not application layer? [Constitution VII] вҖ” Yes: Firestore security rules are the enforcement point. Client-side checks are convenience only.","checked":true,"chkId":null,"category":"Data Layer Security","tags":[]},{"text":"SEC008 Does every collection have explicit read/write rules? [Completeness, US-6 scenario 5] вҖ” Yes: US-6 scenario 5 requires \"every collection has explicit rules вҖ” no wildcards or open permissions.\"","checked":true,"chkId":null,"category":"Data Layer Security","tags":[]},{"text":"SEC009 Is schema validation enforced server-side on write? [Completeness, FR-013] вҖ” Yes: FR-013 requires security rules validate required fields, data types, and both language variants.","checked":true,"chkId":null,"category":"Data Layer Security","tags":[]},{"text":"SEC010 Are security rules testable before deployment? [Completeness, FR-014] вҖ” Yes: FR-014 requires version-controlled rules tested against Firebase Emulator. Plan includes `tests/integration/firestore-rules.test.js`.","checked":true,"chkId":null,"category":"Data Layer Security","tags":[]},{"text":"SEC011 Is the no-secrets-in-client-code requirement explicit? [Completeness, FR-015] вҖ” Yes: FR-015 says \"No API keys, service account credentials, or admin secrets MUST appear in client-side code. Firebase client config (public) is the only exception.\"","checked":true,"chkId":null,"category":"Secret Management","tags":[]},{"text":"SEC012 Is the Firebase client config exception justified? [Clarity, FR-015] вҖ” Yes: Firebase client config (apiKey, projectId, etc.) is public by design вҖ” it identifies the project but doesn't grant access. Access is controlled by security rules.","checked":true,"chkId":null,"category":"Secret Management","tags":[]},{"text":"SEC013 Is there an automated verification for secret exposure? [Measurability, SC-008] вҖ” Yes: SC-008 specifies \"verified by grep scan of deployed assets.\"","checked":true,"chkId":null,"category":"Secret Management","tags":[]},{"text":"SEC014 Is the audit log append-only? [Completeness, FR-011] вҖ” Yes: data-model defines audit_log as append-only with admin-only read. Security rules should enforce no update/delete on audit_log.","checked":true,"chkId":null,"category":"Audit Trail","tags":[]},{"text":"SEC015 Does the audit log capture sufficient detail for forensics? [Completeness, FR-011, SC-012] вҖ” Yes: timestamp, admin identity, collection, document ID, field changed, previous value, new value.","checked":true,"chkId":null,"category":"Audit Trail","tags":[]},{"text":"SEC016 Is audit log retention bounded to prevent unbounded growth? [Completeness, FR-011] вҖ” Yes: 90-day retention via TTL field. Clarification session confirms.","checked":true,"chkId":null,"category":"Audit Trail","tags":[]},{"text":"SEC017 Is input sanitization specified? [Completeness, FR-023] вҖ” Yes: \"no raw HTML stored in Firestore. Content is plain text or structured data only.\"","checked":true,"chkId":null,"category":"Input Validation","tags":[]},{"text":"SEC018 Is validation enforced at both client and server? [Defense in Depth, FR-010/013] вҖ” Yes: FR-010 (admin UI blocks incomplete submissions), FR-013 (security rules validate schema on write). Two layers.","checked":true,"chkId":null,"category":"Input Validation","tags":[]}],"percentage":100,"color":"green"}],"gate":{"status":"open","level":"green","label":"GATE: OPEN"}},"testify":{"requirements":[{"id":"FR-001","text":"Program catalog content (title, tagline, description, benefits, transformation, icon) MUST be stored in Firestore and fetched at runtime on empresas/ and personas/ pages."},{"id":"FR-002","text":"All pricing data (B2C base prices, B2B multipliers, cotizador program details, premium SKU prices) MUST be stored in Firestore and fetched at runtime."},{"id":"FR-003","text":"Translation dictionaries (ES and EN) MUST be stored in Firestore and fetchable at runtime by the i18n module."},{"id":"FR-004","text":"The i18n module MUST maintain the existing `data-i18n` attribute contract regardless of whether translations come from static JSON or Firestore."},{"id":"FR-005","text":"All Firestore content MUST be cached client-side (IndexedDB or localStorage) after the first successful fetch."},{"id":"FR-006","text":"When Firestore is unreachable, the site MUST display cached content вҖ” never a blank page, error state, or broken UI."},{"id":"FR-007","text":"Cache staleness MUST be bounded by a configurable TTL (default: 1 hour). Stale cache MUST trigger a background refresh on next page load when connectivity is available."},{"id":"FR-008","text":"An admin interface MUST be accessible at a protected route, requiring Firebase Authentication with the \"admin\" custom claim."},{"id":"FR-009","text":"The admin interface MUST allow editing programs, prices, and translations with side-by-side ES/EN editing."},{"id":"FR-010","text":"The admin interface MUST block publishing if any required field is empty or if a language variant is missing."},{"id":"FR-011","text":"All admin edits MUST be logged with timestamp, admin identity, field changed, and previous value. Audit logs MUST have a bounded retention period (default: 90 days)."},{"id":"FR-012","text":"Firestore security rules MUST enforce: public read for published content, write restricted to authenticated users with \"admin\" custom claim."},{"id":"FR-013","text":"Security rules MUST validate document schema on write вҖ” required fields, data types, both language variants present."},{"id":"FR-014","text":"Security rules MUST be version-controlled in the repository and tested against the Firebase Emulator before deployment."},{"id":"FR-015","text":"No API keys, service account credentials, or admin secrets MUST appear in client-side code. Firebase client config (public) is the only exception."},{"id":"FR-016","text":"A centralized content service module MUST mediate all Firestore access вҖ” no scattered inline queries across pages."},{"id":"FR-017","text":"During the migration period, the content service MUST support dual-source resolution: Firestore first, static HTML/JS fallback if the content has not yet been migrated."},{"id":"FR-018","text":"Each piece of editable content MUST have exactly one authoritative source вҖ” never both Firestore and HTML simultaneously for the same content."},{"id":"FR-019","text":"Bilingual content MUST be stored together in a single document (both ES and EN variants) вҖ” not in separate collections per language."},{"id":"FR-020","text":"Content changes via the admin interface MUST take effect immediately вҖ” no deployment step required."},{"id":"FR-021","text":"Dynamic content fetched from Firestore MUST be present in the DOM within 2 seconds on a 3G connection, or the page MUST fall back to cached/static content."},{"id":"FR-022","text":"The admin interface MUST meet accessibility standards (Constitution II) вҖ” keyboard-navigable, proper ARIA attributes, color contrast compliance."},{"id":"FR-023","text":"Admin input MUST be sanitized вҖ” no raw HTML stored in Firestore. Content is plain text or structured data only."},{"id":"SC-001","text":"100% of program catalog content on empresas/ and personas/ is sourced from Firestore (zero inline JS program objects remain)."},{"id":"SC-002","text":"100% of pricing data across cotizadores and premium catalog is sourced from Firestore (zero hardcoded `data-price` attributes or JS constants remain)."},{"id":"SC-003","text":"Translation dictionaries are fetchable from Firestore; existing Playwright bilingual test suites continue to pass at 100%."},{"id":"SC-004","text":"Site functions fully offline after first visit вҖ” all Firestore-sourced content available from cache with zero blank sections."},{"id":"SC-005","text":"Firestore security rules pass 100% of positive/negative test cases in the Emulator."},{"id":"SC-006","text":"Admin interface requires authentication + \"admin\" custom claim вҖ” unauthenticated and non-admin users are denied access."},{"id":"SC-007","text":"Admin interface blocks save when required fields or language variants are missing вҖ” zero partial content published."},{"id":"SC-008","text":"Zero API keys or secrets exposed in client-side code (verified by grep scan of deployed assets)."},{"id":"SC-009","text":"Content updates via admin interface appear on the public site within 5 seconds without deployment."},{"id":"SC-010","text":"Lighthouse Performance score remains >= 90 on homepage, empresas/, personas/ after migration."},{"id":"SC-011","text":"Firestore content renders within 2 seconds on 3G or falls back to cache/static within the same window."},{"id":"SC-012","text":"All admin edits produce an audit log entry with timestamp, admin ID, field, and previous value."},{"id":"SC-013","text":"During migration, pages with non-migrated content continue to function from static HTML/JS вҖ” zero regressions."}],"testSpecs":[{"id":"TS-017","title":"Unauthenticated user sees login screen","type":"acceptance","priority":"P3","traceability":["FR-008","SC-006"]},{"id":"TS-018","title":"Admin sees all programs with bilingual content","type":"acceptance","priority":"P3","traceability":["FR-009"]},{"id":"TS-019","title":"Save blocked when language variant missing","type":"validation","priority":"P3","traceability":["FR-010","SC-007"]},{"id":"TS-020","title":"Change log entry created on valid edit","type":"acceptance","priority":"P3","traceability":["FR-011","SC-012"]},{"id":"TS-021","title":"Non-admin authenticated user denied access","type":"acceptance","priority":"P3","traceability":["FR-008","SC-006"]},{"id":"TS-022","title":"No secrets exposed in client-side code","type":"acceptance","priority":"P3","traceability
