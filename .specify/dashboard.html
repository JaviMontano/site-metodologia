rable TTL (default: 1 hour). Stale cache MUST trigger a background refresh on next page load when connectivity is available.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"FR-008","text":"An admin interface MUST be accessible at a protected route, requiring Firebase Authentication with the \"admin\" custom claim.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"FR-009","text":"The admin interface MUST allow editing programs, prices, and translations with side-by-side ES/EN editing.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"FR-010","text":"The admin interface MUST block publishing if any required field is empty or if a language variant is missing.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"FR-011","text":"All admin edits MUST be logged with timestamp, admin identity, field changed, and previous value. Audit logs MUST have a bounded retention period (default: 90 days).","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"FR-012","text":"Firestore security rules MUST enforce: public read for published content, write restricted to authenticated users with \"admin\" custom claim.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"FR-013","text":"Security rules MUST validate document schema on write вҖ” required fields, data types, both language variants present.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"FR-014","text":"Security rules MUST be version-controlled in the repository and tested against the Firebase Emulator before deployment.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"FR-015","text":"No API keys, service account credentials, or admin secrets MUST appear in client-side code. Firebase client config (public) is the only exception.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"FR-016","text":"A centralized content service module MUST mediate all Firestore access вҖ” no scattered inline queries across pages.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"FR-017","text":"During the migration period, the content service MUST support dual-source resolution: Firestore first, static HTML/JS fallback if the content has not yet been migrated.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"FR-018","text":"Each piece of editable content MUST have exactly one authoritative source вҖ” never both Firestore and HTML simultaneously for the same content.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"FR-019","text":"Bilingual content MUST be stored together in a single document (both ES and EN variants) вҖ” not in separate collections per language.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"FR-020","text":"Content changes via the admin interface MUST take effect immediately вҖ” no deployment step required.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"FR-021","text":"Dynamic content fetched from Firestore MUST be present in the DOM within 2 seconds on a 3G connection, or the page MUST fall back to cached/static content.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"FR-022","text":"The admin interface MUST meet accessibility standards (Constitution II) вҖ” keyboard-navigable, proper ARIA attributes, color contrast compliance.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"FR-023","text":"Admin input MUST be sanitized вҖ” no raw HTML stored in Firestore. Content is plain text or structured data only.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"SC-001","text":"100% of program catalog content on empresas/ and personas/ is sourced from Firestore (zero inline JS program objects remain).","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"SC-002","text":"100% of pricing data across cotizadores and premium catalog is sourced from Firestore (zero hardcoded `data-price` attributes or JS constants remain).","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"SC-003","text":"Translation dictionaries are fetchable from Firestore; existing Playwright bilingual test suites continue to pass at 100%.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"SC-004","text":"Site functions fully offline after first visit вҖ” all Firestore-sourced content available from cache with zero blank sections.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"SC-005","text":"Firestore security rules pass 100% of positive/negative test cases in the Emulator.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"SC-006","text":"Admin interface requires authentication + \"admin\" custom claim вҖ” unauthenticated and non-admin users are denied access.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"SC-007","text":"Admin interface blocks save when required fields or language variants are missing вҖ” zero partial content published.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"SC-008","text":"Zero API keys or secrets exposed in client-side code (verified by grep scan of deployed assets).","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"SC-009","text":"Content updates via admin interface appear on the public site within 5 seconds without deployment.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"SC-010","text":"Lighthouse Performance score remains >= 90 on homepage, empresas/, personas/ after migration.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"SC-011","text":"Firestore content renders within 2 seconds on 3G or falls back to cache/static within the same window.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"SC-012","text":"All admin edits produce an audit log entry with timestamp, admin ID, field, and previous value.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}},{"id":"SC-013","text":"During migration, pages with non-migrated content continue to function from static HTML/JS вҖ” zero regressions.","cells":{"tasks":{"status":"missing","refs":[]},"tests":{"status":"missing","refs":[]},"plan":{"status":"na","refs":[]}}}]},"issues":[],"metrics":{"totalRequirements":0,"totalTasks":0,"totalTestSpecs":0,"requirementCoverage":"","criticalIssues":0,"highIssues":0,"mediumIssues":0,"lowIssues":0},"constitutionAlignment":[],"exists":true},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"003-sitewide-ux-polish":{"board":{"todo":[{"id":"US1","title":"Visible, Stable Language Toggle","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Complete Bilingual Hero & Section Text","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Floating Nav: Exclude Quote from Section Menu","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US4","title":"Dead Link Elimination","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US5","title":"Visual Consistency Across Pages","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US6","title":"Stale Content & Copy Updates","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US7","title":"Missing Asset Deployment","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US8","title":"Deprecated Meta Tag Cleanup","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"valid","currentHash":"e1a7294e559d574371315ee6c643f72b8be04b646461e6c2be3dc44e77311d1a","storedHash":"e1a7294e559d574371315ee6c643f72b8be04b646461e6c2be3dc44e77311d1a"}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"complete","progress":"100%","optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Visible, Stable Language Toggle","priority":"P1","scenarioCount":5,"body":"A visitor on any page sees a pill-shaped ES/EN toggle in the navigation bar (desktop and mobile). Clicking it switches the page language instantly without any layout shift, reflow, or visual jank. The toggle looks identical in both states вҖ” only the active indicator changes.\n\n**Why this priority**: The bilingual system (002) is deployed but the toggle is invisible on desktop because it's placed outside the visible nav container. Users cannot access the EN version at all. This is the #1 blocker.\n\n**Independent Test**: Navigate to any page, confirm toggle is visible in nav bar, click EN, verify page translates with zero layout shift (no CLS delta).\n\n**Acceptance Scenarios**:\n\n1. **Given** a user loads any public page on desktop, **When** the page renders, **Then** the ES/EN toggle is visible in the right section of the nav bar, between Campus link and CTA button.\n2. **Given** a user loads any public page on mobile, **When** the user opens the hamburger menu, **Then** the ES/EN toggle is visible and tappable within the mobile menu.\n3. **Given** a user clicks EN on the toggle, **When** the language switches, **Then** no element on the page changes size, position, or causes reflow вҖ” CLS delta is 0.\n4. **Given** the toggle is in ES state, **When** the user views the toggle, **Then** ES has the active/gold indicator and EN is semi-transparent; the overall toggle width and shape remain identical.\n5. **Given** the toggle is in EN state, **When** the user views the toggle, **Then** EN has the active/gold indicator and ES is semi-transparent; toggle dimensions unchanged.","clarificationCount":0},{"id":"US2","title":"Complete Bilingual Hero & Section Text","priority":"P1","scenarioCount":4,"body":"Every hero section, CTA, badge, and visible text element across all public pages has `data-i18n` attributes and corresponding EN translations. No Spanish-only text remains in user-visible content areas.\n\n**Why this priority**: Heroes are the first thing visitors see. Untranslated hero text in EN mode breaks trust and professionalism.\n\n**Independent Test**: Switch to EN on each page, verify all hero titles, subtitles, CTAs, badges, and section headers display in English.\n\n**Acceptance Scenarios**:\n\n1. **Given** a user switches to EN on the homepage, **When** they view the hero, **Then** the title, subtitle, badge, CTAs, and closing quote all display in English.\n2. **Given** a user switches to EN on any empresas/ or personas/ page, **When** they view the hero, **Then** all hero text, program cards, and CTAs display in English.\n3. **Given** a user switches to EN on any page, **When** they scroll the full page, **Then** zero Spanish text remains in any user-facing content (nav, hero, sections, footer, modals, CTAs).\n4. **Given** `es.json` translations exist, **When** compared to the HTML fallback text, **Then** all ES translations exactly match the HTML source text (no mismatches like \"Way of Working\" vs \"Forma de Trabajar\").","clarificationCount":0},{"id":"US3","title":"Floating Nav: Exclude Quote from Section Menu","priority":"P1","scenarioCount":4,"body":"The floating nav (scroll-triggered section navigation) on the homepage picks up the hook-quote section (\"El Г©xito depende mГЎs de cГіmo te apalancas...\") and displays it as a navigation item alongside legitimate sections like \"Personas\" and \"Empresas.\" The quote must be excluded from the floating nav's section detection logic while remaining visible on the page itself.\n\n**Why this priority**: User explicitly reported this. The quote appearing as a floating nav item creates confusion вҖ” it's decorative content, not a navigable section.\n\n**Independent Test**: Scroll down on the homepage until the floating nav appears. Verify the quote is NOT listed among the section links. Verify the quote still renders in its original position on the page.\n\n**Acceptance Scenarios**:\n\n1. **Given** a user scrolls past the main nav on the homepage, **When** the floating nav appears, **Then** the hook-quote text is NOT listed as a floating nav item.\n2. **Given** the floating nav shows section links, **When** reviewing the items, **Then** only legitimate page sections (Personas, Empresas, etc.) appear вҖ” no decorative content.\n3. **Given** the hook-quote section exists on the page, **When** the user scrolls to it, **Then** the quote renders normally in its original position with full styling.\n4. **Given** other pages have their own sections, **When** the floating nav detects sections, **Then** the detection logic correctly excludes non-navigable decorative elements site-wide.","clarificationCount":0},{"id":"US4","title":"Dead Link Elimination","priority":"P2","scenarioCount":4,"body":"All `href=\"#\"` placeholder links across the site are replaced with functional destinations or appropriate actions (mailto, contact page link, or modal trigger).\n\n**Why this priority**: Dead links damage credibility and SEO. Multiple pages (recursos, contacto) have non-functional CTAs.\n\n**Independent Test**: Click every CTA and link on each page, verify none result in a no-op `#` jump.\n\n**Acceptance Scenarios**:\n\n1. **Given** a user clicks \"EscrГӯbenos para ser Beta Tester\" on recursos/index.html, **When** the link activates, **Then** it opens a mailto or navigates to contacto/.\n2. **Given** a user clicks \"Contactar por Email\" on any page, **When** the link activates, **Then** it opens mailto:contacto@metodologia.info.\n3. **Given** a user clicks \"EnvГӯanos un email\" on contacto/index.html, **When** the link activates, **Then** it opens mailto:contacto@metodologia.info.\n4. **Given** a complete site audit, **When** scanning all HTML files, **Then** zero `href=\"#\"` placeholder links remain on public pages (except legitimate anchor links like back-to-top or scroll targets).","clarificationCount":0},{"id":"US5","title":"Visual Consistency Across Pages","priority":"P2","scenarioCount":4,"body":"All pages follow MetodologIA brand standards: consistent card styling, consistent CTA colors, proper zigzag layout patterns, section highlight animations, and brand-gold accent usage per the estandares/ guidelines.\n\n**Why this priority**: Inconsistencies (e.g., gold card among dark cards on empresas/personas) undermine the premium brand perception.\n\n**Independent Test**: Side-by-side comparison of equivalent sections across pages confirms uniform card styling, CTA colors, and layout patterns.\n\n**Acceptance Scenarios**:\n\n1. **Given** a user views the 4-card solution row on empresas/ and personas/, **When** comparing cards, **Then** all cards use the same background style (no single gold card among dark cards).\n2. **Given** the estandares/layout-patterns.md zigzag standard, **When** auditing content sections, **Then** sections with text + visual columns alternate text-left/text-right per the zigzag pattern.\n3. **Given** the estandares/micro-interactions.md standard, **When** auditing sections, **Then** every major section has at least one attention-grabbing micro-interaction (pulse, glow, shimmer).\n4. **Given** the brand voice standard (brand_voice_v2.md), **When** auditing heading copy, **Then** pages use approved terminology (Metodo/Sistema, not Hack/Truco; (R)Evolucion, not Transformacion).","clarificationCount":0},{"id":"US6","title":"Stale Content & Copy Updates","priority":"P2","scenarioCount":2,"body":"Outdated date references, stale copy, and temporal content are updated to reflect the current state (March 2026).\n\n**Why this priority**: Stale dates (e.g., \"Retoma en Febrero 2026\" when it's already March 2026) signal neglect.\n\n**Independent Test**: Search all pages for date references and temporal copy, verify all are current.\n\n**Acceptance Scenarios**:\n\n1. **Given** the recursos/index.html podcast section says \"Retoma en Febrero 2026\", **When** audited, **Then** it reflects the actual current status or is removed.\n2. **Given** any page contains a date-bound reference, **When** audited, **Then** the date is accurate as of March 2026 or uses relative language.","clarificationCount":0},{"id":"US7","title":"Missing Asset Deployment","priority":"P2","scenarioCount":2,"body":"All locally-tracked files that are referenced by the site but missing from the production server are identified and included in the deployment.\n\n**Why this priority**: The `/data/business-logic.json` 404 breaks the ruta/ page mode-switching feature silently.\n\n**Independent Test**: Run a 404 audit across all pages, confirm zero missing resources.\n\n**Acceptance Scenarios**:\n\n1. **Given** the ruta/ page references `data/business-logic.json`, **When** loaded in production, **Then** the file is served with 200 status, and mode-switching works.\n2. **Given** a full-site resource audit, **When** checking all script/link/img references, **Then** zero 404 errors occur.","clarificationCount":0},{"id":"US8","title":"Deprecated Meta Tag Cleanup","priority":"P3","scenarioCount":2,"body":"Remove deprecated meta tags that trigger browser console warnings, specifically `apple-mobile-web-app-capable`.\n\n**Why this priority**: Console warnings are low-severity but signal technical debt in audits.\n\n**Independent Test**: Load any page, verify zero deprecation warnings in browser console.\n\n**Acceptance Scenarios**:\n\n1. **Given** any page is loaded, **When** checking the browser console, **Then** zero deprecation warnings appear related to meta tags.\n2. **Given** a full-site grep for `apple-mobile-web-app-capable`, **When** scanning all HTML files, **Then** zero instances of this deprecated meta tag remain.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"The language toggle MUST be visible in the desktop nav bar within the right-actions container (alongside Campus and CTA). The toggle MUST announce state changes to screen readers via an `aria-live=\"polite\"` region or equivalent mechanism."},{"id":"FR-002","text":"The language toggle MUST maintain identical dimensions in both ES and EN states (fixed-width pill, no layout shift)."},{"id":"FR-003","text":"Switching languages MUST produce zero Cumulative Layout Shift (CLS delta = 0) on every page."},{"id":"FR-004","text":"All user-facing text in hero sections, CTAs, badges, and section headers MUST have `data-i18n` attributes with corresponding EN translations."},{"id":"FR-005","text":"The `es.json` translation values MUST exactly match the HTML fallback text for all keys (no mismatches)."},{"id":"FR-006","text":"The floating nav's section detection MUST exclude decorative/quote sections вҖ” the hook-quote MUST NOT appear as a floating nav item."},{"id":"FR-016","text":"The contacto/ page MUST include a general inquiry mailto link (contacto@metodologia.info) in addition to the scheduling option."},{"id":"FR-017","text":"Every standalone HTML download MUST have an EN variant file (e.g., `wf-01-standalone-en.html`)."},{"id":"FR-018","text":"Every PDF in playbooks and bibliotecas MUST have an EN variant."},{"id":"FR-019","text":"All JSON data files referenced by the site MUST contain bilingual content or have EN variants."},{"id":"FR-007","text":"All `href=\"#\"` placeholder links MUST be replaced with functional destinations (mailto, page link, or modal trigger)."},{"id":"FR-008","text":"All locally-tracked assets referenced by HTML/JS MUST be included in Git and deployed to production."},{"id":"FR-009","text":"Card styling within the same row/section MUST use consistent background and border treatments."},{"id":"FR-010","text":"Content sections with text + visual columns MUST follow the zigzag alternation pattern per estandares/layout-patterns.md."},{"id":"FR-011","text":"Stale date references MUST be updated to reflect current status: either replace with the accurate current date, remove the time-bound reference, or rewrite using relative/evergreen language (e.g., \"PrГіximamente\" instead of \"Retoma en Febrero 2026\")."},{"id":"FR-012","text":"Deprecated meta tags (e.g., `apple-mobile-web-app-capable`) MUST be removed or replaced with current standards."},{"id":"FR-013","text":"All pages MUST produce zero console errors and zero 404 resource errors."},{"id":"FR-014","text":"Every major content section MUST include at least one micro-interaction element per estandares/micro-interactions.md. A \"major content section\" is defined as any `<section>` element containing a heading (`h2`/`h3`) plus at least one content block (paragraph, card grid, or visual)."},{"id":"FR-015","text":"All heading copy MUST use MetodologIA approved terminology per brand_voice_v2.md."}],"successCriteria":[{"id":"SC-001","text":"Language toggle is visible and functional on 100% of public pages (desktop and mobile)."},{"id":"SC-002","text":"CLS delta when switching languages is 0.000 on all pages (measured via Lighthouse or CLS observer)."},{"id":"SC-003","text":"100% of user-facing text elements display in English when EN is selected вҖ” zero Spanish remnants on site pages AND standalone downloads have EN variants."},{"id":"SC-004","text":"Zero `href=\"#\"` placeholder links remain on any public page вҖ” all point to contacto/."},{"id":"SC-005","text":"Zero 404 resource errors across all pages in production."},{"id":"SC-006","text":"Zero browser console errors or deprecation warnings across all pages."},{"id":"SC-007","text":"Lighthouse Performance score remains >= 90 on homepage, empresas/, personas/ after all changes."},{"id":"SC-008","text":"All Playwright bilingual test suites (19-25) continue to pass at 100%."},{"id":"SC-009","text":"Brand voice audit: 100% compliance with approved terminology on all page headings."},{"id":"SC-010","text":"Visual consistency: all card rows within the same section use uniform styling."},{"id":"SC-011","text":"Zigzag layout pattern applied to 100% of text+visual content sections site-wide."},{"id":"SC-012","text":"Contacto page includes a general inquiry mailto form/link."},{"id":"SC-013","text":"Every standalone HTML download has an EN variant file. Every PDF in playbooks and bibliotecas has an EN variant. All JSON data files are bilingual."}],"clarifications":[],"edges":[{"from":"US8","to":"FR-001"},{"from":"US8","to":"FR-002"},{"from":"US8","to":"FR-003"},{"from":"US8","to":"FR-004"},{"from":"US8","to":"FR-005"},{"from":"US8","to":"FR-006"},{"from":"US8","to":"FR-016"},{"from":"US8","to":"FR-017"},{"from":"US8","to":"FR-018"},{"from":"US8","to":"FR-019"},{"from":"US8","to":"FR-007"},{"from":"US8","to":"FR-008"},{"from":"US8","to":"FR-009"},{"from":"US8","to":"FR-010"},{"from":"US8","to":"FR-011"},{"from":"US8","to":"FR-012"},{"from":"US8","to":"FR-013"},{"from":"US8","to":"FR-014"},{"from":"US8","to":"FR-015"}]},"planView":{"techContext":[{"label":"Language/Version","value":"HTML5, CSS3, JavaScript ES6+ (vanilla, no transpiler)"},{"label":"Primary Dependencies","value":"Tailwind CSS 3.4 (dev build), Playwright 1.58 (testing)"},{"label":"Storage","value":"N/A (static site, localStorage for language preference only)"},{"label":"Testing","value":"Playwright (24 existing test suites at `tests/`)"},{"label":"Target Platform","val ro-error requirement defined (no console errors, no 404s)?","checked":true,"chkId":null,"category":"Non-Functional Requirements","tags":["Completeness, Spec SC-005, SC-006"]},{"text":"CHK041 Are accessibility requirements for the new toggle defined beyond keyboard navigation вҖ” e.g., screen reader announcement of language state change?","checked":true,"chkId":null,"category":"Non-Functional Requirements","tags":["Resolved вҶ’ FR-001 updated: aria-live=\"polite\" for state changes, Spec FR-001, Constitution II"]},{"text":"CHK042 Is the assumption that estandares/ guidelines (brand_voice_v2.md, layout-patterns.md, micro-interactions.md) are current and authoritative documented?","checked":true,"chkId":null,"category":"Dependencies & Assumptions","tags":["Assumption, Spec US5"]},{"text":"CHK043 Is the assumption that the toggle is a client-side-only feature (no server roundtrip) documented?","checked":true,"chkId":null,"category":"Dependencies & Assumptions","tags":["Assumption, Spec Edge Cases"]},{"text":"CHK044 Is the dependency on existing Playwright test suites (19-25) documented with specific suite numbers?","checked":true,"chkId":null,"category":"Dependencies & Assumptions","tags":["Completeness, Spec SC-008"]},{"text":"CHK045 Is the dependency on the i18n module (singleton, DOM translation) documented in the plan?","checked":true,"chkId":null,"category":"Dependencies & Assumptions","tags":["Completeness, Plan Architecture"]}],"percentage":100,"color":"green"}],"gate":{"status":"open","level":"green","label":"GATE: OPEN"}},"testify":{"requirements":[{"id":"FR-001","text":"The language toggle MUST be visible in the desktop nav bar within the right-actions container (alongside Campus and CTA). The toggle MUST announce state changes to screen readers via an `aria-live=\"polite\"` region or equivalent mechanism."},{"id":"FR-002","text":"The language toggle MUST maintain identical dimensions in both ES and EN states (fixed-width pill, no layout shift)."},{"id":"FR-00 "id":"T002","storyTag":null,"bugTag":null,"description":"Create `js/i18n/es.json` skeleton with nav, footer, toggle, and common section keys extracted from current HTML","checked":true,"isBugFix":false},{"id":"T022","storyTag":null,"bugTag":null,"description":"Add `<script src=\"{basePath}/js/i18n/i18n.js\" defer><\/script>` to SiteHeader.js (loads on every page)","checked":true,"isBugFix":false},{"id":"T041","storyTag":null,"bugTag":null,"description":"Verify zero JS errors on all pages with both languages (spot-check 10 pages)","checked":true,"isBugFix":false},{"id":"T042","storyTag":null,"bugTag":null,"description":"Performance audit: measure i18n load impact with Lighthouse on 3 pages","checked":true,"isBugFix":false}],"progress":"5/5","column":"done"}],"integrity":{"status":"valid","currentHash":"77953ffa39663d069c5531c0fa2f757dc6622d522f4281ae8526d1640df5652a","storedHash":"77953ffa39663d069c5531c0fa2f757dc6622d522f4281ae8526d1640df5652a"}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"complete","progress":"100%","optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"complete","progress":"100%","optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Language Toggle in Navigation","priority":"P1","scenarioCount":4,"body":"A visitor arrives at metodologia.info (default: Spanish). Between the logo/tagline and the \"Ruta de (R)Evolucion\" menu link, they see a compact language toggle (ES | EN). Clicking \"EN\" switches all visible text on the current page to English. The choice persists across navigation via localStorage.\n\n**Why this priority**: The toggle is the entry point for the entire bilingual experience. Without it, nothing else matters.\n\n**Independent Test**: Load any page, click EN, verify header/footer/nav text switches to English. Refresh вҖ” stays in English. Click ES вҖ” returns to Spanish.\n\n**Acceptance Scenarios**:\n\n1. **Given** a visitor on any page in Spanish, **When** they click \"EN\" in the nav toggle, **Then** all translatable text on the page switches to English within 200ms without page reload\n2. **Given** a visitor who selected \"EN\", **When** they navigate to another page, **Then** the new page loads in English automatically\n3. **Given** a visitor who selected \"EN\" and closes the browser, **When** they return, **Then** the site loads in English (localStorage persistence)\n4. **Given** a visitor on mobile (hamburger menu), **When** they see the toggle, **Then** it is visible and functional in the mobile menu layout","clarificationCount":0},{"id":"US2","title":"Translated SiteHeader and SiteFooter","priority":"P1","scenarioCount":3,"body":"The SiteHeader web component (logo tagline, nav links, CTA button, floating nav) and SiteFooter web component (links, sections, copyright) render all text in the selected language.\n\n**Why this priority**: Header and footer appear on every page вҖ” translating them gives immediate bilingual presence across the entire site.\n\n**Independent Test**: Switch to EN, verify: nav links (\"Route of (R)Evolution\", \"Resources\", \"Services\", \"Contact\"), CTA, footer sections, copyright text.\n\n**Acceptance Scenarios**:\n\n1. **Given** language is EN, **When** SiteHeader renders, **Then** all nav links, tagline, and CTA display in English\n2. **Given** language is EN, **When** SiteFooter renders, **Then** all section headers, links, and copyright display in English\n3. **Given** language is EN, **When** floating nav appears on scroll, **Then** section labels display in English","clarificationCount":0},{"id":"US3","title":"Translation System Architecture","priority":"P1","scenarioCount":3,"body":"A JSON-based translation system where each translatable string has a key, with one JSON file per language (es.json, en.json). HTML elements use data-i18n=\"key\" attributes. A lightweight JS module (i18n.js) reads the active language from localStorage, loads the correct JSON, and replaces text content.\n\n**Why this priority**: This is the foundation вҖ” without it, no page can be translated.\n\n**Independent Test**: Create i18n.js, add data-i18n attributes to 5 elements on index.html, verify text switches correctly.\n\n**Acceptance Scenarios**:\n\n1. **Given** es.json and en.json exist in /js/i18n/, **When** i18n.js initializes, **Then** it loads the correct file based on localStorage lang key (default: \"es\")\n2. **Given** a page with data-i18n=\"nav.ruta\" on an element, **When** language is EN, **Then** the element text content becomes the value of nav.ruta from en.json\n3. **Given** an element with data-i18n-placeholder=\"search.placeholder\", **When** language is EN, **Then** the placeholder attribute is translated","clarificationCount":0},{"id":"US4","title":"Progressive Page Translation","priority":"P2","scenarioCount":3,"body":"Pages are translated progressively in waves. Each wave adds data-i18n attributes to a group of pages and their corresponding translations to the JSON files.\n\n**Why this priority**: Enables incremental delivery вҖ” the site becomes more bilingual over time without blocking launches.\n\n**Independent Test**: After Wave 1 (core pages), verify index.html, ruta/index.html, contacto/index.html are fully bilingual. Other pages still work in Spanish-only.\n\n**Acceptance Scenarios**:\n\n1. **Given** Wave 1 is complete (5 core pages), **When** a visitor switches to EN, **Then** those 5 pages display fully in English\n2. **Given** a page NOT yet translated, **When** a visitor switches to EN, **Then** the page displays in Spanish (graceful fallback, no broken UI)\n3. **Given** Wave 2 adds 10 more pages, **When** deployed, **Then** those pages also respond to the language toggle\n\n**Translation Waves**:\n- Wave 1: index.html, ruta/index.html, contacto/index.html, servicios/index.html, vision.html (5 pages)\n- Wave 2: empresas/index.html, personas/index.html + their sub-pages (10 pages)\n- Wave 3: recursos/index.html, biblioteca-prompts/index.html, catalogo (5 pages)\n- Wave 4: All 9 biblioteca landing pages (9 pages)\n- Wave 5: Premium pages, legal, nosotros (15 pages)\n- Wave 6: Standalone HTML downloads, editorial PDFs (18 files)\n- Wave 7: Modals, CTAs, dynamic content (site-wide)","clarificationCount":0},{"id":"US5","title":"Bilingual Prompt Libraries","priority":"P2","scenarioCount":2,"body":"The 9 prompt library landing pages display UI text (hero, search placeholder, category pills, download section labels) in the selected language. The prompts themselves remain in Spanish (they are domain content, not UI).\n\n**Why this priority**: Libraries are the highest-traffic resource pages.\n\n**Independent Test**: Switch to EN on biblioteca-ventas, verify hero title, search placeholder, \"Download\" section, and category labels are in English. Prompt content stays in Spanish.\n\n**Acceptance Scenarios**:\n\n1. **Given** language is EN on a biblioteca landing, **When** the page renders, **Then** all UI chrome (hero, headings, buttons, labels) displays in English\n2. **Given** language is EN, **When** a user opens a prompt modal, **Then** the modal chrome (\"Copy Prompt\", category label) is in English, but the prompt content is in Spanish","clarificationCount":0},{"id":"US6","title":"SEO hreflang Tags","priority":"P3","scenarioCount":2,"body":"Each public page includes hreflang alternate link tags pointing to the same URL (since translation is client-side, not separate URLs).\n\n**Why this priority**: Important for international SEO but does not affect user functionality.\n\n**Independent Test**: View source of any translated page, verify hreflang tags are present.\n\n**Acceptance Scenarios**:\n\n1. **Given** any public page, **When** rendered, **Then** it contains both hreflang=\"es\" and hreflang=\"en\" link tags\n2. **Given** the page is the default language (ES), **When** Google crawls it, **Then** it sees the hreflang tags indicating bilingual availability","clarificationCount":0},{"id":"US7","title":"Playwright Bilingual Tests","priority":"P3","scenarioCount":2,"body":"Automated tests verify that the language toggle works, translations load, persistence works, and no UI breaks in either language.\n\n**Why this priority**: Prevents regressions as more pages get translated.\n\n**Independent Test**: Run Playwright bilingual test suite вҖ” all tests pass.\n\n**Acceptance Scenarios**:\n\n1. **Given** the test suite, **When** run, **Then** it verifies: toggle exists, click switches language, persistence works, header/footer translated, no JS errors in either language\n2. **Given** a new wave of translations is added, **When** tests run, **Then** they verify the new pages are also correctly translated","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"System MUST provide a language toggle (ES | EN) in the main navigation, positioned between the logo/tagline and the first nav link"},{"id":"FR-002","text":"System MUST persist language preference in localStorage under key \"lang\" with values \"es\" or \"en\""},{"id":"FR-003","text":"System MUST default to Spanish (\"es\") when no preference is stored"},{"id":"FR-004","text":"System MUST translate all elements with data-i18n attributes when language changes, without page reload"},{"id":"FR-005","text":"System MUST support attribute translation via data-i18n-placeholder, data-i18n-title, data-i18n-content for placeholders, titles, and meta content"},{"id":"FR-006","text":"System MUST gracefully fall back to original HTML text when a translation key is missing"},{"id":"FR-007","text":"System MUST translate SiteHeader and SiteFooter web components in both languages"},{"id":"FR-008","text":"System MUST translate the floating nav section labels in both languages"},{"id":"FR-009","text":"System MUST support progressive translation вҖ” untranslated pages display in Spanish without errors"},{"id":"FR-010","text":"System MUST include hreflang tags on all public pages"},{"id":"FR-011","text":"System MUST provide a window.i18n.translate(element) API for translating dynamically injected content"},{"id":"FR-012","text":"System MUST not increase page load time by more than 50ms (JSON files loaded once, cached)"}],"successCriteria":[{"id":"SC-001","text":"Language toggle is visible and functional on all 63+ pages (100% coverage for the toggle UI)"},{"id":"SC-002","text":"Wave 1 (5 core pages) fully translated within first implementation sprint"},{"id":"SC-003","text":"Translation switching completes in under 200ms (no perceptible delay)"},{"id":"SC-004","text":"Zero JavaScript errors when switching languages on any page"},{"id":"SC-005","text":"Playwright bilingual test suite passes with 100% success rate"},{"id":"SC-006","text":"Page load performance impact is less than 50ms (measured via Lighthouse)"},{"id":"SC-007","text":"All 7 translation waves completed within 4 sprints"},{"id":"SC-008","text":"SEO hreflang tags present on 100% of public indexed pages"}],"clarifications":[],"edges":[{"from":"US7","to":"FR-001"},{"from":"US7","to":"FR-002"},{"from":"US7","to":"FR-003"},{"from":"US7","to":"FR-004"},{"from":"US7","to":"FR-005"},{"from":"US7","to":"FR-006"},{"from":"US7","to":"FR-007"},{"from":"US7","to":"FR-008"},{"from":"US7","to":"FR-009"},{"from":"US7","to":"FR-010"},{"from":"US7","to":"FR-011"},{"from":"US7","to":"FR-012"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Vanilla JavaScript (ES2020+), HTML5, CSS3"},{"label":"Primary Dependencies","value":"None (zero new dependencies вҖ” pure vanilla JS)"},{"label":"Storage","value":"localStorage for language preference, JSON files for translations"},{"label":"Testing","value":"Playwright (existing test infrastructure)"},{"label":"Target Platform","value":"Web (all modern browsers, mobile responsive)"},{"label":"Project Type","value":"Static site (63+ HTML pages, web components)"},{"label":"Performance Goals","value":"<200ms language switch, <50ms page load impact"},{"label":"Constraints","value":"Static-first (no server), must work offline for standalone HTMLs"},{"label":"Scale/Scope","value":"63+ pages, 9 biblioteca landings, 2 web components, ~800 translatable strings"}],"researchDecisions":[],"fileStructure":null,"diagram":{"nodes":[{"id":"node-0","label":"localStorage","content":"localStorage\nlang: \"es\"","type":"default","x":20,"y":0,"width":18,"height":3}],"edges":[],"raw":"                    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n                    в”Ӯ   localStorage  в”Ӯ\n                    в”Ӯ   lang: \"es\"    в”Ӯ\n                    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n                             в”Ӯ read/write\n                    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n                    в”Ӯ    i18n.js      в”Ӯ\n                    в”Ӯ  (Singleton)    в”Ӯ\n                    в”Ӯ                 в”Ӯ\n                    в”Ӯ - init()        в”Ӯ\n                    в”Ӯ - setLang(lang) в”Ӯ\n                    в”Ӯ - translate(el) в”Ӯ\n                    в”Ӯ - t(key)        в”Ӯ\n                    в””в”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”ҳ\n                        в”Ӯ        в”Ӯ\n               load JSONв”Ӯ        в”Ӯ DOM traverse\n                        в”Ӯ        в”Ӯ data-i18n=\"key\"\n              в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”җ  в”Ңв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n              в”Ӯ /js/i18n/  в”Ӯ  в”Ӯ  HTML Pages      в”Ӯ\n              в”Ӯ es.json    в”Ӯ  в”Ӯ  <span            в”Ӯ\n              в”Ӯ en.json    в”Ӯ  в”Ӯ   data-i18n=      в”Ӯ\n              в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в”Ӯ   \"nav.ruta\">     в”Ӯ\n                              в”Ӯ   Ruta...         в”Ӯ\n                              в”Ӯ  </span>          в”Ӯ\n                              в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n"},"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.9.8","eval":null,"reviewScore":85},{"name":"tessl-labs/quickstart-debug-api-endpoints","version":"1.0.5","eval":null,"reviewScore":63},{"name":"JaviMontano/jm-agentic-development-kit","version":"a174232ae3eec7600c1a29a2b4c04c7798eec17c","eval":null,"reviewScore":null},{"name":"tessl/npm-firebase","version":"12.2.0","eval":null,"reviewScore":null},{"name":"tessl/npm-firebase-functions","version":"6.4.0","eval":null,"reviewScore":null},{"name":"tessl/npm-firebase-tools","version":"14.15.0","eval":null,"reviewScore":null},{"name":"tessl-labs/web-accessibility-essentials","version":"0.2.2","eval":null,"reviewScore":93},{"name":"tessl/npm-playwright--test","version":"1.55.0","eval":null,"reviewScore":null},{"name":"tessl-labs/playwright-testing","version":"0.2.0","eval":null,"reviewScore":98}],"exists":true},"checklist":{"files":[{"name":"Accessibility","filename":"accessibility.md","total":14,"checked":14,"items":[{"text":"Toggle uses semantic button elements (not divs)","checked":true,"chkId":null,"category":"Toggle Accessibility","tags":["Constitution II, Plan В§Toggle"]},{"text":"Toggle has role=\"radiogroup\" with aria-label","checked":true,"chkId":null ryTag":null,"bugTag":null,"description":"Run full navigation audit вҖ” verify SiteHeader menu items identical on 10+ sample pages across all sections","checked":true,"isBugFix":false},{"id":"T020","storyTag":null,"bugTag":null,"description":"Check browser console for JS errors on 5 representative pages (index, cotizador, recursos, legal, contacto)","checked":true,"isBugFix":false},{"id":"T021","storyTag":null,"bugTag":null,"description":"Validate quickstart.md test scenarios pass","checked":true,"isBugFix":false}],"progress":"4/4","column":"done"}],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"in_progress","progress":"94%","optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"complete","progress":"100%","optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Consistent Navigation","priority":"P1","scenarioCount":5,"body":"A visitor navigates the site and sees the same menu\nstructure on every page вҖ” same items, same order, same\nbehavior вҖ” regardless of which section they are in.\nCurrently, some pages use inline navigation instead of\nthe shared SiteHeader component, and the footer links\nvary between pages.\n\n**Why this priority**: Navigation is the primary\nwayfinding mechanism. Inconsistency erodes trust and\nmakes the site feel broken. Affects every visitor on\nevery page.\n\n**Independent Test**: Open any 10 pages across different\nsections and verify identical header menu items and\nfooter link structure.\n\n**Acceptance Scenarios**:\n\n1. **Given** a visitor on any public page, **When** they\n   view the header, **Then** they see the same 5 menu\n   items (Ruta, Recursos, Servicios, Contacto, Campus)\n   plus the \"Primera ConversaciГіn\" CTA\n2. **Given** a visitor on any public page, **When** they\n   view the footer, **Then** they see the same link\n   structure (Servicios, Recursos, Legal columns)\n3. **Given** a template/internal page (estandares/),\n   **When** rendered, **Then** it either uses the shared\n   components or is explicitly excluded as non-public\n4. **Given** the Icebreaker case study page, **When**\n   loaded, **Then** it uses SiteHeader instead of inline\n   navigation\n5. **Given** biblioteca_para_estudio.html, **When**\n   loaded, **Then** it uses SiteFooter instead of inline\n   footer markup","clarificationCount":0},{"id":"US2","title":"Reliable CTAs","priority":"P1","scenarioCount":5,"body":"A visitor clicks any call-to-action button on the site\nand it triggers the correct behavior вҖ” email with\npre-filled subject, external link, or navigation. No\nCTA should fail silently, open blank pages, or use\noutdated contact information.\n\n**Why this priority**: CTAs are the conversion mechanism.\nA broken CTA directly loses business. Currently the\ncotizador pages and legal pages bypass the centralized\nCTA system.\n\n**Independent Test**: Click every CTA across the site\nand verify each produces the expected result (correct\nmailto subject, correct URL, no 404s).\n\n**Acceptance Scenarios**:\n\n1. **Given** a visitor on any page with a CTA, **When**\n   they click it, **Then** the CTA handler routes to the\n   correct action defined in the centralized CTA data\n2. **Given** the cotizador summary page, **When** the\n   visitor clicks \"Enviar propuesta\", **Then** the mailto\n   link uses the CTA system (not inline JS construction)\n3. **Given** legal/privacidad.html, **When** the visitor\n   clicks the contact email, **Then** it uses the\n   data-cta system with the \"legal-privacidad\" identifier\n4. **Given** cta-data.json, **When** audited, **Then**\n   every entry has at least one corresponding HTML\n   element, and no unused entries exist\n5. **Given** any page with a CTA, **When** the CTA\n   handler fails to load, **Then** the fallback href\n   still provides a working contact method","clarificationCount":0},{"id":"US3","title":"Trustworthy ROI Simulation","priority":"P2","scenarioCount":5,"body":"A visitor uses any of the 3 cotizador pages to simulate\nROI for their training investment. The flow guides them\nthrough each step clearly, calculations are accurate,\nand the summary produces a correct, actionable result.\n\n**Why this priority**: The cotizadores are the primary\nself-service evaluation tool. Broken calculations or\nconfusing flows undermine the value proposition. Ranked\nP2 because the current simulators are functional but\nneed reliability improvements.\n\n**Independent Test**: Complete the full simulation flow\non each cotizador variant and verify calculations match\nexpected formulas.\n\n**Acceptance Scenarios**:\n\n1. **Given** a visitor on cotizador.html, **When** they\n   complete all 5 steps, **Then** the summary shows\n   correct ROI based on their inputs (hours, income,\n   task distribution, programs selected)\n2. **Given** a visitor adjusting task distribution\n   sliders, **When** the total exceeds or falls below\n   100%, **Then** the deviation indicator shows the\n   correct percentage with appropriate color (red for\n   over, amber for under, green for balanced)\n3. **Given** a visitor on cotizador-empresas.html,\n   **When** they select enterprise programs, **Then**\n   pricing reflects the correct program costs for the\n   enterprise tier\n4. **Given** a visitor on cotizador-personas.html,\n   **When** they reach the summary, **Then** the\n   generated mailto link uses the centralized CTA system\n   and includes all selected parameters\n5. **Given** any cotizador page, **When** a visitor\n   navigates backward in the wizard, **Then** their\n   previous selections are preserved","clarificationCount":0},{"id":"US4","title":"Improved Resources Experience","priority":"P2","scenarioCount":5,"body":"A visitor browsing the recursos section can discover,\nnavigate, and access resources across all 14 free\ncategories and 13 premium categories without dead ends,\nbroken links, or confusing navigation patterns.\n\n**Why this priority**: The resource library is a primary\nvalue driver and SEO asset. Sub-microsites need\nconsistent patterns to scale. Ranked P2 because the\nstructure exists but needs polish.\n\n**Independent Test**: Navigate to each resource category\nfrom the hub, verify all item links work, and confirm\nconsistent layout patterns.\n\n**Acceptance Scenarios**:\n\n1. **Given** a visitor on recursos/index.html, **When**\n   they click any category card, **Then** they land on a\n   working category page with consistent layout\n2. **Given** a visitor on any resource category page,\n   **When** they view the page, **Then** it uses\n   SiteHeader and SiteFooter components (not inline\n   variants)\n3. **Given** a visitor on a resource detail page,\n   **When** they look for the CTA, **Then** the beta\n   tester or access CTA uses the centralized data-cta\n   system\n4. **Given** the premium resources section, **When**\n   compared to free resources, **Then** the layout and\n   navigation patterns are consistent between both tiers\n5. **Given** recursos/playbooks/, **When** loaded,\n   **Then** the footer uses SiteFooter component instead\n   of a separate footer.html file","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"All public pages MUST use the SiteHeader"},{"id":"FR-002","text":"All public pages MUST use the SiteFooter"},{"id":"FR-003","text":"All CTAs MUST route through the"},{"id":"FR-004","text":"cta-data.json MUST contain only entries"},{"id":"FR-005","text":"Cotizador mailto links MUST be generated"},{"id":"FR-006","text":"Task distribution sliders MUST enforce a"},{"id":"FR-007","text":"ROI calculations MUST produce consistent"},{"id":"FR-008","text":"All resource category pages MUST follow a"},{"id":"FR-009","text":"Inline navigation and footer markup in"},{"id":"FR-010","text":"CTA fallback behavior MUST ensure a"}],"successCriteria":[{"id":"SC-001","text":"100% of public pages use SiteHeader and"},{"id":"SC-002","text":"100% of CTAs use the data-cta system with"},{"id":"SC-003","text":"0 unused entries in cta-data.json (every"},{"id":"SC-004","text":"All 3 cotizador variants produce correct"},{"id":"SC-005","text":"All 27+ resource category pages (14 free +"},{"id":"SC-006","text":"A manual walkthrough of every CTA on the"}],"clarifications":[],"edges":[{"from":"US4","to":"FR-001"},{"from":"US4","to":"FR-002"},{"from":"US4","to":"FR-003"},{"from":"US4","to":"FR-004"},{"from":"US4","to":"FR-005"},{"from":"US4","to":"FR-006"},{"from":"US4","to":"FR-007"},{"from":"US4","to":"FR-008"},{"from":"US4","to":"FR-009"},{"from":"US4","to":"FR-010"}]},"planView":{"techContext":[{"label":"Language/Version","value":"HTML5, CSS3 (Tailwind CSS via local"},{"label":"Primary Dependencies","value":"Tailwind CSS (dev build),"},{"label":"Storage","value":"sessionStorage (cotizador wizard state),"},{"label":"Testing","value":"Manual browser testing (no automated test"},{"label":"Target Platform","value":"Modern browsers (Chrome, Firefox,"},{"label":"Project Type","value":"Static web site (no build step for"},{"label":"Performance Goals","value
